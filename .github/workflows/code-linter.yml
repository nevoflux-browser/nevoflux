name: Code Linter

on:
  push:
    branches:
      - main
      - dev
  workflow_call:
  pull_request:
    branches:
      - main
      - dev

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.head_commit.message, '[no-lint]') }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Setup and run autopep8
        if: ${{ contains(join(github.event.commits.*.modified, ' '), '.py') || contains(join(github.event.commits.*.added, ' '), '.py') || contains(join(github.event.commits.*.removed, ' '), '.py') }}
        run: |
          sudo apt install python3-autopep8
          autopep8 --diff scripts/ src/

      - name: Install system dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y -qq libvips-dev > /dev/null

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Check for Rust changes
        id: rust-changes
        run: |
          if git diff --name-only ${{ github.event.before || 'HEAD~1' }} HEAD | grep -qE '\.rs$|Cargo\.(toml|lock)$'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Rust lint
        if: steps.rust-changes.outputs.changed == 'true'
        run: |
          cd src/nevoflux/extensions/nevoflux-agent/dioxus-ui
          cargo fmt --all -- --check
          cargo clippy --all-targets -- -D warnings
