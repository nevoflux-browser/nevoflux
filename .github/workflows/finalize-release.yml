name: Finalize Release

# Manual workflow to publish a release after build.yml has produced the draft
# and the Windows binaries in it have been manually signed.
#
# Prerequisites:
#   - build.yml completed: Linux / macOS / Windows artifacts uploaded to the
#     draft release "Release build - <version>" (tag = bare version, no v prefix)
#   - The unsigned Windows artifacts in that draft have been replaced with
#     manually-signed versions, e.g.
#       gh release upload "<version>" nevoflux.installer-gha.exe --clobber
#
# This workflow:
#   1. Generates release notes
#   2. Flips the draft release to published (single release, no v/non-v merge)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version without v prefix (e.g. 0.3.5)'
        required: true
        type: string
      release_branch:
        description: 'Release branch (for release notes generation)'
        required: true
        type: choice
        default: 'release'
        options:
          - 'release'
  workflow_call:
    inputs:
      version:
        description: 'Release version without v prefix (e.g. 0.3.5)'
        required: true
        type: string
      release_branch:
        description: 'Release branch (for release notes generation)'
        required: false
        type: string
        default: 'release'

jobs:
  publish:
    permissions: write-all
    name: Publish Release
    runs-on: ubuntu-latest
    environment:
      name: Deploy-Release

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.DEPLOY_KEY }}

      - name: Guard against placeholder version
        run: |
          set -e
          V="${{ inputs.version }}"
          case "$V" in
            ""|0.0.1|0.0.1-dev)
              echo "::error::refusing to publish placeholder version '$V'"
              exit 1 ;;
          esac
          echo "Publishing version: $V"

      - name: Verify draft release exists
        env:
          GH_TOKEN: ${{ secrets.DEPLOY_KEY }}
        run: |
          set -e
          VERSION="${{ inputs.version }}"
          REPO="${{ github.repository }}"
          if ! gh release view "$VERSION" --repo "$REPO" >/dev/null 2>&1; then
            echo "::error::draft release '$VERSION' not found — run build.yml first"
            exit 1
          fi

      - name: Generate Release Notes
        env:
          RELEASE_BRANCH: ${{ inputs.release_branch }}
        run: bash .github/workflows/src/generate_release_notes.sh

      - name: Publish the draft release
        env:
          GH_TOKEN: ${{ secrets.DEPLOY_KEY }}
        run: |
          set -ex
          VERSION="${{ inputs.version }}"
          REPO="${{ github.repository }}"
          BUILD_DATE=$(date +"%Y-%m-%d")
          gh release edit "$VERSION" \
            --repo "$REPO" \
            --draft=false \
            --title "Release build - $VERSION ($BUILD_DATE)" \
            --notes-file release_notes.md
