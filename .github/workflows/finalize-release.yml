name: Finalize Release

# Manual workflow to finalize a release after all builds complete.
#
# Prerequisites:
#   - build.yml has completed (macOS assets uploaded to draft release WITHOUT v prefix)
#   - GCB builds have completed (Linux, Windows assets uploaded to draft release WITH v prefix)
#
# This workflow:
#   1. Merges macOS assets from non-v release into v-prefixed release, deletes non-v release
#   2. Generates release notes
#   3. Marks the draft release as published

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version without v prefix (e.g. 0.1.2)'
        required: true
        type: string
      release_branch:
        description: 'Release branch (for release notes generation)'
        required: true
        type: choice
        default: 'release'
        options:
          - 'release'

jobs:
  finalize:
    permissions: write-all
    name: Finalize Release
    runs-on: ubuntu-latest
    environment:
      name: Deploy-Release

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.DEPLOY_KEY }}

      # =================================================================
      # 1. Merge macOS assets from non-v release into v-prefixed release
      # =================================================================
      - name: Merge macOS assets into v-prefixed release
        env:
          GH_TOKEN: ${{ secrets.DEPLOY_KEY }}
        run: |
          VERSION="${{ inputs.version }}"
          V_TAG="v${VERSION}"

          echo "Checking for non-v release '${VERSION}'..."
          if gh release view "${VERSION}" --json assets --jq '.assets[].name' 2>/dev/null; then
            echo "Found release '${VERSION}', downloading assets..."
            mkdir -p /tmp/macos-assets

            # Download all assets from the non-v release
            gh release download "${VERSION}" --dir /tmp/macos-assets --clobber

            # Upload each asset to the v-prefixed release
            echo "Uploading assets to '${V_TAG}'..."
            for f in /tmp/macos-assets/*; do
              if [ -f "$f" ]; then
                echo "  Uploading $(basename "$f")..."
                gh release upload "${V_TAG}" "$f" --clobber
              fi
            done

            # Delete the non-v release
            echo "Deleting release '${VERSION}'..."
            gh release delete "${VERSION}" --yes
            echo "Release '${VERSION}' deleted."
          else
            echo "No non-v release '${VERSION}' found, skipping merge."
          fi

      # =================================================================
      # 2. Generate release notes
      # =================================================================
      - name: Generate Release Notes
        env:
          RELEASE_BRANCH: ${{ inputs.release_branch }}
        run: bash .github/workflows/src/generate_release_notes.sh

      # =================================================================
      # 3. Publish the release
      # =================================================================
      - name: Finalize release
        env:
          GH_TOKEN: ${{ secrets.DEPLOY_KEY }}
        run: |
          VERSION="${{ inputs.version }}"
          V_TAG="v${VERSION}"
          BUILD_DATE=$(date +"%Y-%m-%d")
          gh release edit "${V_TAG}" \
            --draft=false \
            --title "Release build - ${V_TAG} ($BUILD_DATE)" \
            --notes-file release_notes.md
