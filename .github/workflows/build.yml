name: NevoFlux Release builds

on:
  workflow_dispatch:
    inputs:
      update_version:
        description: 'Update the version number'
        required: false
        default: false
        type: 'boolean'
      update_branch:
        description: 'Update branch with new version'
        required: true
        default: 'release'
        type: 'choice'
        options:
          - 'release'
      sign_macos:
        description: 'Sign macOS builds (requires Apple certificates)'
        required: false
        default: true
        type: 'boolean'
      display_version:
        description: 'Display version (e.g. 0.1.0). If set, overrides surfer.json displayVersion'
        required: true
        default: '0.1.0'
        type: 'string'
      use-sccache:
        description: 'Use sccache'
        required: true
        type: 'boolean'
        default: false
  workflow_call:
    inputs:
      update_version:
        description: 'Update the version number'
        required: false
        default: false
        type: 'boolean'
      update_branch:
        description: 'Update branch with new version'
        required: true
        default: 'release'
        type: 'string'
      sign_macos:
        description: 'Sign macOS builds (requires Apple certificates)'
        required: false
        default: true
        type: 'boolean'
      display_version:
        description: 'Display version (e.g. 0.1.0). If set, overrides surfer.json displayVersion'
        required: true
        default: '0.1.0'
        type: 'string'
      use-sccache:
        description: 'Use sccache'
        required: true
        type: 'boolean'
        default: false

jobs:
  buildid:
    name: Generate build ID
    runs-on: ubuntu-latest
    outputs:
      buildids: ${{ steps.get.outputs.bid }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.DEPLOY_KEY }}

      - id: get
        shell: bash -xe {0}
        run: |
          bdat=`date +"%Y%m%d%I%M%S"`
          echo "bid=${bdat}" >> $GITHUB_OUTPUT

      - name: Debug
        run: |
          echo "update_version: ${{ inputs.update_version }}"
          echo "use sccache: ${{ inputs.use-sccache }}"
          echo "update_branch: ${{ inputs.update_branch }}"
          echo "GITHUB_REPOSITORY: ${{ github.repository }}"

  build-data:
    permissions:
      contents: write
    name: Generate build data
    runs-on: ubuntu-latest
    needs: buildid
    outputs:
      build_date: ${{ steps.data.outputs.builddate }}
      version: ${{ steps.data.outputs.version }}
      build_time: ${{ steps.data.outputs.buildtime }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.DEPLOY_KEY }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Install dependencies
        run: |
          npm ci

      - name: Setup Surfer
        run: |
          npm i -g @zen-browser/surfer

      - name: Bump version
        if: ${{ inputs.update_version }}
        run: |
          npm run surfer -- ci --brand ${{ inputs.update_branch }} --bump prerelease

      - name: Set display version
        if: ${{ inputs.display_version != '' }}
        run: |
          npm run surfer -- ci --brand ${{ inputs.update_branch }} --display-version ${{ inputs.display_version }}

      - name: Configure CI brand
        if: ${{ !inputs.update_version && inputs.display_version == '' }}
        run: |
          npm run surfer -- ci --brand ${{ inputs.update_branch }}

      - name: Debug
        run: |
          surfer get version
          surfer get version | xargs
          echo "$(surfer get version | xargs)"

      - name: Export release date
        id: data
        shell: bash
        run: |
          echo "builddate=$(date +"%Y-%m-%d")" >> $GITHUB_OUTPUT
          echo "version=$(surfer get version | xargs)" >> $GITHUB_OUTPUT
          echo "buildtime=$(date +"%H:%M:%S")" >> $GITHUB_OUTPUT

      - name: Commit
        uses: stefanzweifel/git-auto-commit-action@v5
        if: ${{ inputs.update_version }}
        with:
          commit_message: 🔖 Update version to ${{ steps.data.outputs.version }}
          commit_user_name: NevoFlux Bot
          commit_user_email: nevoflux-bot@users.noreply.github.com

  lint:
    uses: ./.github/workflows/code-linter.yml
    needs: [build-data]
    name: Lint

  check-release:
    runs-on: ubuntu-latest
    needs: [build-data, lint]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.DEPLOY_KEY }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Install dependencies
        run: |
          npm ci

      - name: Setup Surfer
        run: |
          npm i -g @zen-browser/surfer

      - name: Activate Surfer CLI
        run: |
          npm run surfer -- ci --brand ${{ inputs.update_branch }} --display-version ${{ needs.build-data.outputs.version }}

      - name: Check version
        run: |
          echo "$(pwd)"
          echo $(npm run --silent surfer -- get version | xargs)
          echo "version=$(npm run --silent surfer -- get version | xargs)" >> $GITHUB_OUTPUT
          if [[ $(npm run --silent surfer -- get version | xargs) == ${{ needs.build-data.outputs.version }} ]]; then
            echo ">>> Version matches"
          else
            echo ">>> Version mismatch"
            exit 1
          fi

  source:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    needs: [build-data, check-release]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.DEPLOY_KEY }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Setup Git
        run: |
          git config --global user.email "nevoflux-bot@users.noreply.github.com"
          git config --global user.name "NevoFlux Bot"

      - name: Install dependencies
        run: |
          npm ci

      - name: Load Surfer CI setup
        run: npm run surfer -- ci --brand ${{ inputs.update_branch }} --display-version ${{ needs.build-data.outputs.version }}

      - name: Check engine source version
        id: engine-check
        run: |
          DESIRED_VERSION=$(node -p "require('./surfer.json').version.version")
          echo "Target engine version: $DESIRED_VERSION"
          if [ -f engine/config/milestone.txt ]; then
            CURRENT_VERSION=$(grep -v '^#' engine/config/milestone.txt | grep -v '^$' | tail -1)
            echo "Current engine version: $CURRENT_VERSION"
            if [ "$CURRENT_VERSION" = "$DESIRED_VERSION" ]; then
              echo "Engine source already at version $DESIRED_VERSION, skipping download."
              echo "skip=true" >> $GITHUB_OUTPUT
              exit 0
            fi
            echo "Version mismatch ($CURRENT_VERSION != $DESIRED_VERSION), will download."
          else
            echo "No engine source found, will download."
          fi
          echo "skip=false" >> $GITHUB_OUTPUT

      - name: Download Firefox source and dependencies
        if: steps.engine-check.outputs.skip != 'true'
        run: |
          for attempt in 1 2 3 4 5; do
            npm run download --verbose && break
            if [ $attempt -lt 5 ]; then
              echo "::warning::Download attempt $attempt/5 failed. Retrying in $((attempt * 15))s..."
              sleep $((attempt * 15))
            else
              echo "::error::Download failed after 5 attempts"
              exit 1
            fi
          done

      - name: Import
        run: npm run import -- --verbose

      - name: Build language packs
        run: |
          for attempt in 1 2 3 4 5; do
            sh scripts/download-language-packs.sh && break
            if [ $attempt -lt 5 ]; then
              echo "::warning::Download attempt $attempt/5 failed. Retrying in $((attempt * 15))s..."
              sleep $((attempt * 15))
            else
              echo "::error::Download failed after 5 attempts"
              exit 1
            fi
          done

      - name: Compress
        run: |
          tar \
            --exclude='./.git' \
            --use-compress-program=zstd \
            -hcf nevoflux.source.tar.zst \
            -C engine .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          retention-days: 5
          name: nevoflux.source.tar.zst
          path: ./nevoflux.source.tar.zst

      - name: Upload source tarball to draft release
        env:
          GH_TOKEN: ${{ secrets.DEPLOY_KEY }}
        run: |
          set -ex
          VERSION="${{ needs.build-data.outputs.version }}"
          REPO="${{ github.repository }}"

          # Create draft release if it doesn't exist
          if ! gh release view "$VERSION" --repo "$REPO" &>/dev/null; then
            gh release create "$VERSION" \
              --repo "$REPO" \
              --title "Release build - $VERSION" \
              --draft \
              --notes "Build in progress"
          fi

          gh release upload "$VERSION" ./nevoflux.source.tar.zst \
            --repo "$REPO" --clobber
          echo "Source tarball uploaded to draft release $VERSION"

  windows-native:
    name: Windows build (native, x64 + arm64)
    uses: ./.github/workflows/windows-native-build.yml
    permissions:
      contents: write
      actions: read
    secrets: inherit
    needs: [build-data, buildid]
    with:
      display_version: ${{ inputs.display_version || needs.build-data.outputs.version }}
      release_branch: ${{ inputs.update_branch }}
      build_id: ${{ needs.buildid.outputs.buildids }}
      skip_arm64: false
      skip_pgo: false

  linux-x86_64:
    name: Linux build (x86_64)
    uses: ./.github/workflows/linux-x86_64-release-build.yml
    permissions:
      contents: write
    secrets: inherit
    needs: [build-data, buildid]
    with:
      build-version: ${{ needs.build-data.outputs.version }}
      release-branch: ${{ inputs.update_branch }}
      MOZ_BUILD_DATE: ${{needs.buildid.outputs.buildids}}
      use-sccache: ${{ inputs.use-sccache }}

  linux-aarch64:
    name: Linux build (aarch64)
    uses: ./.github/workflows/linux-aarch64-release-build.yml
    permissions:
      contents: write
    secrets: inherit
    needs: [build-data, buildid]
    with:
      build-version: ${{ needs.build-data.outputs.version }}
      release-branch: ${{ inputs.update_branch }}
      MOZ_BUILD_DATE: ${{needs.buildid.outputs.buildids}}
      use-sccache: ${{ inputs.use-sccache }}

  mac-x86_64:
    name: macOS build (x86_64)
    uses: ./.github/workflows/macos-x86_64-release-build.yml
    permissions:
      contents: write
    secrets: inherit
    needs: [build-data, buildid]
    with:
      build-version: ${{ inputs.display_version || needs.build-data.outputs.version }}
      release-branch: ${{ inputs.update_branch }}
      MOZ_BUILD_DATE: ${{needs.buildid.outputs.buildids}}
      use-sccache: ${{ inputs.use-sccache }}

  mac-aarch64:
    name: macOS build (aarch64)
    uses: ./.github/workflows/macos-aarch64-release-build.yml
    permissions:
      contents: write
    secrets: inherit
    needs: [build-data, buildid]
    with:
      build-version: ${{ inputs.display_version || needs.build-data.outputs.version }}
      release-branch: ${{ inputs.update_branch }}
      MOZ_BUILD_DATE: ${{needs.buildid.outputs.buildids}}
      use-sccache: ${{ inputs.use-sccache }}

  mac-uni:
    name: macOS build (Universal)
    uses: ./.github/workflows/macos-universal-release-build.yml
    permissions:
      contents: write
    secrets: inherit
    needs: [build-data, mac-x86_64, mac-aarch64]
    with:
      build-version: ${{ inputs.display_version || needs.build-data.outputs.version }}
      release-branch: ${{ inputs.update_branch }}
      sign_macos: ${{ inputs.sign_macos || false }}
  appimage:
    name: AppImage build - Linux ${{ matrix.arch }}
    permissions:
      contents: write
    runs-on: blacksmith-2vcpu-ubuntu-2404
    strategy:
      matrix:
        arch: [x86_64, aarch64]
    needs: [linux-x86_64, linux-aarch64, build-data]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.DEPLOY_KEY }}

      - name: Setup Node.js
        uses: useblacksmith/setup-node@v5
        with:
          node-version-file: ".nvmrc"

      - name: Install dependencies
        run: |
          npm ci
          sudo apt-get update
          sudo apt-get -y install libfuse2 desktop-file-utils appstream

      - name: Download Linux build
        uses: actions/download-artifact@v4
        with:
          name: zen.linux-${{ matrix.arch }}.tar.xz

      - name: Execute AppImage build
        run: |
          set -eux
          export ARCH=${{ matrix.arch }}
          UPINFO="gh-releases-zsync|$GITHUB_REPOSITORY_OWNER|desktop|latest|zen-$ARCH.AppImage.zsync"
          rm build/AppDir/.DirIcon || true
          cp configs/branding/${{ inputs.update_branch }}/logo128.png build/AppDir/usr/share/icons/hicolor/128x128/apps/zen.png
          cp configs/branding/${{ inputs.update_branch }}/logo128.png build/AppDir/zen.png && ln -s zen.png build/AppDir/.DirIcon

          if [ "${{ inputs.update_branch }}" = "twilight" ]; then
            sed -i -e 's/Name=Zen Browser/Name=Zen Twilight/g' build/AppDir/zen.desktop
            sed -i -e 's/StartupWMClass=zen/StartupWMClass=zen-twilight/g' build/AppDir/zen.desktop
          fi

          sed -i -e 's/\$VERSION/${{ needs.build-data.outputs.version }}/g' build/AppDir/zen.desktop

          APPDIR=build/AppDir
          tar -xvf *.tar.* && rm -rf *.tar.*
          mv zen/* $APPDIR/
          wget "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage"
          wget "https://github.com/VHSgunzo/uruntime/releases/latest/download/uruntime-appimage-squashfs-lite-$ARCH"
          chmod +x *.AppImage
          chmod +x ./uruntime-appimage-squashfs-lite-"$ARCH"
          chmod +x ./build/AppDir/AppRun

          # keep the uruntime mountpoint (massively speeds up launch time)
          sed -i 's|URUNTIME_MOUNT=[0-9]|URUNTIME_MOUNT=0|' ./uruntime-appimage-squashfs-lite-"$ARCH"

          echo "AppDir: $APPDIR"
          ls -al
          find .
          ls -al "$APPDIR"
          ./appimagetool-x86_64.AppImage -u "$UPINFO" "$APPDIR" zen-"$ARCH".AppImage --runtime-file ./uruntime-appimage-squashfs-lite-"$ARCH"
          mkdir dist
          mv zen*AppImage* dist/.
          unset ARCH

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          retention-days: 5
          name: zen-${{ matrix.arch }}.AppImage
          path: ./dist/zen-${{ matrix.arch }}.AppImage

      - name: Upload artifact (ZSync)
        uses: actions/upload-artifact@v4
        with:
          retention-days: 5
          name: zen-${{ matrix.arch }}.AppImage.zsync
          path: ./dist/zen-${{ matrix.arch }}.AppImage.zsync

      - name: Upload AppImage to draft release
        env:
          GH_TOKEN: ${{ secrets.DEPLOY_KEY }}
        run: |
          set -ex
          VERSION="${{ needs.build-data.outputs.version }}"
          REPO="${{ github.repository }}"
          if ! gh release view "$VERSION" --repo "$REPO" >/dev/null 2>&1; then
            gh release create "$VERSION" --repo "$REPO" \
              --title "Release build - $VERSION" --draft --notes "Build in progress"
          fi
          gh release upload "$VERSION" ./dist/zen-${{ matrix.arch }}.AppImage --repo "$REPO" --clobber
          gh release upload "$VERSION" ./dist/zen-${{ matrix.arch }}.AppImage.zsync --repo "$REPO" --clobber
          echo "AppImage (${{ matrix.arch }}) uploaded to draft release $VERSION"

  stop-self-hosted:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    needs: [linux-x86_64, linux-aarch64]
    if: always()
    steps:
      - name: Download aws-cli
        if: ${{ inputs.update_branch == 'release' }}
        run: |
          curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
          unzip awscliv2.zip
          sudo ./aws/install --update

      - name: Stop self-hosted runner
        if: ${{ inputs.update_branch == 'release' }}
        run: |
          echo "Stopping self-hosted runner"
          echo "${{ secrets.SELF_HOSTED_RUNNER_STOP_SCRIPT }}" | base64 -d > stop.sh
          sudo chmod +x stop.sh
          bash ./stop.sh > /dev/null

      - name: Remove self-hosted runner script
        if: ${{ always() && inputs.update_branch == 'release' }}
        run: |
          echo "Removing self-hosted runner script"
          rm stop.sh || true

