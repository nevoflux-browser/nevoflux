name: macOS Release Build

on:
  workflow_dispatch:
    inputs:
      build-version:
        description: 'The version to build'
        required: true
        type: string
        default: '0.1.1'
      release-branch:
        description: 'The branch to build'
        required: true
        type: string
        default: 'release'
      sign_macos:
        description: 'Sign macOS builds'
        required: false
        type: boolean
        default: true
      x86_64-run-id:
        description: 'Run ID of macOS x86_64 build (required for standalone dispatch)'
        required: false
        type: string
        default: ''
      aarch64-run-id:
        description: 'Run ID of macOS aarch64 build (required for standalone dispatch)'
        required: false
        type: string
        default: ''
  workflow_call:
    inputs:
      build-version:
        description: 'The version to build'
        required: true
        type: string
      release-branch:
        description: 'The branch to build'
        required: true
        type: string
      sign_macos:
        description: 'Sign macOS builds'
        required: false
        type: boolean
        default: true

jobs:
  mac-build:
    name: Unify macOS (Universal)
    runs-on: [self-hosted, macos]

    strategy:
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.DEPLOY_KEY }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Setup Git
        run: |
          git config --global user.email "mauro-balades@users.noreply.github.com"
          git config --global user.name "mauro-balades"

      - name: Install system dependencies
        run: |
          brew update
          brew install cairo gnu-tar mercurial watchman || true
          sudo pip3 install setuptools || true

          export PATH="$(python3 -m site --user-base)/bin":$PATH
          python3 -m pip install --user mercurial || true

          if [ "${{ inputs.sign_macos }}" = "true" ]; then
            # --locked: use published Cargo.lock to avoid transitive deps
            # pulling in crates requiring Rust 1.85+ (edition2024)
            cargo install apple-codesign --locked
          fi

      - name: Force usage of gnu-tar
        run: |
          echo 'export PATH="/usr/local/opt/gnu-tar/libexec/gnubin:$PATH"' >> ~/.bash_profile
          echo 'export PATH="/usr/local/opt/gnu-tar/libexec/gnubin:$PATH"' >> ~/.zsh
          source ~/.bash_profile

      - name: Install dependencies
        run: |
          npm ci

      - name: Load surfer CI setup
        run: npm run surfer -- ci --brand ${{ inputs.release-branch }} --display-version ${{ inputs.build-version }}

      - name: Check engine source version
        id: engine-check
        run: |
          DESIRED_VERSION=$(node -p "require('./surfer.json').version.version")
          echo "Target engine version: $DESIRED_VERSION"
          if [ -f engine/config/milestone.txt ]; then
            CURRENT_VERSION=$(grep -v '^#' engine/config/milestone.txt | grep -v '^$' | tail -1)
            echo "Current engine version: $CURRENT_VERSION"
            if [ "$CURRENT_VERSION" = "$DESIRED_VERSION" ]; then
              echo "Engine source already at version $DESIRED_VERSION, skipping download."
              echo "skip=true" >> $GITHUB_OUTPUT
              exit 0
            fi
            echo "Version mismatch ($CURRENT_VERSION != $DESIRED_VERSION), will download."
          else
            echo "No engine source found, will download."
          fi
          echo "skip=false" >> $GITHUB_OUTPUT

      - name: Download Firefox source and dependencies
        if: steps.engine-check.outputs.skip != 'true'
        run: |
          for attempt in 1 2 3 4 5; do
            npm run download && break
            if [ $attempt -lt 5 ]; then
              echo "::warning::Download attempt $attempt/5 failed. Retrying in $((attempt * 15))s..."
              sleep $((attempt * 15))
            else
              echo "::error::Download failed after 5 attempts"
              exit 1
            fi
          done

      - name: Bootstrap
        run: |
          cd engine
          export SURFER_PLATFORM="darwin"
          export PATH="$(python3 -m site --user-base)/bin":$PATH
          ./mach --no-interactive bootstrap --application-choice browser --no-system-changes || true
          cd ..

      - name: Import
        run: npm run import

      - name: Populate mozconfig
        env:
          SURFER_MOZCONFIG_ONLY: true
        run: |
          npm run build
          cd engine
          ./mach configure

      # Artifact source:
      # - workflow_call from build.yml: artifacts are in the same parent run (github.run_id)
      # - workflow_dispatch standalone: x86_64 and aarch64 are separate runs, use input run IDs
      - name: Download x86_64 DMG from artifacts
        uses: actions/download-artifact@v4
        with:
          name: nevoflux-x86_64-apple-darwin.dmg
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ inputs.x86_64-run-id || github.run_id }}

      - name: Download aarch64 DMG from artifacts
        uses: actions/download-artifact@v4
        with:
          name: nevoflux-aarch64-apple-darwin.dmg
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ inputs.aarch64-run-id || github.run_id }}

      - name: Remove any existing .app folders
        run: |
          set -x
          cd engine
          rm -rf "./obj-x86_64-apple-darwin/" || true
          rm -rf "./obj-aarch64-apple-darwin/" || true

      - name: Extract .app from dmg
        run: |
          set -ex
          cd engine
          echo "Extracting x86_64 .app from dmg"
          mkdir -p ./obj-x86_64-apple-darwin/dist
          mkdir -p ./obj-aarch64-apple-darwin/dist
          ./mach python -m mozbuild.action.unpack_dmg \
            ../nevoflux-x86_64-apple-darwin.dmg \
            ./obj-x86_64-apple-darwin/dist
          echo "Extracting aarch64 .app from dmg"
          ./mach python -m mozbuild.action.unpack_dmg \
            ../nevoflux-aarch64-apple-darwin.dmg \
            ./obj-aarch64-apple-darwin/dist

      - name: Find first .app folder name
        run: |
          cd engine/obj-x86_64-apple-darwin/dist
          export APP_NAME='NevoFlux'
          echo "APP_NAME=$APP_NAME" >> $GITHUB_ENV
          echo "APP_NAME=$APP_NAME"

      - name: List .app folders
        run: |
          ls engine/
          echo "--------------------"
          cd engine/obj-x86_64-apple-darwin/dist
          find . -maxdepth 1 -name "*.app" -type d
          cd ../..

      - name: create .p12 for codesign
        if: ${{ inputs.sign_macos }}
        run: |
          cd engine
          echo "${{ secrets.macOS_CERTIFICATES_P12_For_App_BASE64 }}" > cert.txt
          base64 --decode -i cert.txt -o zenCert.p12
          echo "${{ secrets.macOS_CERTIFICATES_P12_PASSWORD }}" > zenpCertPassword.passwd

      - name: Remove certificate sensitive information
        if: ${{ inputs.sign_macos }}
        run: |
          rm engine/cert.txt || true

      - name: Import provisioning profile for .app
        if: ${{ inputs.sign_macos }}
        run: |
          echo "${{ secrets.macOS_PROVISIONING_PROFILE }}" | base64 --decode > ./engine/Zen_Browser.provisionprofile
          ls -la

      - name: Sync build metadata before unify
        run: |
          set -ex
          X86_APP="$(pwd)/engine/obj-x86_64-apple-darwin/dist/${{ env.APP_NAME }}.app"
          ARM_APP="$(pwd)/engine/obj-aarch64-apple-darwin/dist/${{ env.APP_NAME }}.app"
          # unify.py requires non-binary files to be identical across architectures.
          # When builds come from separate workflow runs they differ in BuildID,
          # SourceStamp, CFBundleVersion. Find all differing text files in aarch64
          # and overwrite with x86_64 versions.
          #
          # Also sync omni.ja files: these are zip archives containing JS/CSS/locale
          # resources (no arch-specific binaries). AppConstants.sys.mjs lives inside
          # omni.ja and contains MOZ_BUILDID/SOURCE_REVISION_URL which differ between
          # builds. Copying the entire jar normalizes all embedded metadata at once.
          echo "=== Scanning for differing files ==="
          find "$ARM_APP" -type f \( -name "*.plist" -o -name "*.ini" -o -name "*.mjs" -o -name "*.js" -o -name "*.json" -o -name "*.ja" \) | while read -r arm_file; do
            rel="${arm_file#$ARM_APP/}"
            x86_file="$X86_APP/$rel"
            if [ -f "$x86_file" ] && ! diff -q "$x86_file" "$arm_file" > /dev/null 2>&1; then
              cp "$x86_file" "$arm_file"
              echo "Synced: $rel"
            fi
          done

      - name: Unify architectures
        run: |
          cd engine
          ./mach python "./toolkit/mozapps/installer/unify.py" "./obj-x86_64-apple-darwin/dist/${{ env.APP_NAME }}.app" "./obj-aarch64-apple-darwin/dist/${{ env.APP_NAME }}.app"
          echo "Merged aarch64 into x86_64!"

      - name: Regenerate precomplete after unify
        run: |
          set -ex
          APP_PATH="engine/obj-x86_64-apple-darwin/dist/${{ env.APP_NAME }}.app"
          echo "=== App bundle structure ==="
          ls -la "$APP_PATH/" || true
          ls -la "$APP_PATH/Contents/" || true
          ls -la "$APP_PATH/Contents/Resources/" 2>/dev/null || echo "Contents/Resources not found"
          ls -la "$APP_PATH/Contents/MacOS/" 2>/dev/null || echo "Contents/MacOS not found"
          # Determine correct path for precomplete generation
          if [ -d "$APP_PATH/Contents/Resources" ]; then
            PRECOMPLETE_DIR="$APP_PATH/Contents/Resources"
          elif [ -d "$APP_PATH/Contents" ]; then
            PRECOMPLETE_DIR="$APP_PATH/Contents"
          else
            PRECOMPLETE_DIR="$APP_PATH"
          fi
          echo "Generating precomplete in: $PRECOMPLETE_DIR"
          cd "$PRECOMPLETE_DIR"
          python3 "$GITHUB_WORKSPACE/engine/config/createprecomplete.py"
          echo "precomplete file regenerated at: $(find "$GITHUB_WORKSPACE/$APP_PATH" -name precomplete 2>/dev/null)"

      - name: Clean stale keychain (self-hosted runner)
        if: ${{ inputs.sign_macos }}
        run: |
          security delete-keychain signing_temp.keychain 2>/dev/null || true

      - name: Strip resource forks and xattrs before signing
        run: |
          set -ex
          APP_PATH="engine/obj-x86_64-apple-darwin/dist/${{ env.APP_NAME }}.app"
          echo "Stripping extended attributes and resource forks from $APP_PATH"
          xattr -cr "$APP_PATH"
          # Remove AppleDouble (._*) files that carry resource forks
          find "$APP_PATH" -name '._*' -delete 2>/dev/null || true
          echo "xattr cleanup complete"

      - name: Copy provisioning profile for .app (embedded in .app)
        if: ${{ inputs.sign_macos }}
        run: |
          cd engine
          echo "Copying provisioning profile for .app on both architectures (${{ env.APP_NAME }})"
          cp ./Zen_Browser.provisionprofile "./embedded.provisionprofile"

      - name: Sign .app
        if: ${{ inputs.sign_macos }}
        run: |
          cd engine
          # TODO: Change it to "production" once we figure out the issue with the webauth
          ./mach macos-sign -v -r -c "release" -e "production" -a "./obj-x86_64-apple-darwin/dist/${{ env.APP_NAME }}.app" --rcodesign-p12-file zenCert.p12 --rcodesign-p12-password-file zenpCertPassword.passwd

      - name: Create DMG
        run: |
          cd engine
          ./mach python -m mozbuild.action.make_dmg \
            --volume-name "${{ env.APP_NAME }}" \
            --background ./browser/branding/release/background.png \
            --icon ./browser/branding/release/firefox.icns \
            --dsstore ./browser/branding/release/dsstore \
            ./obj-x86_64-apple-darwin/dist/ ../nevoflux-macOS-universal-temp.dmg

      - name: Remove sensitive information
        if: ${{ inputs.sign_macos }}
        run: |
          rm -f ./engine/Zen_Browser.provisionprofile

      - name: Sign and notarize .dmg
        if: ${{ inputs.sign_macos }}
        run: |
          set -ex
          hdiutil convert nevoflux-macOS-universal-temp.dmg -format UDZO -imagekey zlib-level=9 -o nevoflux.macos-universal.dmg
          rcodesign sign \
            --p12-file engine/zenCert.p12 \
            --p12-password-file engine/zenpCertPassword.passwd \
            nevoflux.macos-universal.dmg

          # Submit for notarization (non-blocking)
          SUBMIT_OUT=$(xcrun notarytool submit "nevoflux.macos-universal.dmg" \
            --apple-id "${{ secrets.macOS_AppleAccountId }}" \
            --team-id "${{ secrets.macOS_AppleDeveloperIdTeamId }}" \
            --password "${{ secrets.macOS_AppleDeveloperIdPassword }}" \
            2>&1)
          echo "$SUBMIT_OUT"
          SUB_ID=$(echo "$SUBMIT_OUT" | grep -oE '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' | head -1)
          echo "Submission ID: $SUB_ID"
          if [ -z "$SUB_ID" ]; then
            echo "::error::Failed to get submission ID"
            exit 1
          fi

          # Poll for up to 60 minutes (120 * 30s)
          for i in $(seq 1 120); do
            sleep 30
            STATUS=$(xcrun notarytool info "$SUB_ID" \
              --apple-id "${{ secrets.macOS_AppleAccountId }}" \
              --team-id "${{ secrets.macOS_AppleDeveloperIdTeamId }}" \
              --password "${{ secrets.macOS_AppleDeveloperIdPassword }}" 2>&1) || true
            echo "Poll $i/120: $(echo "$STATUS" | grep -i status || echo "$STATUS" | tail -3)"
            if echo "$STATUS" | grep -qi "accepted"; then
              echo "Notarization accepted!"
              xcrun stapler staple "nevoflux.macos-universal.dmg"
              exit 0
            elif echo "$STATUS" | grep -qi "invalid"; then
              echo "::error::Notarization rejected"
              xcrun notarytool log "$SUB_ID" \
                --apple-id "${{ secrets.macOS_AppleAccountId }}" \
                --team-id "${{ secrets.macOS_AppleDeveloperIdTeamId }}" \
                --password "${{ secrets.macOS_AppleDeveloperIdPassword }}" || true
              exit 1
            fi
          done
          echo "::error::Notarization timed out after 60 minutes"
          exit 1

      - name: Create unsigned DMG
        if: ${{ !inputs.sign_macos }}
        run: |
          set -ex
          hdiutil convert nevoflux-macOS-universal-temp.dmg -format UDZO -imagekey zlib-level=9 -o nevoflux.macos-universal.dmg

      - name: Download host mar
        uses: actions/download-artifact@v4
        with:
          name: nevoflux-macos-host-mar
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ inputs.aarch64-run-id || github.run_id }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          retention-days: 5
          name: nevoflux.macos-universal.dmg
          path: ./nevoflux.macos-universal.dmg

      - name: Download platform.ini
        uses: actions/download-artifact@v4
        with:
          name: platform.ini
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ inputs.x86_64-run-id || github.run_id }}

      - name: Package for mar
        env:
          JUST_MAR: true
        run: |
          # we don't need it anymore
          set -ex
          rm -rf ./engine/obj-aarch64-apple-darwin
          mkdir -p ./engine/obj-x86_64-apple-darwin/dist/bin
          mv ./platform.ini ./engine/obj-x86_64-apple-darwin/dist/bin/platform.ini
          export SURFER_PLATFORM="darwin"
          export ZEN_RELEASE=1
          # full path to nevoflux-macos-host-mar
          export MAR=$(pwd)/nevoflux-macos-host-mar
          chmod +x $MAR
          echo "MAR=$MAR"
          npm run package -- --verbose
          mv ./dist/output.mar ./macos.mar

      - name: Upload build artifact (.mar)
        uses: actions/upload-artifact@v4
        with:
          retention-days: 5
          name: macos.mar
          path: ./macos.mar

      - name: Upload build artifact (update manifests)
        uses: actions/upload-artifact@v4
        with:
          retention-days: 5
          name: macos_update_manifest
          path: ./dist/update

      - name: Upload macOS artifacts to draft release
        env:
          GH_TOKEN: ${{ secrets.DEPLOY_KEY }}
        run: |
          set -ex
          VERSION="${{ inputs.build-version }}"
          REPO="${{ github.repository }}"

          # Create draft release if it doesn't exist
          if ! gh release view "$VERSION" --repo "$REPO" &>/dev/null; then
            gh release create "$VERSION" \
              --repo "$REPO" \
              --title "Release build - $VERSION" \
              --draft \
              --notes "Build in progress"
          fi

          # Upload DMG and MAR
          gh release upload "$VERSION" ./nevoflux.macos-universal.dmg \
            --repo "$REPO" --clobber
          gh release upload "$VERSION" ./macos.mar \
            --repo "$REPO" --clobber
          echo "macOS DMG and MAR uploaded to draft release $VERSION"
