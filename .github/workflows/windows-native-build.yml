name: Windows Native Build (self-hosted)

permissions:
  contents: read
  actions: read

on:
  workflow_dispatch:
    inputs:
      display_version:
        description: 'Display version (e.g. 0.1.0)'
        required: true
        type: string
      release_branch:
        description: 'Release branch'
        required: true
        type: choice
        options: [release, twilight]
        default: release
      skip_arm64:
        description: 'Skip arm64 build'
        type: boolean
        default: false
      skip_pgo:
        description: 'Skip PGO stages 1+2+3 (x64 single-shot, no PGO)'
        type: boolean
        default: false
      build_id:
        description: 'Override MOZ_BUILD_DATE (timestamp). Empty = auto.'
        type: string
        default: ''

concurrency:
  group: windows-native-${{ github.workflow }}
  cancel-in-progress: false

env:
  # Disable husky setup during `npm ci`. Husky's `prepare` script invokes
  # `bash` via PATH and on this runner PATH lookup resolves to
  # C:\Windows\System32\bash.exe (the WSL launcher stub, no distro installed),
  # which exits 1 and fails npm ci. Husky's git-hooks setup is dev-only;
  # CI doesn't need it.
  HUSKY: '0'
  # Make `npm run *` use MSYS2 bash so POSIX env-var prefix syntax
  # (e.g. `GIT_CONFIG_COUNT=2 GIT_CONFIG_KEY_0=... surfer download`) parses.
  # The default on Windows is cmd.exe, which doesn't understand `KEY=val cmd`.
  NPM_CONFIG_SCRIPT_SHELL: 'C:\mozilla-build\msys2\usr\bin\bash.exe'
  # Skip sccache wiring in configs/common/mozconfig. The mozconfig adds
  # --with-ccache=sccache unconditionally unless SCCACHE_GHA_ENABLED=false;
  # sccache isn't installed on the runner -> configure fails with
  # "Cannot find ccache". (We're not using sccache for these builds.)
  SCCACHE_GHA_ENABLED: 'false'

jobs:
  prepare:
    runs-on: [self-hosted, nevoflux-windows]
    outputs:
      version: ${{ steps.version.outputs.value }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.DEPLOY_KEY }}

      - name: Runner prerequisite check
        shell: pwsh
        run: pwsh "$env:GITHUB_WORKSPACE\scripts\gha\check-windows-runner.ps1"

      - name: Disk free-space gate
        shell: pwsh
        run: |
          $free = (Get-PSDrive C).Free / 1GB
          Write-Host "C: free = $([math]::Round($free,1)) GB"
          if ($free -lt 80) {
            Write-Error "Need >= 80 GB free on C: at workflow start; have $([math]::Round($free,1)) GB"
            exit 1
          }

      - name: Prepend Git Bash + Unix coreutils to PATH
        shell: pwsh
        # Three things on PATH so bash steps + child processes both work:
        # - C:\Program Files\Git\bin            -> bash.exe, git.exe
        # - C:\Program Files\Git\usr\bin        -> coreutils (sleep, find, tar, dos2unix)
        # - C:\mozilla-build\msys2\usr\bin      -> backup coreutils (MozillaBuild ships them too)
        # Without usr\bin, MSYS2 bash steps can't find `sleep` etc. via PATH.
        # Without the prepend, anything spawning `bash` finds C:\Windows\System32\bash.exe
        # (the WSL launcher stub) first and fails.
        run: |
          @(
            'C:\Program Files\Git\bin',
            'C:\Program Files\Git\usr\bin',
            'C:\mozilla-build\msys2\usr\bin'
          ) | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      - name: Install GNU make (configure prerequisite)
        shell: pwsh
        # This MozillaBuild 4.2.1 install ships without mozmake.exe / make.exe
        # under C:\mozilla-build. configure errors with "Cannot find gmake".
        # Install GNU make via Chocolatey - the shim lands in
        # C:\ProgramData\chocolatey\bin (already on system PATH for every
        # job on this self-hosted runner).
        run: |
          $make = Get-Command make -ErrorAction SilentlyContinue
          if (-not $make) {
            choco install make -y --no-progress
            $make = Get-Command make -ErrorAction SilentlyContinue
            if (-not $make) {
              Write-Error "choco install make finished but 'make' still not on PATH"
              exit 1
            }
          }
          Write-Host "make on PATH: $($make.Source)"

      - name: Cleanup stale state
        shell: 'C:\mozilla-build\msys2\usr\bin\bash.exe --noprofile --norc -e -o pipefail {0}'
        run: |
          rm -rf .surfer/engine/firefox-*.source.tar/ 2>/dev/null || true
          git config --global core.safecrlf false
          git config --global core.autocrlf false

      - name: npm ci
        shell: 'C:\mozilla-build\msys2\usr\bin\bash.exe --noprofile --norc -e -o pipefail {0}'
        run: npm ci

      - name: Surfer CI
        shell: 'C:\mozilla-build\msys2\usr\bin\bash.exe --noprofile --norc -e -o pipefail {0}'
        run: |
          npm run surfer -- ci \
            --brand ${{ inputs.release_branch }} \
            --display-version ${{ inputs.display_version }}

      - id: version
        name: Capture version
        shell: 'C:\mozilla-build\msys2\usr\bin\bash.exe --noprofile --norc -e -o pipefail {0}'
        # Avoid `xargs` - msys2 cygwin fork-ASLR bug on this runner
        # makes it fail intermittently. Capture into a var, then echo
        # without trailing whitespace via parameter expansion.
        run: |
          raw=$(npm run --silent surfer -- get version)
          ver="${raw//[[:space:]]/}"
          if [ -z "$ver" ]; then
            echo "::error::surfer get version returned empty"
            exit 1
          fi
          echo "value=$ver" >> "$GITHUB_OUTPUT"
          echo "Captured version: $ver"

      - name: Download Firefox source
        shell: 'C:\mozilla-build\msys2\usr\bin\bash.exe --noprofile --norc -e -o pipefail {0}'
        # `npm run download` (surfer) hangs on Windows during the second of
        # its two 7z invocations - the one decompressing the inner .tar
        # (CLAUDE.md pitfall #9b). Confirmed in run 26116638863:
        #   00:03:16 Unpacking Firefox source on Windows (7z)
        #   00:03:36 Unpacking Firefox source again without the .xz extension
        #   00:17:23 (operator-cancelled, still hung)
        # Bypass surfer entirely: curl the tarball directly from Mozilla
        # archive, extract with GNU tar. This is exactly the manual workaround
        # CLAUDE.md documents.
        run: |
          set -e
          FF_VER=$(node -p "require('./surfer.json').version.version")
          TAR_URL="https://archive.mozilla.org/pub/firefox/releases/${FF_VER}/source/firefox-${FF_VER}.source.tar.xz"
          mkdir -p .surfer/engine
          TARBALL=".surfer/engine/firefox-${FF_VER}.source.tar.xz"

          # Download (curl with built-in retries)
          if [ ! -s "$TARBALL" ]; then
            echo "Downloading $TAR_URL ..."
            for i in 1 2 3 4 5; do
              if curl --fail --location --silent --show-error \
                      --retry 3 --retry-delay 10 \
                      -o "$TARBALL.part" "$TAR_URL"; then
                mv "$TARBALL.part" "$TARBALL"
                break
              fi
              echo "Download attempt $i failed; sleeping $((i*15))s"
              sleep $((i*15))
              [ $i -eq 5 ] && { echo "ERROR: download failed after 5 attempts"; exit 1; }
            done
          else
            echo "Tarball already present at $TARBALL ($(stat -c%s "$TARBALL") bytes); skipping download"
          fi

          # Extract via Windows native tar (C:\Windows\System32\tar.exe,
          # libarchive-based). MSYS2's tar invokes a child to decompress xz
          # and that child's fork fails with the cygwin DLL ASLR issue
          # (same root cause that broke `timeout` and `find`). Windows
          # tar handles .tar.xz in-process with no fork.
          echo "Extracting $TARBALL -> engine/ ..."
          rm -rf engine
          mkdir -p engine
          /c/Windows/System32/tar.exe --strip-components=1 -xf "$TARBALL" -C engine/
          echo "Extraction OK; engine/ has $(ls engine | wc -l) top-level entries"

      - name: Download language packs
        shell: 'C:\mozilla-build\msys2\usr\bin\bash.exe --noprofile --norc -e -o pipefail {0}'
        run: bash scripts/download-language-packs.sh

      - name: dos2unix patches
        shell: pwsh
        # CRLF -> LF conversion on src/**/*.patch. Done in PowerShell because
        # MSYS2 `find -exec dos2unix` triggers cygwin fork ASLR failure
        # (msys-iconv-2.dll loaded at different addresses in parent vs child).
        # Same root cause that broke `timeout` in an earlier iteration.
        run: |
          Get-ChildItem -Path src -Recurse -Filter *.patch | ForEach-Object {
            $bytes = [System.IO.File]::ReadAllBytes($_.FullName)
            $text  = [System.Text.Encoding]::UTF8.GetString($bytes)
            $fixed = $text -replace "`r`n", "`n"
            if ($fixed -ne $text) {
              [System.IO.File]::WriteAllText($_.FullName, $fixed, [System.Text.UTF8Encoding]::new($false))
            }
          }
          Write-Host "dos2unix done"

      - name: Apply patches
        shell: 'C:\mozilla-build\msys2\usr\bin\bash.exe --noprofile --norc -e -o pipefail {0}'
        run: npm run import -- --verbose

      - name: Diagnostic — verify zen overlays applied to engine
        shell: 'C:\mozilla-build\msys2\usr\bin\bash.exe --noprofile --norc -e -o pipefail {0}'
        # apply-patches.sh uses `ln -s` to overlay src/zen onto engine/zen
        # and `cp -r ... 2>/dev/null || true` for engine-overlays. On
        # MSYS2 bash the ln -s behavior depends on MSYS=winsymlinks:...
        # and the cp errors are silently swallowed. Verify the actual
        # state of engine/ BEFORE the 5h build so we fail fast.
        run: |
          fail=0
          echo "::group::engine/zen/ dir layout"
          if [ -d engine/zen ]; then
            find engine/zen -maxdepth 2 -type d | head -20
          else
            echo "MISSING — engine/zen/ doesn't exist"
            fail=1
          fi
          echo "::endgroup::"

          echo "::group::engine/zen/common/styles/ (zen UI CSS)"
          if [ -d engine/zen/common/styles ]; then
            ls -la engine/zen/common/styles/ | head -10
            file_count=$(find engine/zen/common/styles -type f | wc -l)
            echo "file count: $file_count"
            if [ "$file_count" -lt 3 ]; then
              echo "::warning::engine/zen/common/styles has <3 files — overlay may be incomplete"
              fail=1
            fi
          else
            echo "MISSING — engine/zen/common/styles doesn't exist"
            fail=1
          fi
          echo "::endgroup::"

          echo "::group::symlinks still under engine/zen (step 3b should have replaced all)"
          symlink_count=$(find engine/zen -type l 2>/dev/null | wc -l)
          echo "symlink count: $symlink_count"
          if [ "$symlink_count" -gt 0 ]; then
            echo "::warning::$symlink_count symlinks remain — preprocessor will fail #include"
            find engine/zen -type l | head -10
            fail=1
          fi
          echo "::endgroup::"

          echo "::group::engine-overlays applied (zen-assets.inc.xhtml)"
          if [ -f engine/browser/base/content/zen-assets.inc.xhtml ]; then
            echo "FOUND — engine-overlays cp succeeded"
            wc -l engine/browser/base/content/zen-assets.inc.xhtml
          else
            echo "::error::MISSING — engine/browser/base/content/zen-assets.inc.xhtml"
            echo "engine-overlays cp -r failed silently (apply-patches.sh:164 uses 2>/dev/null || true)"
            fail=1
          fi
          echo "::endgroup::"

          echo "::group::ZenComponents.manifest"
          if [ -f engine/zen/ZenComponents.manifest ]; then
            echo "FOUND"
          else
            echo "::error::MISSING — engine/zen/ZenComponents.manifest"
            fail=1
          fi
          echo "::endgroup::"

          echo "::group::jar.inc.mn has zen-sidebar-right.css?"
          if [ -f engine/zen/common/jar.inc.mn ]; then
            c=$(grep -c 'zen-sidebar-right.css' engine/zen/common/jar.inc.mn || true)
            echo "occurrences: $c"
            if [ "$c" = "0" ]; then
              echo "::warning::zen-sidebar-right.css not in jar.inc.mn (step 1b sed didn't run)"
              fail=1
            fi
          else
            echo "MISSING — engine/zen/common/jar.inc.mn"
            fail=1
          fi
          echo "::endgroup::"

          echo "::group::sample zen overlay file check"
          # Verify a representative overlay file is a real file with content
          # (not a broken cygwin-emulation symlink or empty placeholder).
          for f in engine/zen/ZenComponents.manifest engine/zen/common/jar.inc.mn; do
            if [ -e "$f" ]; then
              size=$(stat -c%s "$f" 2>/dev/null || echo 0)
              type=$(stat -c%F "$f" 2>/dev/null || echo unknown)
              echo "$f: type=$type size=$size"
              if [ "$size" -lt 10 ]; then
                echo "::warning::$f has size <10 — broken symlink/empty file"
                fail=1
              fi
            fi
          done
          echo "::endgroup::"

          if [ "$fail" -ne 0 ]; then
            echo "::error::Zen overlay state is NOT clean — build will likely ship without Zen UI"
            echo "::error::Fix apply-patches.sh OR the workflow's npm-run-import step before continuing"
            exit 1
          fi
          echo "Zen overlays verified OK — engine has all expected files"

      - name: Blocklist MSVC STL internals in gecko-profiler bindgen
        shell: pwsh
        # Bindgen + MSVC 14.44 STL emits broken Rust for std::vector's
        # internal `_Vector_val<_Val_types>` typedef (a "Scary" cross-
        # instantiation iterator base) even when std::vector is opaque.
        # Build fails with:
        #   error[E0412]: cannot find type `_Val_types` in this scope
        #   pub type vector__Scary_val = root::std::_Vector_val<_Val_types>;
        # Patch tools/profiler/rust-api/build.rs to also blocklist the
        # MSVC STL internals (anything in std::_*). This is a CI-only
        # patch (engine/ is regenerated each run from patches+overlays).
        run: |
          $f = 'engine\tools\profiler\rust-api\build.rs'
          if (-not (Test-Path $f)) { throw "Missing $f" }
          $text = Get-Content -Raw $f
          if ($text -match 'allowlist_recursively') {
            Write-Host "build.rs already patched"
          } else {
            # MSVC 14.44 STL has nested types (std::_Vector_val<_Val_types>,
            # _Scary_val) that bindgen + LLVM 20 libclang traverse from
            # allowlisted gecko_profiler_* fns -> std::vector typedefs ->
            # panic in builder.generate(). opaque_type/blocklist_type
            # patterns alone don't prevent the recursion.
            #
            # Fix: allowlist_recursively(false) stops bindgen from
            # auto-pulling referenced types. Without it, gecko_profiler_*
            # function signatures reference mozilla::TimeStamp etc., so
            # we explicitly allowlist every type the signatures need.
            # Allowlist each referenced type AND mark mozilla types opaque
            # so generated structs become [u8; N] blobs (auto-derive Debug).
            # Without opaque_type, allowlist_recursively(false) emits
            # type-name placeholders that fail "doesn't implement Debug".
            $lines = @(
              '        .allowlist_recursively(false)',
              '        .blocklist_type(".*_Vector_val.*")',
              '        .blocklist_type(".*_Val_types.*")',
              '        .blocklist_type(".*_Scary_val.*")',
              '        .allowlist_type("std::string")',
              '        .allowlist_type("mozilla::TimeStamp")',
              '        .opaque_type("mozilla::TimeStamp")',
              '        .allowlist_type("mozilla::TimeStampValue")',
              '        .opaque_type("mozilla::TimeStampValue")',
              '        .allowlist_type("mozilla::TimeDuration")',
              '        .opaque_type("mozilla::TimeDuration")',
              '        .allowlist_type("mozilla::AutoProfilerLabel")',
              '        .opaque_type("mozilla::AutoProfilerLabel")',
              '        .allowlist_type("mozilla::MarkerTiming")',
              '        .opaque_type("mozilla::MarkerTiming")',
              '        .allowlist_type("mozilla::MarkerSchema")',
              '        .opaque_type("mozilla::MarkerSchema")',
              '        .allowlist_type("mozilla::MarkerSchema_Location")',
              '        .allowlist_type("mozilla::MarkerSchema_Format")',
              '        .allowlist_type("mozilla::MarkerSchema_PayloadFlags")',
              '        .allowlist_type("mozilla::StackCaptureOptions")',
              '        .allowlist_type("mozilla::baseprofiler::ProfilingCategoryPair")',
              '        .allowlist_type("mozilla::baseprofiler::SpliceableJSONWriter")',
              '        .opaque_type("mozilla::baseprofiler::SpliceableJSONWriter")',
              '        .allowlist_type("mozilla::baseprofiler::UniqueJSONStrings")',
              '        .allowlist_type("JS::ProfilingCategoryPair")'
            )
            $inject = [string]::Join("`r`n", $lines)
            $text = $text -replace '(\.opaque_type\("std::vector"\))', "`$1`r`n$inject"
            Set-Content -Path $f -Value $text -NoNewline
            Write-Host "Patched $f"
            Get-Content $f | Select-String -Pattern 'opaque_type|blocklist_type|allowlist_recursively|allowlist_type' | ForEach-Object { Write-Host $_ }
          }

      - name: Inject agent (x86_64)
        shell: 'C:\mozilla-build\msys2\usr\bin\bash.exe --noprofile --norc -e -o pipefail {0}'
        env:
          GH_TOKEN: ${{ secrets.DEPLOY_KEY }}
        run: bash scripts/gha/inject-agent.sh x86_64

      - name: Inject agent (aarch64)
        if: ${{ !inputs.skip_arm64 }}
        shell: 'C:\mozilla-build\msys2\usr\bin\bash.exe --noprofile --norc -e -o pipefail {0}'
        env:
          GH_TOKEN: ${{ secrets.DEPLOY_KEY }}
        run: bash scripts/gha/inject-agent.sh aarch64

      - name: Initialize engine git repo (for create_rc.py)
        shell: 'C:\mozilla-build\msys2\usr\bin\bash.exe --noprofile --norc -e -o pipefail {0}'
        # CLAUDE.md pitfall #9b: Mozilla's config/create_rc.py calls
        #   git log -1 --format=%ad milestone.txt
        # to embed the file's mtime into the Windows .exe resource. A bare
        # `git init` (no commits) makes git log exit 128.
        #
        # Earlier iterations did `git add -f .` over the entire engine tree
        # (~100k files) to satisfy this. On this runner that hung at 25+ min
        # (run 26122415863). Optimization: only milestone.txt needs to be
        # tracked in a commit to satisfy create_rc.py.
        run: |
          cd engine
          git init -q
          git config core.safecrlf false
          git add -f config/milestone.txt
          git -c user.name='NevoFlux GHA' \
              -c user.email='nevoflux-gha@nevoflux.com' \
              commit -q -m "GHA Windows build init (milestone only)"
          echo "engine git initialized with $(git log --oneline | wc -l) commit(s)"

      - name: Stage windows-rs crate (configure requirement)
        shell: pwsh
        # Firefox 149 configure unconditionally requires the `windows`
        # Rust crate source at version 0.62.2 (same crate id from crates.io
        # that taskcluster's toolchains.yml fetches). Without it, configure
        # errors:
        #   ERROR: Cannot find the windows rust crate source.
        #   ... set `MOZ_WINDOWS_RS_DIR` to location of the
        #   `windows-0.62.2` directory
        # The .crate file from crates.io is a tar.gz containing a single
        # top-level `windows-0.62.2/` directory. Extract to win-rs/ and
        # MOZ_WINDOWS_RS_DIR points at win-rs\windows-0.62.2 (must contain
        # Cargo.toml directly, per toolkit/moz.configure line 4249).
        run: |
          $cacheDir = 'C:\nevoflux-cache\winrs'
          New-Item -ItemType Directory -Force $cacheDir | Out-Null
          $crate = Join-Path $cacheDir 'windows-0.62.2.crate'
          if (-not (Test-Path $crate) -or (Get-Item $crate).Length -lt 1MB) {
            Write-Host "Downloading windows-0.62.2.crate from crates.io ..."
            $ProgressPreference = 'SilentlyContinue'
            Invoke-WebRequest `
              -Uri 'https://crates.io/api/v1/crates/windows/0.62.2/download' `
              -OutFile $crate
          } else {
            Write-Host "Using cached crate: $crate ($([math]::Round((Get-Item $crate).Length/1MB,2)) MB)"
          }

          $extractRoot = Join-Path $env:GITHUB_WORKSPACE 'win-rs'
          if (Test-Path $extractRoot) { Remove-Item -Recurse -Force $extractRoot }
          New-Item -ItemType Directory -Force $extractRoot | Out-Null

          # The .crate is a gzipped tar; Windows tar handles it in-process.
          & 'C:\Windows\System32\tar.exe' -xzf $crate -C $extractRoot
          if ($LASTEXITCODE -ne 0) { throw "tar failed extracting $crate" }

          $expected = Join-Path $extractRoot 'windows-0.62.2'
          if (-not (Test-Path $expected)) { throw "Expected dir missing: $expected" }
          Write-Host "Staged windows-rs crate at $expected"

      - name: Stage Windows App SDK (configure requirement)
        shell: pwsh
        # toolkit/moz.configure unconditionally requires a Windows App SDK
        # dir on Windows (raises FatalCheckError if absent). taskcluster
        # bootstraps it via the "winappsdk-{cpu}-pc-windows-msvc" toolchain
        # task, which we don't run here. Mirror Mozilla's build-WindowsAppSDK.sh:
        # download the 1.8 redist zip, extract the per-arch MSIX, copy the 8
        # DLLs Firefox actually links against. Result dirs are consumed via
        # MOZ_WINDOWS_APP_SDK_DIR in each build job.
        # Cache the redist zip on the runner (~450 MB) so we download once.
        run: |
          Add-Type -AssemblyName System.IO.Compression.FileSystem

          $cacheDir = 'C:\nevoflux-cache\winappsdk'
          New-Item -ItemType Directory -Force $cacheDir | Out-Null
          $redist = Join-Path $cacheDir 'Microsoft.WindowsAppRuntime.Redist.1.8.zip'
          if (-not (Test-Path $redist) -or (Get-Item $redist).Length -lt 100MB) {
            Write-Host "Downloading Windows App SDK redist 1.8 ..."
            $ProgressPreference = 'SilentlyContinue'
            Invoke-WebRequest `
              -Uri 'https://aka.ms/windowsappsdk/1.8/1.8.251106002/Microsoft.WindowsAppRuntime.Redist.1.8.zip' `
              -OutFile $redist
          } else {
            Write-Host "Using cached redist: $redist ($([math]::Round((Get-Item $redist).Length/1MB,1)) MB)"
          }

          $dlls = @(
            'CoreMessagingXP.dll',
            'marshal.dll',
            'Microsoft.InputStateManager.dll',
            'Microsoft.Internal.FrameworkUdk.dll',
            'Microsoft.UI.Composition.OSSupport.dll',
            'Microsoft.UI.Input.dll',
            'Microsoft.UI.Windowing.Core.dll',
            'Microsoft.UI.Windowing.dll'
          )

          $extractRoot = Join-Path $env:GITHUB_WORKSPACE 'win-app-sdk'
          if (Test-Path $extractRoot) { Remove-Item -Recurse -Force $extractRoot }
          New-Item -ItemType Directory -Force $extractRoot | Out-Null

          $tmp = (New-Item -ItemType Directory -Force (Join-Path $extractRoot '_tmp')).FullName
          [System.IO.Compression.ZipFile]::ExtractToDirectory($redist, $tmp)

          function Stage-Arch($archDir, $outName) {
            $msix = Join-Path $tmp "MSIX\win10-$archDir\Microsoft.WindowsAppRuntime.1.8.msix"
            if (-not (Test-Path $msix)) { throw "MSIX missing: $msix" }
            $msixTmp = (New-Item -ItemType Directory -Force (Join-Path $extractRoot "_msix-$archDir")).FullName
            [System.IO.Compression.ZipFile]::ExtractToDirectory($msix, $msixTmp)
            $out = (New-Item -ItemType Directory -Force (Join-Path $extractRoot $outName)).FullName
            foreach ($d in $dlls) {
              Copy-Item -Force (Join-Path $msixTmp $d) $out
            }
            Remove-Item -Recurse -Force $msixTmp
            Write-Host "Staged $outName -> $out"
          }

          Stage-Arch 'x64' 'x64'
          if ('${{ inputs.skip_arm64 }}' -ne 'true') {
            Stage-Arch 'arm64' 'arm64'
          }

          Remove-Item -Recurse -Force $tmp
          Get-ChildItem -Recurse $extractRoot | ForEach-Object { Write-Host $_.FullName }

      - name: Install ARM64 VC build tools (if !skip_arm64)
        if: ${{ !inputs.skip_arm64 }}
        shell: pwsh
        # Firefox's build/moz.configure/toolchain.configure picks the MSVC
        # version named in VC/Auxiliary/Build/Microsoft.VCToolsVersion.default.txt
        # and looks for bin/Hostx64/arm64/cl.exe under it. If that cross-
        # compiler is missing, configure dies with
        #   ERROR: Cannot find a Visual C++ install for e.g. ATL headers.
        # (The "ATL headers" wording in build/moz.configure/windows.configure:271
        # is misleading — the actual failure is `find_program("cl.exe", ...)`
        # returning nothing because the target's cl.exe is absent.)
        #
        # Previous detection scanned every MSVC version subdir for any
        # atlmfc/lib/arm64 directory and short-circuited if one was found.
        # That matched leftover atl bits in old MSVC 14.30.30705 while the
        # default tools version (14.44.35207) was missing both the ARM64
        # cross-compiler AND atlmfc/lib/arm64 — so vs_installer modify was
        # never run, and arm64-final kept failing at configure.
        #
        # Correct check: ONLY look at the default-tools-version subdir
        # (the one Mozilla actually uses) and require bin/Hostx64/arm64/cl.exe.
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          if (-not (Test-Path $vswhere)) {
            Write-Host "vswhere.exe not found; skipping VS ARM64 component install"
            return
          }
          $vsInstall = & $vswhere -latest -property installationPath
          if (-not $vsInstall) {
            Write-Host "No VS install found via vswhere; skipping"
            return
          }
          Write-Host "VS install path: $vsInstall"
          $defaultVerFile = Join-Path $vsInstall 'VC\Auxiliary\Build\Microsoft.VCToolsVersion.default.txt'
          $defaultVer = $null
          if (Test-Path $defaultVerFile) {
            $defaultVer = (Get-Content -Raw $defaultVerFile).Trim()
          }
          Write-Host "Default MSVC tools version: $defaultVer"
          $needInstall = $true
          if ($defaultVer) {
            $arm64Cl = Join-Path $vsInstall "VC\Tools\MSVC\$defaultVer\bin\Hostx64\arm64\cl.exe"
            $arm64Atl = Join-Path $vsInstall "VC\Tools\MSVC\$defaultVer\atlmfc\lib\arm64"
            if ((Test-Path $arm64Cl) -and (Test-Path $arm64Atl)) {
              Write-Host "ARM64 cross-compiler + ATL already present in default tools $defaultVer; skipping vs_installer modify"
              $needInstall = $false
            } else {
              Write-Host "Missing in $defaultVer -> cl.exe present: $(Test-Path $arm64Cl), ATL/arm64 present: $(Test-Path $arm64Atl)"
            }
          }
          if (-not $needInstall) { return }
          $vsInstaller = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vs_installer.exe"
          if (-not (Test-Path $vsInstaller)) {
            Write-Error "vs_installer.exe not found; can't add ARM64 components"
            exit 1
          }
          Write-Host "Adding ARM64 VC tools + ATL to $vsInstall ..."
          $args = @(
            'modify',
            '--installPath', $vsInstall,
            '--add', 'Microsoft.VisualStudio.Component.VC.Tools.ARM64',
            '--add', 'Microsoft.VisualStudio.Component.VC.ATL.ARM64',
            '--quiet', '--norestart', '--wait'
          )
          & $vsInstaller @args
          $rc = $LASTEXITCODE
          if ($rc -ne 0 -and $rc -ne 3010) {
            Write-Error "vs_installer modify failed: exit $rc"
            exit $rc
          }
          Write-Host "vs_installer completed (exit $rc); re-verifying ARM64 cross-compiler ..."
          if ($defaultVer) {
            $arm64Cl = Join-Path $vsInstall "VC\Tools\MSVC\$defaultVer\bin\Hostx64\arm64\cl.exe"
            if (-not (Test-Path $arm64Cl)) {
              Write-Error "vs_installer claimed success but $arm64Cl still missing"
              exit 1
            }
            Write-Host "OK: $arm64Cl present"
          }

      - name: Install NSIS (Windows installer prerequisite)
        shell: pwsh
        # browser/moz.build only adds installer/windows to DIRS when
        # CONFIG["MAKENSISU"] is set. configure picks MAKENSISU up
        # from NSIS's makensis.exe on PATH. Without NSIS installed,
        # browser/installer/windows/Makefile is never generated, and
        # packager.mk's `make -C windows installer` fails with
        #   make[3]: *** windows: No such file or directory.
        # Chocolatey installs makensis.exe but doesn't refresh the
        # current process PATH, AND doesn't auto-shim makensis.exe.
        # Add NSIS bin dir to GITHUB_PATH so subsequent jobs see it.
        run: |
          $nsisBin = 'C:\Program Files (x86)\NSIS'
          $nsis = Get-Command makensis -ErrorAction SilentlyContinue
          if (-not $nsis) {
            if (-not (Test-Path (Join-Path $nsisBin 'makensis.exe'))) {
              choco install nsis -y --no-progress
            }
          } else {
            Write-Host "NSIS already on PATH: $($nsis.Source)"
          }
          if (Test-Path (Join-Path $nsisBin 'makensis.exe')) {
            Add-Content -Path $env:GITHUB_PATH -Value $nsisBin
            Write-Host "NSIS bin added to GITHUB_PATH: $nsisBin"
          } else {
            Write-Error "makensis.exe still not present after install"
            exit 1
          }

      - name: Install nasm (configure requirement)
        shell: pwsh
        # configure: "Nasm is required to build with AV1, FFVPX, JPEG and VPX,
        # but it was not found." mach bootstrap on Windows doesn't install it
        # in CI. Use Chocolatey (already provisioned on this runner) — the
        # shim lands in C:\ProgramData\chocolatey\bin which is on system PATH.
        run: |
          $nasm = Get-Command nasm -ErrorAction SilentlyContinue
          if (-not $nasm) {
            choco install nasm -y --no-progress
            $defaultNasm = 'C:\Program Files\NASM'
            if (Test-Path (Join-Path $defaultNasm 'nasm.exe')) {
              Add-Content -Path $env:GITHUB_PATH -Value $defaultNasm
            }
          } else {
            Write-Host "nasm already on PATH: $($nasm.Source)"
          }

      - name: Stage LLVM 20 (matches Firefox 149 taskcluster toolchain)
        shell: pwsh
        # Firefox 149 was built/tested with clang 20 (see
        # taskcluster/kinds/toolchain/clang.yml: build/build-clang/clang-20.json).
        # Newer clang (e.g. 22 from winget) promotes more warnings to errors
        # (-Wincompatible-pointer-types in nsprpub) and breaks bindgen on MSVC
        # STL internals. Stage the official LLVM 20 portable build to a
        # persistent cache dir on the runner. PATH prepend handled by build
        # jobs (mozbuild-clang already first in the build-job PATH list).
        run: |
          $cacheRoot = 'C:\nevoflux-cache\llvm-20'
          $clangCl = Join-Path $cacheRoot 'bin\clang-cl.exe'
          if (Test-Path $clangCl) {
            $ver = & $clangCl --version 2>&1 | Select-Object -First 1
            Write-Host "LLVM 20 already staged: $ver"
          } else {
            New-Item -ItemType Directory -Force 'C:\nevoflux-cache' | Out-Null
            $tarball = 'C:\nevoflux-cache\clang+llvm-20.1.7-x86_64-pc-windows-msvc.tar.xz'
            if (-not (Test-Path $tarball) -or (Get-Item $tarball).Length -lt 50MB) {
              Write-Host "Downloading LLVM 20.1.7 portable ..."
              $ProgressPreference = 'SilentlyContinue'
              # `+` URL-encoded as %2B to match GitHub's browser_download_url.
              Invoke-WebRequest `
                -Uri 'https://github.com/llvm/llvm-project/releases/download/llvmorg-20.1.7/clang%2Bllvm-20.1.7-x86_64-pc-windows-msvc.tar.xz' `
                -OutFile $tarball
            }
            $stageTmp = 'C:\nevoflux-cache\_llvm-20-stage'
            if (Test-Path $stageTmp) { Remove-Item -Recurse -Force $stageTmp }
            New-Item -ItemType Directory -Force $stageTmp | Out-Null
            Write-Host "Extracting $tarball ..."
            & 'C:\Windows\System32\tar.exe' -xJf $tarball -C $stageTmp
            if ($LASTEXITCODE -ne 0) { throw "tar extract failed" }
            $extractedRoot = Get-ChildItem $stageTmp -Directory | Select-Object -First 1
            if (-not $extractedRoot) { throw "no dir inside $stageTmp" }
            if (Test-Path $cacheRoot) { Remove-Item -Recurse -Force $cacheRoot }
            Move-Item $extractedRoot.FullName $cacheRoot
            Remove-Item -Recurse -Force $stageTmp
            $ver = & $clangCl --version 2>&1 | Select-Object -First 1
            Write-Host "LLVM 20 staged at $cacheRoot ($ver)"
          }

      - name: Install LLVM/Clang (clang-cl)
        shell: pwsh
        # Fallback: ensure SOME clang-cl is on PATH for any pre-bootstrap
        # step in prepare that may need it. The LLVM 20 from the previous
        # step takes priority in build jobs via their PATH-prepend list.
        run: |
          $clangCl = Get-Command clang-cl -ErrorAction SilentlyContinue
          if (-not $clangCl) {
            $defaultLlvmBin = 'C:\Program Files\LLVM\bin'
            if (Test-Path (Join-Path $defaultLlvmBin 'clang-cl.exe')) {
              Add-Content -Path $env:GITHUB_PATH -Value $defaultLlvmBin
            } else {
              winget install --id LLVM.LLVM --silent --accept-source-agreements --accept-package-agreements
              if (Test-Path (Join-Path $defaultLlvmBin 'clang-cl.exe')) {
                Add-Content -Path $env:GITHUB_PATH -Value $defaultLlvmBin
              } else {
                Write-Host "::error::LLVM install failed; clang-cl still missing"
                exit 1
              }
            }
          } else {
            Write-Host "clang-cl already on PATH: $($clangCl.Source)"
          }
          # Ensure LLVM 20 wins in this prepare job too (e.g. for steps that
          # might invoke clang before mach bootstrap).
          Add-Content -Path $env:GITHUB_PATH -Value 'C:\nevoflux-cache\llvm-20\bin'

      - name: mach bootstrap + Rust targets
        shell: 'C:\mozilla-build\msys2\usr\bin\bash.exe --noprofile --norc -e -o pipefail {0}'
        # Pin Rust to 1.90 - the stage3 PGO-LTO link needs the rust
        # bitcode emitter version to match our LLVM 20 lld-link.
        # Rust 1.91 ships LLVM 21 internally and produces bitcode with
        # attribute kind 103 that LLVM 20 lld-link can't read:
        #   lld-link: error: Unknown attribute kind (103)
        #     (Producer: LLVM21.1.2-rust-1.91.0-stable
        #      Reader:   LLVM 20.1.7)
        # Mozilla's MINIMUM_RUST_VERSION is 1.90.0, so 1.90 is fine.
        run: |
          cd engine
          ./mach --no-interactive bootstrap --application-choice browser
          cd ..
          rustup install 1.90.0 --no-self-update
          rustup default 1.90.0
          rustup target add x86_64-pc-windows-msvc
          if [ "${{ inputs.skip_arm64 }}" != "true" ]; then
            rustup target add aarch64-pc-windows-msvc
          fi
          rustc --version

      - name: Install cbindgen (configure requirement)
        shell: 'C:\mozilla-build\msys2\usr\bin\bash.exe --noprofile --norc -e -o pipefail {0}'
        # mach bootstrap on this self-hosted runner doesn't install cbindgen
        # (taskgraph fetch fails so no toolchain artifact). Install it directly
        # via cargo into ~/.cargo/bin (already on system PATH for all jobs).
        run: |
          if ! command -v cbindgen >/dev/null 2>&1; then
            cargo install --locked cbindgen
          else
            echo "cbindgen already installed: $(cbindgen --version)"
          fi

      - name: Create work dirs
        shell: pwsh
        run: New-Item -ItemType Directory -Force pgo-cache, out, dist | Out-Null

  # ----- PGO Stage 1: instrument build (skipped when skip_pgo=true) -----
  x64-stage1:
    # arm64-final runs before x64 PGO stages so a quick (no-PGO) arm64
    # failure surfaces in <1h instead of after a 5h x64 PGO run. When
    # skip_arm64=true, arm64-final is skipped and x64 still proceeds.
    needs: [prepare, arm64-final]
    if: ${{ !inputs.skip_pgo && always() && needs.prepare.result == 'success' && (needs.arm64-final.result == 'success' || needs.arm64-final.result == 'skipped') }}
    runs-on: [self-hosted, nevoflux-windows]
    env:
      SURFER_COMPAT: x86_64
      SURFER_PLATFORM: win32
      ZEN_GA_GENERATE_PROFILE: '1'
      ZEN_RELEASE: '1'
      MOZ_WINDOWS_APP_SDK_DIR: ${{ github.workspace }}\win-app-sdk\x64
      MOZ_WINDOWS_RS_DIR: ${{ github.workspace }}\win-rs\windows-0.62.2
    steps:
      - name: Prepend Git Bash + Unix coreutils + LLVM + NASM to PATH
        shell: pwsh
        # $GITHUB_PATH is per-job; re-applied in every job that uses bash.
        # LLVM bin (clang-cl) and NASM bin (configure prerequisite) live at
        # fixed paths. GNU make installed by prepare lives in chocolatey's
        # bin dir which is already on system PATH.
        run: |
          # LLVM 20 (staged by prepare) is Firefox 149's validated clang.
          # `C:\Program Files\LLVM\bin` (winget LLVM 22) is DELIBERATELY
          # absent: GitHub Actions processes $GITHUB_PATH lines so later
          # entries end up higher in PATH, so leaving it there would
          # supersede llvm-20 and pull clang 22 headers into bindgen.
          @(
            'C:\nevoflux-cache\llvm-20\bin',
            'C:\Program Files\Git\bin',
            'C:\Program Files\Git\usr\bin',
            'C:\mozilla-build\msys2\usr\bin',
            'C:\Program Files\NASM',
            'C:\Program Files (x86)\NSIS'
          ) | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      - name: Swap per-arch agent into AppDir/distribution/bin (x86_64)
        shell: 'C:\mozilla-build\msys2\usr\bin\bash.exe --noprofile --norc -e -o pipefail {0}'
        # Preserve build/AppDir/distribution/{extensions,policies.json} (VCS).
        # Only refresh the per-arch bin/ subdir from the prepare-staged
        # per-arch directory. The previous "rm -rf build/AppDir/distribution"
        # was wiping the agent xpi + policies.
        run: |
          if [ ! -d build/AppDir-x86_64/distribution/bin ]; then
            echo "::error::missing build/AppDir-x86_64/distribution/bin (prepare's inject-agent didn't run?)"
            exit 1
          fi
          rm -rf build/AppDir/distribution/bin
          mkdir -p build/AppDir/distribution
          cp -r build/AppDir-x86_64/distribution/bin build/AppDir/distribution/bin
          echo "AppDir/distribution after swap:"
          find build/AppDir/distribution -maxdepth 3 -type f | head -20

      - name: Build (instrumented)
        shell: 'C:\mozilla-build\msys2\usr\bin\bash.exe --noprofile --norc -e -o pipefail {0}'
        env:
          MOZ_BUILD_DATE: ${{ inputs.build_id }}
        # surfer build prompts "You have not imported all of your patches.
        # Are you sure you want to continue? (y/N)" when its tracker thinks
        # the patch state is incomplete. In CI stdin isn't a TTY so the
        # prompt sees EOF -> defaults to No -> exits without building.
        # Pipe "yes\n" so surfer continues regardless.
        run: npm run build < <(yes y)

      - name: Inject distribution + patch package-manifest (x86_64)
        shell: 'C:\mozilla-build\msys2\usr\bin\bash.exe --noprofile --norc -e -o pipefail {0}'
        # Mirror GCB cross-compile pipeline: after build, before package,
        # copy build/AppDir/distribution/* into engine's dist/bin/
        # distribution/, AND append @RESPATH@/distribution/** to
        # browser/installer/package-manifest.in so the packager bundles
        # it. Without these two steps, the produced installer has no
        # distribution/ directory (no agent xpi, no policies, no skills).
        run: |
          OBJ_DIR="engine/obj-x86_64-pc-windows-msvc"
          if [ -d build/AppDir/distribution ] && [ -d "$OBJ_DIR/dist/bin" ]; then
            mkdir -p "$OBJ_DIR/dist/bin/distribution"
            cp -r build/AppDir/distribution/* "$OBJ_DIR/dist/bin/distribution/"
            echo "Distribution injected into $OBJ_DIR/dist/bin/distribution/:"
            find "$OBJ_DIR/dist/bin/distribution" -maxdepth 3 -type f | head -20
          else
            echo "::warning::skipping distribution inject (src or dst missing)"
          fi
          MANIFEST="engine/browser/installer/package-manifest.in"
          if [ -f "$MANIFEST" ] && ! grep -q '@RESPATH@/distribution/' "$MANIFEST"; then
            printf '\n; NevoFlux distribution files\n@RESPATH@/distribution/**\n' >> "$MANIFEST"
            echo "Appended distribution/** to $MANIFEST"
          else
            echo "package-manifest.in already has distribution entry (or missing)"
          fi

      - name: Diagnostic — dump failing build-script outputs
        if: failure()
        shell: pwsh
        # When cargo build scripts fail, GHA's log streaming truncates
        # stderr. Read the captured per-crate output/stderr files
        # directly. Cargo nests target-triple builds under a SECOND
        # release/build dir; walk both so we catch gecko-profiler.
        run: |
          $roots = @(
            'engine\obj-x86_64-pc-windows-msvc\release\build',
            'engine\obj-x86_64-pc-windows-msvc\x86_64-pc-windows-msvc\release\build'
          )
          foreach ($root in $roots) {
            if (-not (Test-Path $root)) {
              Write-Host "(missing) $root"
              continue
            }
            Write-Host "##[group]Build dir: $root"
            Get-ChildItem -Directory $root | ForEach-Object {
              foreach ($f in @('output', 'stderr', 'invoked.timestamp')) {
                $p = Join-Path $_.FullName $f
                if (Test-Path $p) {
                  $size = (Get-Item $p).Length
                  if ($size -gt 0) {
                    Write-Host "=== $($_.Name)/$f ($size bytes) ==="
                    Get-Content $p -Tail 300
                  }
                }
              }
            }
            Write-Host "##[endgroup]"
          }
          # Also dump the bindings.rs that gecko-profiler emits, if any.
          $bindings = Get-ChildItem -Recurse -ErrorAction SilentlyContinue `
            -Path 'engine\obj-x86_64-pc-windows-msvc' -Filter 'bindings.rs' |
            Where-Object { $_.FullName -match 'gecko-profiler' }
          foreach ($b in $bindings) {
            Write-Host "##[group]bindings.rs: $($b.FullName)"
            Get-Content $b.FullName -TotalCount 400
            Write-Host "##[endgroup]"
          }

      - name: Package
        shell: 'C:\mozilla-build\msys2\usr\bin\bash.exe --noprofile --norc -e -o pipefail {0}'
        # surfer/mach's package eventually invokes `make -C browser/
        # installer windows` (NSIS subtarget) which fails on this
        # configure with "windows: No such file or directory" - no
        # `windows:` rule is emitted. The .zip stage1 actually needs
        # for stage2's profileserver IS produced earlier in the same
        # package run. Tolerate the installer-subtarget failure if a
        # zip exists. Use a GLOB - Mozilla labels the zip with the
        # internal browser app-version (e.g. 0.0.1), not the
        # surfer --display-version we passed.
        run: |
          set +e
          export ZEN_GA_DISABLE_PGO=true
          npm run package < <(yes y)
          pkg_rc=$?
          set -e
          shopt -s nullglob
          zips=(dist/nevoflux-*.en-US.win64.zip)
          shopt -u nullglob
          if [ ${#zips[@]} -gt 0 ] && [ -f "${zips[0]}" ]; then
            echo "Package zip present at ${zips[0]} (rc=$pkg_rc); proceeding to Stash"
            echo "PGO_STAGE1_ZIP=${zips[0]}" >> "$GITHUB_ENV"
          else
            echo "Package failed (rc=$pkg_rc) AND no zip in dist/"
            ls -la dist/ 2>/dev/null || true
            exit "$pkg_rc"
          fi

      - name: Stash PGO stage1 zip
        shell: pwsh
        run: |
          if (-not $env:PGO_STAGE1_ZIP) {
            throw "PGO_STAGE1_ZIP env var not set by Package step"
          }
          Move-Item -Force $env:PGO_STAGE1_ZIP "pgo-cache\pgo-stage-1.zip"

  # ----- PGO Stage 2: profileserver (skipped when skip_pgo=true) -----
  x64-stage2:
    needs: x64-stage1
    if: ${{ !inputs.skip_pgo }}
    runs-on: [self-hosted, nevoflux-windows]
    steps:
      - name: Prepend Git Bash + Unix coreutils + LLVM + NASM to PATH
        shell: pwsh
        run: |
          # LLVM 20 (staged by prepare) is Firefox 149's validated clang.
          # `C:\Program Files\LLVM\bin` (winget LLVM 22) is DELIBERATELY
          # absent: GitHub Actions processes $GITHUB_PATH lines so later
          # entries end up higher in PATH, so leaving it there would
          # supersede llvm-20 and pull clang 22 headers into bindgen.
          @(
            'C:\nevoflux-cache\llvm-20\bin',
            'C:\Program Files\Git\bin',
            'C:\Program Files\Git\usr\bin',
            'C:\mozilla-build\msys2\usr\bin',
            'C:\Program Files\NASM',
            'C:\Program Files (x86)\NSIS'
          ) | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      - name: Expand instrumented binary
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force "pgo-cache\instrumented" | Out-Null
          Expand-Archive -Force "pgo-cache\pgo-stage-1.zip" -DestinationPath "pgo-cache\instrumented"

      - name: Run profileserver via MozillaBuild
        shell: pwsh
        run: |
          $ws_msys = $env:GITHUB_WORKSPACE -replace '\\','/'
          if ($ws_msys -match '^([A-Za-z]):') {
            $ws_msys = '/' + $matches[1].ToLower() + $ws_msys.Substring(2)
          }
          $script = @"
          set -ex
          cd $ws_msys/engine
          export PATH=/c/mozilla-build/msys2/usr/bin:`$PATH
          LLVM_PROFDATA=/c/Users/`$USERNAME/.mozbuild/clang/bin/llvm-profdata.exe \
            JARLOG_FILE=$ws_msys/pgo-cache/en-US.log \
            ./mach python build/pgo/profileserver.py \
              --binary $ws_msys/pgo-cache/instrumented/nevoflux/nevoflux.exe
          cp merged.profdata $ws_msys/pgo-cache/merged.profdata
          "@
          Set-Content -Path "pgo-run.sh" -Value $script -Encoding ASCII
          & "C:\mozilla-build\start-shell.bat" "$env:GITHUB_WORKSPACE\pgo-run.sh"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Verify profile data + cleanup instrumented
        shell: pwsh
        run: |
          if (!(Test-Path "pgo-cache\merged.profdata")) { Write-Error "merged.profdata missing"; exit 1 }
          if (!(Test-Path "pgo-cache\en-US.log"))      { Write-Error "en-US.log missing";      exit 1 }
          Remove-Item -Recurse -Force "pgo-cache\instrumented"
          Remove-Item -Force "pgo-cache\pgo-stage-1.zip"

  # ----- PGO Stage 3: optimized x64 build (or no-PGO single build if skip_pgo=true) -----
  x64-stage3:
    needs: [prepare, x64-stage2, arm64-final]
    if: ${{ always() && needs.prepare.result == 'success' && (needs.arm64-final.result == 'success' || needs.arm64-final.result == 'skipped') && (needs.x64-stage2.result == 'success' || inputs.skip_pgo) }}
    runs-on: [self-hosted, nevoflux-windows]
    env:
      SURFER_COMPAT: x86_64
      SURFER_PLATFORM: win32
      ZEN_RELEASE: '1'
      MOZ_WINDOWS_APP_SDK_DIR: ${{ github.workspace }}\win-app-sdk\x64
      MOZ_WINDOWS_RS_DIR: ${{ github.workspace }}\win-rs\windows-0.62.2
    steps:
      - name: Prepend Git Bash + Unix coreutils + LLVM + NASM to PATH
        shell: pwsh
        run: |
          # LLVM 20 (staged by prepare) is Firefox 149's validated clang.
          # `C:\Program Files\LLVM\bin` (winget LLVM 22) is DELIBERATELY
          # absent: GitHub Actions processes $GITHUB_PATH lines so later
          # entries end up higher in PATH, so leaving it there would
          # supersede llvm-20 and pull clang 22 headers into bindgen.
          @(
            'C:\nevoflux-cache\llvm-20\bin',
            'C:\Program Files\Git\bin',
            'C:\Program Files\Git\usr\bin',
            'C:\mozilla-build\msys2\usr\bin',
            'C:\Program Files\NASM',
            'C:\Program Files (x86)\NSIS'
          ) | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      - name: Clean stale obj + swap per-arch agent (x86_64)
        shell: 'C:\mozilla-build\msys2\usr\bin\bash.exe --noprofile --norc -e -o pipefail {0}'
        # Wipe stage1's instrumented obj dir. For distribution: preserve
        # build/AppDir/distribution/{extensions,policies.json} (VCS) and
        # only swap the per-arch bin/ subdir. Previous rm -rf wiped the
        # agent xpi too.
        run: |
          rm -rf engine/obj-x86_64-pc-windows-msvc
          if [ ! -d build/AppDir-x86_64/distribution/bin ]; then
            echo "::error::missing build/AppDir-x86_64/distribution/bin"
            exit 1
          fi
          rm -rf build/AppDir/distribution/bin
          mkdir -p build/AppDir/distribution
          cp -r build/AppDir-x86_64/distribution/bin build/AppDir/distribution/bin

      - name: Build (PGO-use, or no-PGO if skip_pgo)
        shell: 'C:\mozilla-build\msys2\usr\bin\bash.exe --noprofile --norc -e -o pipefail {0}'
        env:
          MOZ_BUILD_DATE: ${{ inputs.build_id }}
          ZEN_GA_DISABLE_PGO: ${{ inputs.skip_pgo && '1' || '' }}
        run: |
          if [ "${{ inputs.skip_pgo }}" != "true" ]; then
            WS_MSYS=$(echo "$GITHUB_WORKSPACE" | sed 's|\\|/|g' | sed -E 's|^([A-Za-z]):|/\L\1|')
            export NEVOFLUX_PGO_PROFILE_DIR="$WS_MSYS/pgo-cache"
            echo "PGO mode: profile-use from $NEVOFLUX_PGO_PROFILE_DIR"
          else
            echo "PGO mode: disabled (skip_pgo=true)"
          fi
          # See stage1 comment re: surfer interactive prompt.
          npm run build < <(yes y)

      - name: Inject distribution + patch package-manifest (x86_64)
        shell: 'C:\mozilla-build\msys2\usr\bin\bash.exe --noprofile --norc -e -o pipefail {0}'
        # Mirror GCB pipeline - see stage1 step for rationale.
        run: |
          OBJ_DIR="engine/obj-x86_64-pc-windows-msvc"
          if [ -d build/AppDir/distribution ] && [ -d "$OBJ_DIR/dist/bin" ]; then
            mkdir -p "$OBJ_DIR/dist/bin/distribution"
            cp -r build/AppDir/distribution/* "$OBJ_DIR/dist/bin/distribution/"
            echo "Distribution injected:"
            find "$OBJ_DIR/dist/bin/distribution" -maxdepth 3 -type f | head -20
          else
            echo "::warning::skipping distribution inject (src or dst missing)"
          fi
          MANIFEST="engine/browser/installer/package-manifest.in"
          if [ -f "$MANIFEST" ] && ! grep -q '@RESPATH@/distribution/' "$MANIFEST"; then
            printf '\n; NevoFlux distribution files\n@RESPATH@/distribution/**\n' >> "$MANIFEST"
            echo "Appended distribution/** to $MANIFEST"
          else
            echo "package-manifest.in already has distribution entry (or missing)"
          fi

      - name: Diagnostic — PGO engagement
        shell: 'C:\mozilla-build\msys2\usr\bin\bash.exe --noprofile --norc -e -o pipefail {0}'
        if: ${{ !inputs.skip_pgo }}
        run: |
          grep -E 'MOZ_PROFILE_USE|profile-use' engine/obj-x86_64-pc-windows-msvc/config.status || \
            echo "WARN: PGO indicator not found in config.status (PGO may not be active)"

      - name: Package
        shell: 'C:\mozilla-build\msys2\usr\bin\bash.exe --noprofile --norc -e -o pipefail {0}'
        # mach package + NSIS installer build are succeeding now, but
        # surfer's post-make MAR creation step hits a path-conversion
        # bug (passes a path missing the drive letter to make_full_
        # update.sh, which then fails pushd). The zip and installer.exe
        # are produced before MAR creation, so accept rc!=0 iff the
        # primary artifacts exist.
        run: |
          set +e
          npm run package < <(yes y)
          pkg_rc=$?
          set -e
          shopt -s nullglob
          zips=(dist/nevoflux-*.en-US.win64.zip)
          shopt -u nullglob
          have_zip=0; have_inst=0
          [ ${#zips[@]} -gt 0 ] && [ -f "${zips[0]}" ] && have_zip=1
          [ -f dist/nevoflux.installer.exe ] && have_inst=1
          if [ "$have_zip" -eq 1 ] && [ "$have_inst" -eq 1 ]; then
            echo "Primary artifacts present (zip + installer.exe), pkg rc=$pkg_rc"
            echo "X64_ZIP=${zips[0]}" >> "$GITHUB_ENV"
            ls -la dist/ 2>/dev/null || true
          else
            echo "Package failed (rc=$pkg_rc) and missing primary artifact(s):"
            echo "  zip=$have_zip  installer.exe=$have_inst"
            ls -la dist/ 2>/dev/null || true
            exit "$pkg_rc"
          fi

      - name: Diagnostic — verify distribution baked into x64 package
        shell: 'C:\mozilla-build\msys2\usr\bin\bash.exe --noprofile --norc -e -o pipefail {0}'
        # Even if our "Inject distribution + patch package-manifest" step
        # ran, the packager may have ignored the manifest patch. Verify
        # the produced zip + installer.exe actually contain
        # distribution/extensions/agent@nevoflux.com.xpi.
        run: |
          fail=0
          ZIP="$X64_ZIP"
          echo "::group::zip ($ZIP) contents under distribution/"
          if [ ! -f "$ZIP" ]; then
            echo "::error::zip missing at $ZIP"
            fail=1
          else
            # Windows native tar can list zip via libarchive on newer builds;
            # use unzip for content listing (available in Git Bash usr/bin).
            if command -v unzip >/dev/null 2>&1; then
              entries=$(unzip -l "$ZIP" 2>/dev/null | grep -i 'distribution/' || true)
              echo "$entries" | head -20
              count=$(echo "$entries" | grep -c .)
              xpi_present=$(echo "$entries" | grep -c 'agent@nevoflux.com.xpi' || true)
              echo "total distribution/* entries: $count"
              echo "agent xpi present: $xpi_present"
              if [ "$count" = "0" ]; then
                echo "::error::zip has NO distribution/* entries — packager dropped it"
                fail=1
              elif [ "$xpi_present" = "0" ]; then
                echo "::warning::distribution/ present but agent xpi missing"
                fail=1
              fi
            else
              echo "::warning::unzip not available; skipping zip content check"
            fi
          fi
          echo "::endgroup::"

          echo "::group::installer.exe (NSIS) contents under distribution/"
          INST="dist/nevoflux.installer.exe"
          if [ ! -f "$INST" ]; then
            echo "::error::installer missing at $INST"
            fail=1
          elif command -v 7z >/dev/null 2>&1; then
            # NSIS exe is a self-extracting 7z-like archive
            entries=$(7z l "$INST" 2>/dev/null | grep -i 'distribution[\/]' || true)
            echo "$entries" | head -20
            xpi=$(echo "$entries" | grep -c 'agent@nevoflux.com.xpi' || true)
            count=$(echo "$entries" | grep -c .)
            echo "total entries: $count  xpi: $xpi"
            if [ "$count" = "0" ]; then
              echo "::warning::installer.exe has NO distribution/* — NSIS bundle didn't pick it up"
              fail=1
            fi
          else
            echo "::warning::7z not available; skipping installer content check"
          fi
          echo "::endgroup::"

          echo "::group::source-of-truth on disk: engine/obj-*/dist/bin/distribution/"
          DIST="engine/obj-x86_64-pc-windows-msvc/dist/bin/distribution"
          if [ -d "$DIST" ]; then
            find "$DIST" -maxdepth 3 -type f | head -20
          else
            echo "MISSING — inject step apparently didn't run or got wiped"
            fail=1
          fi
          echo "::endgroup::"

          if [ "$fail" -ne 0 ]; then
            echo "::error::distribution not in produced x64 artifacts — installer will lack agent xpi"
            exit 1
          fi
          echo "distribution verified in x64 zip + installer"

      - name: Stage final x64 artifacts
        shell: pwsh
        run: |
          if (-not $env:X64_ZIP) { throw "X64_ZIP env not set by Package step" }
          Move-Item -Force $env:X64_ZIP                         "out\nevoflux.win-x86_64-gha.zip"
          Move-Item -Force "dist\nevoflux.installer.exe"        "out\nevoflux.installer-gha.exe"
          # MAR may be missing if surfer's post-make MAR step hit the
          # path-conversion bug; stage if present, otherwise skip.
          if (Test-Path "dist\output.mar") {
            Move-Item -Force "dist\output.mar"                  "out\windows-gha.mar"
          } else {
            Write-Host "::warning::dist\output.mar missing - partial update MAR not produced"
          }

  # ----- arm64 build (skipped when skip_arm64=true) -----
  arm64-final:
    # Runs BEFORE x64 PGO stages so a fast (no-PGO) arm64 failure
    # short-circuits the longer x64 pipeline. x64 stages gate on
    # arm64-final's result being either success OR skipped.
    needs: prepare
    if: ${{ !inputs.skip_arm64 }}
    runs-on: [self-hosted, nevoflux-windows]
    env:
      SURFER_COMPAT: aarch64
      SURFER_PLATFORM: win32
      ZEN_GA_DISABLE_PGO: '1'
      ZEN_RELEASE: '1'
      MOZ_WINDOWS_APP_SDK_DIR: ${{ github.workspace }}\win-app-sdk\arm64
      MOZ_WINDOWS_RS_DIR: ${{ github.workspace }}\win-rs\windows-0.62.2
    steps:
      - name: Prepend Git Bash + Unix coreutils + LLVM + NASM to PATH
        shell: pwsh
        run: |
          # LLVM 20 (staged by prepare) is Firefox 149's validated clang.
          # `C:\Program Files\LLVM\bin` (winget LLVM 22) is DELIBERATELY
          # absent: GitHub Actions processes $GITHUB_PATH lines so later
          # entries end up higher in PATH, so leaving it there would
          # supersede llvm-20 and pull clang 22 headers into bindgen.
          @(
            'C:\nevoflux-cache\llvm-20\bin',
            'C:\Program Files\Git\bin',
            'C:\Program Files\Git\usr\bin',
            'C:\mozilla-build\msys2\usr\bin',
            'C:\Program Files\NASM',
            'C:\Program Files (x86)\NSIS'
          ) | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      - name: Swap per-arch agent into AppDir/distribution/bin (aarch64)
        shell: 'C:\mozilla-build\msys2\usr\bin\bash.exe --noprofile --norc -e -o pipefail {0}'
        # See x64-stage1 swap-step comment for rationale.
        run: |
          if [ ! -d build/AppDir-aarch64/distribution/bin ]; then
            echo "::error::missing build/AppDir-aarch64/distribution/bin"
            exit 1
          fi
          rm -rf build/AppDir/distribution/bin
          mkdir -p build/AppDir/distribution
          cp -r build/AppDir-aarch64/distribution/bin build/AppDir/distribution/bin

      - name: Build (no PGO)
        shell: 'C:\mozilla-build\msys2\usr\bin\bash.exe --noprofile --norc -e -o pipefail {0}'
        env:
          MOZ_BUILD_DATE: ${{ inputs.build_id }}
        # See x64-stage1 Build step comment re: surfer interactive prompt.
        run: npm run build < <(yes y)

      - name: Inject distribution + patch package-manifest (aarch64)
        shell: 'C:\mozilla-build\msys2\usr\bin\bash.exe --noprofile --norc -e -o pipefail {0}'
        # Mirror GCB pipeline - see x64-stage1 step for rationale.
        run: |
          OBJ_DIR="engine/obj-aarch64-pc-windows-msvc"
          if [ -d build/AppDir/distribution ] && [ -d "$OBJ_DIR/dist/bin" ]; then
            mkdir -p "$OBJ_DIR/dist/bin/distribution"
            cp -r build/AppDir/distribution/* "$OBJ_DIR/dist/bin/distribution/"
            echo "Distribution injected:"
            find "$OBJ_DIR/dist/bin/distribution" -maxdepth 3 -type f | head -20
          else
            echo "::warning::skipping distribution inject (src or dst missing)"
          fi
          MANIFEST="engine/browser/installer/package-manifest.in"
          if [ -f "$MANIFEST" ] && ! grep -q '@RESPATH@/distribution/' "$MANIFEST"; then
            printf '\n; NevoFlux distribution files\n@RESPATH@/distribution/**\n' >> "$MANIFEST"
            echo "Appended distribution/** to $MANIFEST"
          else
            echo "package-manifest.in already has distribution entry (or missing)"
          fi

      - name: Package
        shell: 'C:\mozilla-build\msys2\usr\bin\bash.exe --noprofile --norc -e -o pipefail {0}'
        # Tolerate surfer's post-make MAR path bug - see x64-stage3 Package.
        run: |
          set +e
          npm run package < <(yes y)
          pkg_rc=$?
          set -e
          shopt -s nullglob
          zips=(dist/nevoflux-*.en-US.win64.zip)
          shopt -u nullglob
          have_zip=0; have_inst=0
          [ ${#zips[@]} -gt 0 ] && [ -f "${zips[0]}" ] && have_zip=1
          [ -f dist/nevoflux.installer.exe ] && have_inst=1
          if [ "$have_zip" -eq 1 ] && [ "$have_inst" -eq 1 ]; then
            echo "Primary arm64 artifacts present, pkg rc=$pkg_rc"
            echo "ARM64_ZIP=${zips[0]}" >> "$GITHUB_ENV"
          else
            echo "arm64 package failed (rc=$pkg_rc): zip=$have_zip installer=$have_inst"
            ls -la dist/ 2>/dev/null || true
            exit "$pkg_rc"
          fi

      - name: Diagnostic — verify distribution baked into arm64 package
        shell: 'C:\mozilla-build\msys2\usr\bin\bash.exe --noprofile --norc -e -o pipefail {0}'
        # See x64-stage3 step for rationale.
        run: |
          fail=0
          ZIP="$ARM64_ZIP"
          echo "::group::zip ($ZIP) contents under distribution/"
          if [ ! -f "$ZIP" ]; then
            echo "::error::zip missing at $ZIP"
            fail=1
          elif command -v unzip >/dev/null 2>&1; then
            entries=$(unzip -l "$ZIP" 2>/dev/null | grep -i 'distribution/' || true)
            echo "$entries" | head -20
            count=$(echo "$entries" | grep -c .)
            xpi_present=$(echo "$entries" | grep -c 'agent@nevoflux.com.xpi' || true)
            echo "total distribution/* entries: $count  xpi: $xpi_present"
            if [ "$count" = "0" ]; then
              echo "::error::arm64 zip has NO distribution/*"
              fail=1
            elif [ "$xpi_present" = "0" ]; then
              echo "::warning::arm64 distribution/ present but agent xpi missing"
              fail=1
            fi
          fi
          echo "::endgroup::"

          echo "::group::installer.exe contents under distribution/"
          INST="dist/nevoflux.installer.exe"
          if [ -f "$INST" ] && command -v 7z >/dev/null 2>&1; then
            entries=$(7z l "$INST" 2>/dev/null | grep -i 'distribution[\/]' || true)
            echo "$entries" | head -20
            count=$(echo "$entries" | grep -c .)
            if [ "$count" = "0" ]; then
              echo "::warning::arm64 installer.exe has NO distribution/*"
              fail=1
            fi
          fi
          echo "::endgroup::"

          echo "::group::engine/obj-aarch64-pc-windows-msvc/dist/bin/distribution/"
          DIST="engine/obj-aarch64-pc-windows-msvc/dist/bin/distribution"
          if [ -d "$DIST" ]; then
            find "$DIST" -maxdepth 3 -type f | head -20
          else
            echo "MISSING — inject step apparently didn't run"
            fail=1
          fi
          echo "::endgroup::"

          if [ "$fail" -ne 0 ]; then
            echo "::error::distribution not in produced arm64 artifacts"
            exit 1
          fi
          echo "distribution verified in arm64 zip + installer"

      - name: Stage final arm64 artifacts
        shell: pwsh
        run: |
          if (-not $env:ARM64_ZIP) { throw "ARM64_ZIP env not set by Package step" }
          Move-Item -Force $env:ARM64_ZIP                       "out\nevoflux.win-arm64-gha.zip"
          Move-Item -Force "dist\nevoflux.installer.exe"        "out\nevoflux.installer-arm64-gha.exe"
          if (Test-Path "dist\output.mar") {
            Move-Item -Force "dist\output.mar"                  "out\windows-arm64-gha.mar"
          } else {
            Write-Host "::warning::dist\output.mar missing - partial update MAR not produced (arm64)"
          }

  collect:
    needs: [prepare, x64-stage3, arm64-final]
    if: ${{ always() && needs.x64-stage3.result == 'success' }}
    runs-on: [self-hosted, nevoflux-windows]
    steps:
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nevoflux-windows-gha-build-${{ needs.prepare.outputs.version }}
          path: out/*
          retention-days: 14
          if-no-files-found: error

  cleanup:
    needs: collect
    if: always()
    runs-on: [self-hosted, nevoflux-windows]
    steps:
      - name: Reclaim disk space
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force "$env:GITHUB_WORKSPACE\engine\obj-x86_64-pc-windows-msvc"  -EA SilentlyContinue
          Remove-Item -Recurse -Force "$env:GITHUB_WORKSPACE\engine\obj-aarch64-pc-windows-msvc" -EA SilentlyContinue
          Remove-Item -Recurse -Force "$env:GITHUB_WORKSPACE\pgo-cache"                          -EA SilentlyContinue
          Remove-Item -Recurse -Force "$env:GITHUB_WORKSPACE\build\AppDir*"                      -EA SilentlyContinue
          Remove-Item -Recurse -Force "$env:GITHUB_WORKSPACE\dist"                               -EA SilentlyContinue
