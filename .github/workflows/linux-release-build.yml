name: Linux Release Build

on:
  workflow_dispatch:
    inputs:
      build-version:
        description: 'The version to build'
        required: true
        type: string
        default: '1.0.0-a.1'
      release-branch:
        description: 'The branch to build'
        required: true
        type: string
        default: 'release'
      MOZ_BUILD_DATE:
        type: string
        required: false
        default: ''
      use-sccache:
        description: 'Use sccache'
        required: false
        type: boolean
        default: false
  workflow_call:
    inputs:
      build-version:
        description: 'The version to build'
        required: true
        type: string
      release-branch:
        description: 'The branch to build'
        required: true
        type: string
      MOZ_BUILD_DATE:
        type: string
        required: true
        default: ''
      use-sccache:
        description: 'Use sccache'
        required: true
        type: boolean
        default: false

jobs:
  build-linux:
    permissions:
      contents: write
    # aarch64 does not need full 16x
    runs-on: [self-hosted, linux, x64]
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, aarch64]
    env:
      SCCACHE_GHA_ENABLED: ${{ inputs.use-sccache && 'true' || 'false' }}
      CARGO_TERM_COLOR: always
      RUSTC_WRAPPER: ${{ inputs.use-sccache && 'sccache' || '' }}
      CARGO_INCREMENTAL: 0
    name: Build Linux - ${{ matrix.arch }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.DEPLOY_KEY }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Run sccache-cache
        uses: mozilla-actions/sccache-action@main
        if: ${{ inputs.use-sccache }}
        with:
          disable_annotations: true

      - name: Expose actions cache variables
        uses: actions/github-script@v6
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env['ACTIONS_CACHE_URL'])
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env['ACTIONS_RUNTIME_TOKEN'])

      - name: Setup Git
        run: |
          git config --global user.email "mauro-balades@users.noreply.github.com"
          git config --global user.name "mauro-balades"

      - name: Install system dependencies
        run: |
          set -x
          PACKAGES="python3 python3-pip dos2unix yasm nasm build-essential libgtk2.0-dev libpython3-dev m4 uuid libasound2-dev libcurl4-openssl-dev libdbus-1-dev libdrm-dev libdbus-glib-1-dev libgtk-3-dev libpulse-dev libx11-xcb-dev libxt-dev xvfb lld llvm"
          MISSING=""
          for pkg in $PACKAGES; do
            if ! dpkg -s "$pkg" &>/dev/null; then
              MISSING="$MISSING $pkg"
            fi
          done
          if [ -n "$MISSING" ]; then
            echo "Installing missing packages:$MISSING"
            sudo apt-get update || true
            sudo apt-get install -y $MISSING
          else
            echo "All system dependencies already installed, skipping."
          fi

      - name: Install dependencies
        run: |
          npm ci

      - name: Load Surfer CI setup
        run: npm run surfer -- ci --brand ${{ inputs.release-branch }} --display-version ${{ inputs.build-version }}

      - name: Check engine source version
        id: engine-check
        run: |
          DESIRED_VERSION=$(node -p "require('./surfer.json').version.version")
          echo "Target engine version: $DESIRED_VERSION"
          if [ -f engine/config/milestone.txt ]; then
            CURRENT_VERSION=$(grep -v '^#' engine/config/milestone.txt | grep -v '^$' | tail -1)
            echo "Current engine version: $CURRENT_VERSION"
            if [ "$CURRENT_VERSION" = "$DESIRED_VERSION" ]; then
              echo "Engine source already at version $DESIRED_VERSION, skipping download."
              echo "skip=true" >> $GITHUB_OUTPUT
              exit 0
            fi
            echo "Version mismatch ($CURRENT_VERSION != $DESIRED_VERSION), will download."
          else
            echo "No engine source found, will download."
          fi
          echo "skip=false" >> $GITHUB_OUTPUT

      - name: Download Firefox source and dependencies
        if: steps.engine-check.outputs.skip != 'true'
        run: |
          for attempt in 1 2 3 4 5; do
            npm run download && break
            if [ $attempt -lt 5 ]; then
              echo "::warning::Download attempt $attempt/5 failed. Retrying in $((attempt * 15))s..."
              sleep $((attempt * 15))
            else
              echo "::error::Download failed after 5 attempts"
              exit 1
            fi
          done

      - name: Fix Rust version
        run: |
          # Install a rust version compatible with LLVM 18
          RUST_VER=$(cat .rust-toolchain)
          for attempt in 1 2 3 4 5; do
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain $RUST_VER && break
            if [ $attempt -lt 5 ]; then
              echo "::warning::Download attempt $attempt/5 failed. Retrying in $((attempt * 15))s..."
              sleep $((attempt * 15))
            else
              echo "::error::Download failed after 5 attempts"
              exit 1
            fi
          done
          source $HOME/.cargo/env

          if test "${{ matrix.arch }}" = "aarch64"; then
            rustup target add --toolchain $RUST_VER aarch64-unknown-linux-gnu
          else
            rustup target add --toolchain $RUST_VER x86_64-unknown-linux-gnu
          fi

      - name: Import
        env:
          SURFER_COMPAT: ${{ matrix.arch }}
        run: |
          . "$HOME/.cargo/env"
          npm run import

      - name: Download NevoFlux Agent binary
        run: |
          PLATFORM="linux"
          ARCH="${{ matrix.arch }}"
          ARCHIVE_NAME="nevoflux-agent-${PLATFORM}-${ARCH}.tar.gz"
          mkdir -p /tmp/agent/

          # Find the latest release tag
          LATEST_TAG=$(gh release view --repo dorisgyl/nevoflux-agent --json tagName --jq '.tagName' 2>/dev/null || true)
          if [ -z "$LATEST_TAG" ]; then
            echo "::warning::No releases found in nevoflux-agent repo, skipping agent download."
          else
            echo "Latest release tag: $LATEST_TAG"
            ASSET_EXISTS=$(gh release view "$LATEST_TAG" --repo dorisgyl/nevoflux-agent --json assets --jq ".assets[].name" 2>/dev/null | grep -c "^${ARCHIVE_NAME}$" || true)
            if [ "$ASSET_EXISTS" = "0" ]; then
              echo "::warning::Asset ${ARCHIVE_NAME} not found in release ${LATEST_TAG}, skipping agent download."
            else
              for attempt in 1 2 3; do
                gh release download "$LATEST_TAG" \
                  --repo dorisgyl/nevoflux-agent \
                  --pattern "${ARCHIVE_NAME}" \
                  --dir /tmp/agent/ && break
                if [ $attempt -lt 3 ]; then
                  echo "::warning::Download attempt $attempt/3 failed. Retrying in $((attempt * 10))s..."
                  sleep $((attempt * 10))
                else
                  echo "::warning::Agent binary download failed after 3 attempts, continuing..."
                fi
              done
            fi
          fi

          if [ -f "/tmp/agent/${ARCHIVE_NAME}" ]; then
            mkdir -p build/AppDir/distribution/bin/
            tar -xzf "/tmp/agent/${ARCHIVE_NAME}" -C /tmp/agent/
            mv /tmp/agent/nevoflux-agent build/AppDir/distribution/bin/nevoflux-agent
            chmod +x build/AppDir/distribution/bin/nevoflux-agent
            echo "Agent binary installed: build/AppDir/distribution/bin/nevoflux-agent"
            # Copy models directory if present in release archive
            if [ -d "/tmp/agent/models" ]; then
              cp -r /tmp/agent/models build/AppDir/distribution/bin/models
              echo "Models directory installed"
            fi
          else
            echo "::notice::No agent binary available for ${PLATFORM}-${ARCH}, build continues without it."
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Copy soul templates to distribution
        run: |
          mkdir -p build/AppDir/distribution/bin/defaults/soul
          if [ -d "docs/reference/templates" ]; then
            cp docs/reference/templates/*.md build/AppDir/distribution/bin/defaults/soul/
            echo "Soul templates copied to distribution:"
            ls -la build/AppDir/distribution/bin/defaults/soul/
          else
            echo "::warning::docs/reference/templates/ not found, skipping soul templates"
          fi

      - name: Build language packs
        run: |
          for attempt in 1 2 3 4 5; do
            sh scripts/download-language-packs.sh && break
            if [ $attempt -lt 5 ]; then
              echo "::warning::Download attempt $attempt/5 failed. Retrying in $((attempt * 15))s..."
              sleep $((attempt * 15))
            else
              echo "::error::Download failed after 5 attempts"
              exit 1
            fi
          done

      - name: Bootstrap
        run: |
          cd engine
          export SURFER_PLATFORM="linux"
          ./mach --no-interactive bootstrap --application-choice browser
          cd ..

      - name: Pin Rust version after bootstrap
        run: |
          source $HOME/.cargo/env
          RUST_VER=$(cat .rust-toolchain)
          rustup default $RUST_VER
          rustc --version
          if test "${{ matrix.arch }}" = "aarch64"; then
            rustup target add --toolchain $RUST_VER aarch64-unknown-linux-gnu
          else
            rustup target add --toolchain $RUST_VER x86_64-unknown-linux-gnu
          fi

      - name: Insert API Keys
        run: |
          mkdir -p ~/.zen-keys
          echo "${{ secrets.ZEN_SAFEBROWSING_API_KEY }}" > ~/.zen-keys/safebrowsing.dat

      - name: Clean stale build artifacts
        run: |
          rm -rf engine/obj-${{ matrix.arch }}-pc-linux-gnu/
          echo "Cleaned stale build artifacts for ${{ matrix.arch }}"

      - name: Build
        env:
          SURFER_COMPAT: ${{ matrix.arch }}
          ZEN_RELEASE_BRANCH: ${{ inputs.release-branch }}
          RUSTUP_TOOLCHAIN: '1.83'
        run: |
          export SURFER_PLATFORM="linux"
          if [[ -n "${{ inputs.MOZ_BUILD_DATE }}" ]];then
            export MOZ_BUILD_DATE="${{ inputs.MOZ_BUILD_DATE }}"
          fi
          bash .github/workflows/src/release-build.sh

      - name: Package
        env:
          SURFER_COMPAT: ${{ matrix.arch }}
          ZEN_GA_DISABLE_PGO: true
        run: |
          export SURFER_PLATFORM="linux"
          export ZEN_RELEASE=1
          npm run package

      - name: Remove API Keys
        run: |
          rm -rf ~/.zen-keys

      - name: Inject distribution files into package
        run: |
          set -ex
          ARCH="${{ matrix.arch }}"
          OBJ_DIR="engine/obj-${ARCH}-pc-linux-gnu"
          STAGING_DIR="$OBJ_DIR/dist/nevoflux"
          if [ -d "build/AppDir/distribution" ] && [ -d "$STAGING_DIR" ]; then
            mkdir -p "$STAGING_DIR/distribution"
            cp -r build/AppDir/distribution/* "$STAGING_DIR/distribution/"
            ls -la "$STAGING_DIR/distribution/"
            # Re-create tarball with distribution files
            rm -f dist/nevoflux-*.tar.xz
            tar -cJf "dist/nevoflux-repackaged.linux-${ARCH}.tar.xz" -C "$OBJ_DIR/dist" nevoflux
            echo "Tarball re-created with distribution files"
          else
            echo "::warning::Distribution files or staging directory not found, skipping injection"
          fi

      - name: Rename artifacts
        run: |
          mv dist/nevoflux-*.tar.xz "nevoflux.linux-${{ matrix.arch }}.tar.xz"
          mv dist/output.mar linux${{ matrix.arch == 'aarch64' && '-aarch64' || '' }}.mar

      - name: Upload build artifact (binary)
        uses: actions/upload-artifact@v4
        with:
          retention-days: 5
          name: nevoflux.linux-${{ matrix.arch }}.tar.xz
          path: ./nevoflux.linux-${{ matrix.arch }}.tar.xz

      - name: Upload build artifact (.mar)
        uses: actions/upload-artifact@v4
        with:
          retention-days: 5
          name: linux${{ matrix.arch == 'aarch64' && '-aarch64' || '' }}.mar
          path: ./linux${{ matrix.arch == 'aarch64' && '-aarch64' || '' }}.mar

      - name: Upload build artifact (update manifests)
        uses: actions/upload-artifact@v4
        with:
          retention-days: 5
          name: linux_update_manifest_${{ matrix.arch }}
          path: ./dist/update
