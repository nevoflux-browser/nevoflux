name: Linux Release Build (all arches, sequential)

on:
  workflow_dispatch:
    inputs:
      build-version:
        description: "The version to build"
        required: true
        type: string
      release-branch:
        description: "The branch to build"
        required: true
        type: string
        default: "release"
      MOZ_BUILD_DATE:
        description: "Build date (leave empty to auto-generate)"
        type: string
        required: false
        default: ""
      use-sccache:
        description: "Use sccache"
        required: false
        type: boolean
        default: false

jobs:
  linux-x86_64:
    name: Linux build (x86_64)
    uses: ./.github/workflows/linux-x86_64-release-build.yml
    permissions:
      contents: write
    secrets: inherit
    with:
      build-version: ${{ inputs.build-version }}
      release-branch: ${{ inputs.release-branch }}
      MOZ_BUILD_DATE: ${{ inputs.MOZ_BUILD_DATE }}
      use-sccache: ${{ inputs.use-sccache }}

  linux-aarch64:
    name: Linux build (aarch64)
    uses: ./.github/workflows/linux-aarch64-release-build.yml
    permissions:
      contents: write
    secrets: inherit
    # Run AFTER x86_64 finishes, regardless of its success/failure,
    # so both arches still get built even if the first one breaks.
    needs: [linux-x86_64]
    if: always()
    with:
      build-version: ${{ inputs.build-version }}
      release-branch: ${{ inputs.release-branch }}
      MOZ_BUILD_DATE: ${{ inputs.MOZ_BUILD_DATE }}
      use-sccache: ${{ inputs.use-sccache }}
