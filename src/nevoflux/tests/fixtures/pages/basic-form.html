<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NevoFlux Test Page</title>
  <style>
    body { font-family: system-ui, sans-serif; padding: 20px; }
    .form-group { margin: 10px 0; }
    input, button { padding: 8px; margin: 4px 0; }
    #result { margin-top: 20px; padding: 10px; background: #f0f0f0; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <h1>Test Form</h1>

  <form id="test-form">
    <div class="form-group">
      <label for="name">Name:</label>
      <input type="text" id="name" name="name" placeholder="Enter your name">
    </div>

    <div class="form-group">
      <label for="email">Email:</label>
      <input type="email" id="email" name="email" placeholder="Enter email">
    </div>

    <div class="form-group">
      <label for="phone">Phone:</label>
      <input type="tel" id="phone" name="phone" placeholder="13812345678">
    </div>

    <div class="form-group">
      <button type="submit" id="submit-btn">Submit</button>
      <button type="button" id="hidden-toggle">Toggle Hidden</button>
    </div>
  </form>

  <div id="result" class="hidden">
    <p>Form submitted!</p>
    <p id="result-name"></p>
    <p id="result-email"></p>
  </div>

  <script>
    document.getElementById('test-form').addEventListener('submit', function(e) {
      e.preventDefault();
      document.getElementById('result').classList.remove('hidden');
      document.getElementById('result-name').textContent = 'Name: ' + document.getElementById('name').value;
      document.getElementById('result-email').textContent = 'Email: ' + document.getElementById('email').value;
    });

    document.getElementById('hidden-toggle').addEventListener('click', function() {
      document.getElementById('result').classList.toggle('hidden');
    });
  </script>
</body>
</html>
