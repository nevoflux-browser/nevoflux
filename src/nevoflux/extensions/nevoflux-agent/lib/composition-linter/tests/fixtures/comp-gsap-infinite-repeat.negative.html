<!doctype html>
<html>
<head><meta charset="utf-8"></head>
<body>
  <div data-composition-id="pulse-comp" data-width="640" data-height="360" data-start="0" data-duration="10">
    <div class="clip" data-start="0" data-duration="10" data-track-index="0" id="pulse"></div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
  <script>
    window.__timelines = window.__timelines || {};
    var tl = gsap.timeline({ paused: true });
    // BAD: infinite repeat breaks the deterministic capture engine
    tl.to("#pulse", { opacity: 0.5, duration: 0.5, repeat: -1, yoyo: true });
    window.__timelines["pulse-comp"] = tl;
  </script>
</body>
</html>
