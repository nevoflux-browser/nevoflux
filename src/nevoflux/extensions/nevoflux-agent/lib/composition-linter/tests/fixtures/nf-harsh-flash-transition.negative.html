<!doctype html>
<html>
<head><meta charset="utf-8"><style>
  body { margin: 0; background: #000; }
  #stage { position: relative; width: 640px; height: 360px; overflow: hidden; background: #0a0a0a; }
  /* Full-screen, near-opaque bright overlays used as "flash" transitions with NO
     additive blend mode → white-out flash when ramped to opacity 1. Two color
     forms: rgba() and 3-digit hex (#fff) — both must be caught. */
  .flash-rgba {
    position: absolute; inset: 0;
    background: rgba(255, 220, 180, 0.95);
    pointer-events: none; opacity: 0;
  }
  .flash-hex {
    position: absolute; inset: 0;
    background: #fff;
    pointer-events: none; opacity: 0;
  }
  /* A legitimate soft light-leak (gradient + screen blend) — must NOT trip the rule. */
  .light-leak {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% 45%, rgba(255,159,67,0.18), transparent 70%);
    pointer-events: none; mix-blend-mode: screen;
  }
</style></head>
<body>
  <div id="stage" data-width="640" data-height="360" data-duration="5" data-fps="30">
    <div class="light-leak" id="leak-1"></div>
    <div class="flash-rgba" id="flash-1"></div>
    <div class="flash-hex" id="flash-2"></div>
  </div>
  <script type="module">
    import { gsap } from 'https://esm.sh/gsap@3.13';
    window.__timelines = window.__timelines || [];
    const tl = gsap.timeline({ paused: true });
    // legit soft leak ramp — should not warn
    tl.fromTo('#leak-1', { opacity: 0.2 }, { opacity: 0.9, duration: 4 }, 0);
    // harsh full-screen flashes — should each warn (rgba + #fff)
    tl.to('#flash-1', { opacity: 1, duration: 0.25, ease: 'power2.in' }, 1);
    tl.to('#flash-2', { opacity: 1, duration: 0.25, ease: 'power2.in' }, 2);
    window.__timelines.push(tl);
  </script>
</body>
</html>
