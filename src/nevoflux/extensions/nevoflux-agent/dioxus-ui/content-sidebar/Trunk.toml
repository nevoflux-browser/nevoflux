# Trunk build configuration for Content Sidebar
# https://trunkrs.dev/configuration/

[build]
# Output directory for built assets
dist = "../dist/content-sidebar"
# Target index.html (for build reference, not actually used in extension)
target = "index.html"
# Build in release mode by default
release = true
# Enable minification
minify = "on_release"

[watch]
# Watch these paths for changes
watch = ["src", "assets", "index.html"]
# Ignore these patterns
ignore = ["target"]

[[hooks]]
stage = "post_build"
command = "sh"
command_arguments = ["-c", "echo 'Content Sidebar Trunk build complete'"]
