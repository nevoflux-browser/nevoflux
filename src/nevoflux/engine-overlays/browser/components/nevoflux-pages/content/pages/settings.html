<html>
<head>
  <meta charset="utf-8">
  <title>Settings</title>
  <link rel="stylesheet" href="chrome://nevoflux/content/pages/common.css">
  <style>
    body {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Left Navigation ──────────────────────────── */
    .settings-nav {
      width: 220px;
      min-width: 220px;
      border-right: 1px solid var(--nevoflux-border);
      background: var(--nevoflux-bg-secondary);
      padding: var(--nevoflux-space-lg) 0;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    .settings-nav h1 {
      font-size: var(--nevoflux-font-size-xl);
      padding: 0 var(--nevoflux-space-lg) var(--nevoflux-space-lg);
      border-bottom: 1px solid var(--nevoflux-border);
      margin-bottom: var(--nevoflux-space-sm);
    }

    .settings-nav a {
      display: block;
      padding: var(--nevoflux-space-sm) var(--nevoflux-space-lg);
      color: var(--nevoflux-text);
      text-decoration: none;
      border-radius: var(--nevoflux-radius-sm);
      margin: 2px var(--nevoflux-space-sm);
      font-size: var(--nevoflux-font-size-base);
    }

    .settings-nav a:hover {
      background: var(--nevoflux-bg-tertiary);
    }

    .settings-nav a.active {
      background: var(--nevoflux-accent);
      color: white;
    }

    /* ── Content Area ─────────────────────────────── */
    .settings-content {
      flex: 1;
      overflow-y: auto;
      padding: var(--nevoflux-space-2xl);
    }

    .settings-content-inner {
      max-width: 720px;
    }

    .settings-section {
      display: none;
    }

    .settings-section.active {
      display: block;
    }

    /* ── Form Elements ────────────────────────────── */
    .settings-group {
      margin-bottom: var(--nevoflux-space-2xl);
    }

    .settings-group h2 {
      font-size: var(--nevoflux-font-size-lg);
      margin-bottom: var(--nevoflux-space-lg);
      padding-bottom: var(--nevoflux-space-sm);
      border-bottom: 1px solid var(--nevoflux-border);
    }

    .settings-group h3 {
      font-size: var(--nevoflux-font-size-base);
      font-weight: 600;
      margin: var(--nevoflux-space-xl) 0 var(--nevoflux-space-sm);
      color: var(--nevoflux-text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.03em;
      font-size: var(--nevoflux-font-size-sm);
    }

    .form-row {
      display: flex;
      align-items: flex-start;
      gap: var(--nevoflux-space-md);
      margin-bottom: var(--nevoflux-space-md);
    }

    .form-row label {
      min-width: 140px;
      padding-top: var(--nevoflux-space-sm);
      font-weight: 500;
      font-size: var(--nevoflux-font-size-base);
    }

    .form-row .field {
      flex: 1;
    }

    .form-row input[type="text"],
    .form-row input[type="password"],
    .form-row input[type="url"],
    .form-row select,
    .form-row textarea {
      width: 100%;
      padding: var(--nevoflux-space-sm) var(--nevoflux-space-md);
      border: 1px solid var(--nevoflux-border);
      border-radius: var(--nevoflux-radius-sm);
      background: var(--nevoflux-bg);
      color: var(--nevoflux-text);
      font-family: var(--nevoflux-font-family);
      font-size: var(--nevoflux-font-size-base);
    }

    .form-row input:focus,
    .form-row select:focus,
    .form-row textarea:focus {
      outline: none;
      border-color: var(--nevoflux-accent);
      box-shadow: 0 0 0 2px color-mix(in srgb, var(--nevoflux-accent) 20%, transparent);
    }

    .form-row textarea {
      min-height: 60px;
      resize: vertical;
    }

    .form-row .hint {
      font-size: var(--nevoflux-font-size-sm);
      color: var(--nevoflux-text-secondary);
      margin-top: 4px;
    }

    /* Password field with toggle */
    .password-wrapper {
      position: relative;
    }

    .password-wrapper input {
      padding-right: 60px;
    }

    .password-toggle {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      border: none;
      background: none;
      color: var(--nevoflux-text-secondary);
      cursor: pointer;
      font-size: var(--nevoflux-font-size-sm);
      padding: 2px 6px;
    }

    .password-toggle:hover {
      color: var(--nevoflux-text);
    }

    /* Avatar picker */
    .avatar-row {
      display: flex;
      align-items: center;
      gap: var(--nevoflux-space-lg);
      margin-bottom: var(--nevoflux-space-md);
    }

    .avatar-row label {
      min-width: 140px;
      font-weight: 500;
      font-size: var(--nevoflux-font-size-base);
    }

    .avatar-preview {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: 2px solid var(--nevoflux-border);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--nevoflux-bg-tertiary);
      font-size: 28px;
      color: var(--nevoflux-text-secondary);
      flex-shrink: 0;
      user-select: none;
    }

    .avatar-preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .avatar-actions {
      display: flex;
      gap: var(--nevoflux-space-xs);
    }

    .avatar-actions button {
      padding: var(--nevoflux-space-xs) var(--nevoflux-space-md);
      border: 1px solid var(--nevoflux-border);
      border-radius: var(--nevoflux-radius-sm);
      background: var(--nevoflux-bg);
      color: var(--nevoflux-text);
      cursor: pointer;
      font-size: var(--nevoflux-font-size-sm);
    }

    .avatar-actions button:hover {
      background: var(--nevoflux-bg-tertiary);
    }

    .avatar-actions .avatar-remove-btn {
      color: var(--nevoflux-text-secondary);
    }

    .avatar-actions .avatar-remove-btn:hover {
      background: light-dark(#fee, #4a1a1a);
      color: light-dark(#c00, #f88);
      border-color: light-dark(#fcc, #a44);
    }

    /* ── Markdown Textarea ─────────────────────────── */
    .markdown-textarea {
      width: 100%;
      min-height: 200px;
      padding: var(--nevoflux-space-md);
      border: 1px solid var(--nevoflux-border);
      border-radius: var(--nevoflux-radius-sm);
      background: var(--nevoflux-bg);
      color: var(--nevoflux-text);
      font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
      font-size: var(--nevoflux-font-size-sm);
      line-height: 1.6;
      resize: vertical;
      tab-size: 2;
    }

    .markdown-textarea:focus {
      outline: none;
      border-color: var(--nevoflux-accent);
      box-shadow: 0 0 0 2px color-mix(in srgb, var(--nevoflux-accent) 20%, transparent);
    }

    .markdown-textarea::placeholder {
      color: var(--nevoflux-text-secondary);
      opacity: 0.6;
    }

    .section-desc {
      color: var(--nevoflux-text-secondary);
      font-size: var(--nevoflux-font-size-sm);
      margin-bottom: var(--nevoflux-space-md);
      line-height: 1.5;
    }

    /* ── Save Button ───────────────────────────────── */
    .save-bar {
      position: sticky;
      bottom: 0;
      padding: var(--nevoflux-space-lg) 0;
      background: var(--nevoflux-bg-secondary);
      border-top: 1px solid var(--nevoflux-border);
      margin-top: var(--nevoflux-space-2xl);
      display: flex;
      align-items: center;
      gap: var(--nevoflux-space-md);
    }

    .save-btn {
      padding: var(--nevoflux-space-sm) var(--nevoflux-space-xl);
      border-radius: var(--nevoflux-radius-sm);
      border: none;
      font-size: var(--nevoflux-font-size-base);
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s ease, opacity 0.15s ease;
      background: var(--nevoflux-accent);
      color: white;
    }

    .save-btn:hover:not(:disabled) {
      background: color-mix(in srgb, var(--nevoflux-accent) 85%, black);
    }

    .save-btn:disabled {
      opacity: 0.4;
      cursor: default;
    }

    .save-status {
      font-size: var(--nevoflux-font-size-sm);
      color: var(--nevoflux-text-secondary);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .save-status.visible {
      opacity: 1;
    }

    .save-status.error {
      color: light-dark(#d93025, #f88);
    }

    /* Save indicator */
    .save-indicator {
      position: fixed;
      bottom: 24px;
      right: 24px;
      padding: var(--nevoflux-space-sm) var(--nevoflux-space-lg);
      background: var(--nevoflux-accent);
      color: white;
      border-radius: var(--nevoflux-radius-md);
      font-size: var(--nevoflux-font-size-sm);
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
    }

    .save-indicator.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* P1/P2 placeholder */
    .section-placeholder {
      color: var(--nevoflux-text-secondary);
      font-style: italic;
      padding: var(--nevoflux-space-xl) 0;
    }

    /* ── MCP Server List ──────────────────────────── */
    .mcp-server-list {
      background: var(--nevoflux-bg);
      border-radius: var(--nevoflux-radius-md);
      border: 1px solid var(--nevoflux-border);
      margin-bottom: var(--nevoflux-space-lg);
    }

    .mcp-server-item {
      padding: var(--nevoflux-space-md) var(--nevoflux-space-lg);
      border-bottom: 1px solid light-dark(#f0f0f0, #2a2a2e);
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: background 0.15s ease;
    }

    .mcp-server-item:last-child {
      border-bottom: none;
    }

    .mcp-server-item:hover {
      background: var(--nevoflux-bg-tertiary);
    }

    .mcp-server-info {
      flex: 1;
      min-width: 0;
    }

    .mcp-server-name {
      font-size: var(--nevoflux-font-size-base);
      font-weight: 500;
      color: var(--nevoflux-text);
      margin-bottom: 2px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .mcp-server-type {
      font-size: var(--nevoflux-font-size-sm);
      color: var(--nevoflux-text-secondary);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .mcp-server-status {
      display: flex;
      align-items: center;
      gap: var(--nevoflux-space-sm);
      flex-shrink: 0;
      margin-left: var(--nevoflux-space-md);
    }

    .mcp-status-badge {
      padding: 3px 10px;
      border-radius: 10px;
      font-size: var(--nevoflux-font-size-sm);
      font-weight: 500;
      white-space: nowrap;
    }

    .mcp-status-badge.active {
      background: light-dark(#e6f4ea, #1a3a2a);
      color: light-dark(#1e8e3e, #6fcf97);
    }

    .mcp-status-badge.inactive {
      background: light-dark(#fce8e6, #3a1a1a);
      color: light-dark(#d93025, #f88);
    }

    .mcp-icon-btn {
      border: none;
      background: none;
      cursor: pointer;
      padding: 6px 8px;
      border-radius: var(--nevoflux-radius-sm);
      font-size: var(--nevoflux-font-size-sm);
      color: var(--nevoflux-text-secondary);
      transition: all 0.15s ease;
    }

    .mcp-icon-btn:hover {
      background: var(--nevoflux-bg-tertiary);
      color: var(--nevoflux-accent);
    }

    .mcp-icon-btn.delete:hover {
      background: light-dark(#fee, #4a1a1a);
      color: light-dark(#c00, #f88);
    }

    /* Toggle switch */
    .mcp-toggle {
      position: relative;
      width: 36px;
      height: 20px;
      flex-shrink: 0;
    }

    .mcp-toggle input {
      opacity: 0;
      width: 0;
      height: 0;
      position: absolute;
    }

    .mcp-toggle-slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: var(--nevoflux-border);
      border-radius: 10px;
      transition: background 0.15s ease;
    }

    .mcp-toggle-slider::before {
      content: "";
      position: absolute;
      height: 14px;
      width: 14px;
      left: 3px;
      bottom: 3px;
      background: white;
      border-radius: 50%;
      transition: transform 0.15s ease;
    }

    .mcp-toggle input:checked + .mcp-toggle-slider {
      background: var(--nevoflux-accent);
    }

    .mcp-toggle input:checked + .mcp-toggle-slider::before {
      transform: translateX(16px);
    }

    .mcp-toggle input:focus-visible + .mcp-toggle-slider {
      box-shadow: 0 0 0 2px color-mix(in srgb, var(--nevoflux-accent) 30%, transparent);
    }

    /* MCP add server button */
    .mcp-add-server-btn {
      width: 100%;
      padding: var(--nevoflux-space-md);
      background: none;
      border: 2px dashed var(--nevoflux-border);
      border-radius: var(--nevoflux-radius-md);
      color: var(--nevoflux-accent);
      font-size: var(--nevoflux-font-size-base);
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--nevoflux-space-xs);
      margin-bottom: var(--nevoflux-space-2xl);
    }

    .mcp-add-server-btn:hover {
      border-color: var(--nevoflux-accent);
      background: color-mix(in srgb, var(--nevoflux-accent) 5%, transparent);
    }

    /* ── MCP Modal ────────────────────────────────── */
    .mcp-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .mcp-modal.show {
      display: flex;
    }

    .mcp-modal-content {
      background: var(--nevoflux-bg);
      border-radius: var(--nevoflux-radius-lg, 12px);
      padding: var(--nevoflux-space-2xl);
      width: 90%;
      max-width: 600px;
      max-height: 85vh;
      overflow-y: auto;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
    }

    .mcp-modal-header {
      margin-bottom: var(--nevoflux-space-xl);
    }

    .mcp-modal-header h2 {
      font-size: var(--nevoflux-font-size-xl);
      font-weight: 600;
      color: var(--nevoflux-text);
      margin-bottom: var(--nevoflux-space-xs);
    }

    .mcp-modal-header p {
      font-size: var(--nevoflux-font-size-sm);
      color: var(--nevoflux-text-secondary);
    }

    .mcp-form-group {
      margin-bottom: var(--nevoflux-space-lg);
    }

    .mcp-form-label {
      display: block;
      font-size: var(--nevoflux-font-size-base);
      font-weight: 500;
      color: var(--nevoflux-text);
      margin-bottom: var(--nevoflux-space-xs);
    }

    .mcp-form-input,
    .mcp-form-select {
      width: 100%;
      padding: var(--nevoflux-space-sm) var(--nevoflux-space-md);
      border: 1px solid var(--nevoflux-border);
      border-radius: var(--nevoflux-radius-sm);
      font-size: var(--nevoflux-font-size-base);
      color: var(--nevoflux-text);
      background: var(--nevoflux-bg);
      font-family: var(--nevoflux-font-family);
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    .mcp-form-input:focus,
    .mcp-form-select:focus {
      outline: none;
      border-color: var(--nevoflux-accent);
      box-shadow: 0 0 0 2px color-mix(in srgb, var(--nevoflux-accent) 20%, transparent);
    }

    .mcp-form-select {
      cursor: pointer;
    }

    .mcp-form-help {
      font-size: var(--nevoflux-font-size-sm);
      color: var(--nevoflux-text-secondary);
      margin-top: 4px;
    }

    .mcp-form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--nevoflux-space-md);
    }

    .mcp-conditional-fields {
      margin-top: var(--nevoflux-space-md);
      padding: var(--nevoflux-space-md);
      background: var(--nevoflux-bg-secondary);
      border-radius: var(--nevoflux-radius-sm);
    }

    .mcp-modal-actions {
      display: flex;
      gap: var(--nevoflux-space-sm);
      justify-content: flex-end;
      margin-top: var(--nevoflux-space-2xl);
    }

    .mcp-btn-primary,
    .mcp-btn-secondary {
      padding: var(--nevoflux-space-sm) var(--nevoflux-space-xl);
      border-radius: var(--nevoflux-radius-sm);
      font-size: var(--nevoflux-font-size-base);
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s ease;
      border: none;
    }

    .mcp-btn-secondary {
      background: var(--nevoflux-bg-tertiary);
      color: var(--nevoflux-text-secondary);
    }

    .mcp-btn-secondary:hover {
      background: var(--nevoflux-border);
      color: var(--nevoflux-text);
    }

    .mcp-btn-primary {
      background: var(--nevoflux-accent);
      color: white;
    }

    .mcp-btn-primary:hover {
      background: color-mix(in srgb, var(--nevoflux-accent) 85%, black);
    }

    /* MCP global settings: number input */
    .form-row input[type="number"] {
      width: 100%;
      padding: var(--nevoflux-space-sm) var(--nevoflux-space-md);
      border: 1px solid var(--nevoflux-border);
      border-radius: var(--nevoflux-radius-sm);
      background: var(--nevoflux-bg);
      color: var(--nevoflux-text);
      font-family: var(--nevoflux-font-family);
      font-size: var(--nevoflux-font-size-base);
    }

    .form-row input[type="number"]:focus {
      outline: none;
      border-color: var(--nevoflux-accent);
      box-shadow: 0 0 0 2px color-mix(in srgb, var(--nevoflux-accent) 20%, transparent);
    }

    /* Toggle row for global settings */
    .toggle-row {
      display: flex;
      align-items: center;
      gap: var(--nevoflux-space-md);
      margin-bottom: var(--nevoflux-space-md);
    }

    .toggle-row label {
      min-width: 140px;
      font-weight: 500;
      font-size: var(--nevoflux-font-size-base);
    }

    .mcp-empty-state {
      text-align: center;
      padding: var(--nevoflux-space-2xl) var(--nevoflux-space-lg);
      color: var(--nevoflux-text-secondary);
    }

    .mcp-empty-state p {
      margin: var(--nevoflux-space-xs) 0;
    }

    .mcp-empty-state .mcp-empty-title {
      font-size: var(--nevoflux-font-size-base);
      font-weight: 500;
      color: var(--nevoflux-text);
    }

    .mcp-empty-state .mcp-empty-hint {
      font-size: var(--nevoflux-font-size-sm);
    }

    /* ── LLM Provider Grid ─────────────────────────── */
    .llm-providers-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: var(--nevoflux-space-md);
    }

    .llm-loading {
      grid-column: 1 / -1;
      text-align: center;
      padding: var(--nevoflux-space-2xl);
      color: var(--nevoflux-text-secondary);
      font-size: var(--nevoflux-font-size-base);
    }

    /* ── Guidance Banner ─────────────────────────── */
    .llm-guidance-banner {
      padding: var(--nevoflux-space-md) var(--nevoflux-space-lg);
      margin-bottom: var(--nevoflux-space-md);
      background: color-mix(in srgb, var(--nevoflux-accent) 10%, transparent);
      border: 1px solid color-mix(in srgb, var(--nevoflux-accent) 30%, transparent);
      border-radius: var(--nevoflux-radius-md);
      color: var(--nevoflux-text);
      font-size: var(--nevoflux-font-size-base);
      line-height: 1.5;
    }

    /* ── Connecting State ─────────────────────────── */
    .llm-connecting {
      grid-column: 1 / -1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--nevoflux-space-md);
      padding: var(--nevoflux-space-2xl);
    }

    .llm-connecting-spinner {
      width: 24px;
      height: 24px;
      border: 2px solid var(--nevoflux-border);
      border-top-color: var(--nevoflux-accent);
      border-radius: 50%;
      animation: nevoflux-spin 0.8s linear infinite;
    }

    @keyframes nevoflux-spin {
      to { transform: rotate(360deg); }
    }

    .llm-connecting-text {
      color: var(--nevoflux-text-secondary);
      font-size: var(--nevoflux-font-size-base);
    }

    /* ── Error State ─────────────────────────── */
    .llm-error {
      grid-column: 1 / -1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--nevoflux-space-md);
      padding: var(--nevoflux-space-2xl);
    }

    .llm-error-text {
      color: var(--nevoflux-text-secondary);
      font-size: var(--nevoflux-font-size-base);
    }

    .llm-retry-button {
      padding: var(--nevoflux-space-xs) var(--nevoflux-space-lg);
      background: var(--nevoflux-accent);
      color: var(--nevoflux-bg);
      border: none;
      border-radius: var(--nevoflux-radius-md);
      cursor: pointer;
      font-size: var(--nevoflux-font-size-base);
      transition: opacity 0.15s ease;
    }

    .llm-retry-button:hover {
      opacity: 0.85;
    }

    /* ── Skeleton Loading ─────────────────────────── */
    .llm-provider-card.skeleton {
      pointer-events: none;
      cursor: default;
    }

    .skeleton-icon {
      width: 32px;
      height: 32px;
      border-radius: var(--nevoflux-radius-sm);
      background: var(--nevoflux-bg-tertiary);
      animation: nevoflux-skeleton-pulse 1.5s ease-in-out infinite;
    }

    .skeleton-text {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: var(--nevoflux-space-xs);
    }

    .skeleton-line {
      height: 12px;
      border-radius: 4px;
      background: var(--nevoflux-bg-tertiary);
      animation: nevoflux-skeleton-pulse 1.5s ease-in-out infinite;
    }

    .skeleton-line.wide {
      width: 80%;
    }

    .skeleton-line.narrow {
      width: 50%;
    }

    @keyframes nevoflux-skeleton-pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }

    .llm-provider-card {
      display: flex;
      align-items: center;
      gap: var(--nevoflux-space-sm);
      padding: var(--nevoflux-space-md);
      border: 1px solid var(--nevoflux-border);
      border-radius: var(--nevoflux-radius-md);
      background: var(--nevoflux-bg);
      cursor: pointer;
      transition: all 0.15s ease;
      position: relative;
    }

    .llm-provider-card:hover {
      background: var(--nevoflux-bg-tertiary);
      border-color: var(--nevoflux-accent);
    }

    .llm-provider-card.configured {
      border-color: light-dark(#34a853, #4caf50);
    }

    .llm-provider-card.active {
      border-color: var(--nevoflux-accent);
      box-shadow: 0 0 0 1px var(--nevoflux-accent);
    }

    .llm-provider-icon {
      width: 36px;
      height: 36px;
      border-radius: var(--nevoflux-radius-sm);
      background: color-mix(in srgb, var(--nevoflux-accent) 15%, transparent);
      color: var(--nevoflux-accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: var(--nevoflux-font-size-lg);
      flex-shrink: 0;
      overflow: hidden;
    }

    .llm-provider-icon img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .llm-provider-info {
      flex: 1;
      min-width: 0;
    }

    .llm-provider-name {
      font-size: var(--nevoflux-font-size-base);
      font-weight: 500;
      color: var(--nevoflux-text);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .llm-provider-type {
      font-size: var(--nevoflux-font-size-sm);
      color: var(--nevoflux-text-secondary);
      text-transform: capitalize;
    }

    .llm-provider-status {
      display: flex;
      align-items: center;
      gap: var(--nevoflux-space-xs);
      flex-shrink: 0;
    }

    .llm-badge {
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 500;
      white-space: nowrap;
    }

    .llm-badge-active {
      background: color-mix(in srgb, var(--nevoflux-accent) 15%, transparent);
      color: var(--nevoflux-accent);
    }

    .llm-checkmark {
      color: light-dark(#34a853, #4caf50);
      font-size: var(--nevoflux-font-size-base);
      font-weight: 700;
    }

    /* ── LLM Modal ─────────────────────────────────── */
    .llm-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .llm-modal.show {
      display: flex;
    }

    .llm-modal-content {
      background: var(--nevoflux-bg);
      border-radius: var(--nevoflux-radius-lg, 12px);
      padding: var(--nevoflux-space-2xl);
      width: 90%;
      max-width: 480px;
      max-height: 85vh;
      overflow-y: auto;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
    }

    .llm-modal-header {
      margin-bottom: var(--nevoflux-space-xl);
    }

    .llm-modal-header h2 {
      font-size: var(--nevoflux-font-size-xl);
      font-weight: 600;
      color: var(--nevoflux-text);
      margin-bottom: var(--nevoflux-space-xs);
    }

    .llm-modal-header p {
      font-size: var(--nevoflux-font-size-sm);
      color: var(--nevoflux-text-secondary);
    }

    .llm-active-group {
      margin-top: var(--nevoflux-space-sm);
    }

    .llm-active-label {
      display: flex;
      align-items: center;
      gap: var(--nevoflux-space-sm);
      cursor: pointer;
      font-size: var(--nevoflux-font-size-base);
      color: var(--nevoflux-text);
    }

    .llm-active-label input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: var(--nevoflux-accent);
    }

    .llm-modal-status {
      font-size: var(--nevoflux-font-size-sm);
      min-height: 20px;
      margin-top: var(--nevoflux-space-sm);
    }

    .llm-modal-status.success {
      color: light-dark(#1e8e3e, #6fcf97);
    }

    .llm-modal-status.error {
      color: light-dark(#d93025, #f88);
    }

    /* Password wrapper within LLM modal */
    .llm-modal-content .password-wrapper {
      position: relative;
    }

    .llm-modal-content .password-wrapper input {
      width: 100%;
      padding-right: 60px;
    }

    /* ── Shortcuts ─────────────────────────────────── */
    .shortcut-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--nevoflux-space-md) 0;
      border-bottom: 1px solid light-dark(#f0f0f0, #2a2a2e);
    }

    .shortcut-row:last-child {
      border-bottom: none;
    }

    .shortcut-label {
      font-size: var(--nevoflux-font-size-base);
      color: var(--nevoflux-text);
    }

    .shortcut-keys {
      display: flex;
      align-items: center;
      gap: var(--nevoflux-space-xs);
    }

    .shortcut-keys kbd {
      display: inline-block;
      padding: 3px 8px;
      font-family: var(--nevoflux-font-family);
      font-size: var(--nevoflux-font-size-sm);
      font-weight: 500;
      color: var(--nevoflux-text);
      background: var(--nevoflux-bg-secondary);
      border: 1px solid var(--nevoflux-border);
      border-radius: var(--nevoflux-radius-sm);
      box-shadow: 0 1px 0 light-dark(rgba(0,0,0,0.08), rgba(255,255,255,0.05));
      line-height: 1.4;
      min-width: 24px;
      text-align: center;
    }

    .shortcut-separator {
      font-size: var(--nevoflux-font-size-sm);
      color: var(--nevoflux-text-secondary);
    }

    /* ── Canvas Tools ─────────────────────────────── */
    .canvas-tools-list {
      background: var(--nevoflux-bg);
      border-radius: var(--nevoflux-radius-md);
      border: 1px solid var(--nevoflux-border);
      margin-bottom: var(--nevoflux-space-lg);
    }

    .canvas-tool-item {
      padding: var(--nevoflux-space-md) var(--nevoflux-space-lg);
      border-bottom: 1px solid light-dark(#f0f0f0, #2a2a2e);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--nevoflux-space-md);
      transition: background 0.15s ease;
    }

    .canvas-tool-item:last-child {
      border-bottom: none;
    }

    .canvas-tool-item:hover {
      background: var(--nevoflux-bg-tertiary);
    }

    .canvas-tool-info {
      flex: 1;
      min-width: 0;
    }

    .canvas-tool-name-row {
      display: flex;
      align-items: center;
      gap: var(--nevoflux-space-sm);
      margin-bottom: 2px;
    }

    .canvas-tool-name {
      font-size: var(--nevoflux-font-size-base);
      font-weight: 500;
      color: var(--nevoflux-text);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .canvas-tool-source {
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 500;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .canvas-tool-source.builtin {
      background: light-dark(#e8f0fe, #1a2a3a);
      color: light-dark(#1a73e8, #8ab4f8);
    }

    .canvas-tool-source.wasm {
      background: light-dark(#fef7e0, #3a3020);
      color: light-dark(#e37400, #fdd663);
    }

    .canvas-tool-source.mcp {
      background: light-dark(#e6f4ea, #1a3a2a);
      color: light-dark(#1e8e3e, #6fcf97);
    }

    .canvas-tool-source.canvas {
      background: light-dark(#f3e8fd, #2a1a3a);
      color: light-dark(#9334e6, #c58af9);
    }

    .canvas-tool-desc {
      font-size: var(--nevoflux-font-size-sm);
      color: var(--nevoflux-text-secondary);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .canvas-tool-meta {
      font-size: 11px;
      color: var(--nevoflux-text-secondary);
      margin-top: 2px;
      opacity: 0.7;
    }

    .canvas-tool-actions {
      display: flex;
      align-items: center;
      gap: var(--nevoflux-space-sm);
      flex-shrink: 0;
    }

    .canvas-tools-empty {
      text-align: center;
      padding: var(--nevoflux-space-2xl) var(--nevoflux-space-lg);
      color: var(--nevoflux-text-secondary);
    }

    .canvas-tools-empty .canvas-tools-empty-title {
      font-size: var(--nevoflux-font-size-base);
      font-weight: 500;
      color: var(--nevoflux-text);
      margin-bottom: var(--nevoflux-space-xs);
    }

    .canvas-tools-empty .canvas-tools-empty-hint {
      font-size: var(--nevoflux-font-size-sm);
    }

    .canvas-tools-loading {
      text-align: center;
      padding: var(--nevoflux-space-2xl);
      color: var(--nevoflux-text-secondary);
      font-size: var(--nevoflux-font-size-base);
    }

    .canvas-tools-error {
      text-align: center;
      padding: var(--nevoflux-space-xl);
      color: light-dark(#d93025, #f88);
      font-size: var(--nevoflux-font-size-sm);
    }

    .canvas-tools-error button {
      margin-top: var(--nevoflux-space-sm);
      padding: var(--nevoflux-space-xs) var(--nevoflux-space-md);
      border: 1px solid var(--nevoflux-border);
      border-radius: var(--nevoflux-radius-sm);
      background: var(--nevoflux-bg);
      color: var(--nevoflux-text);
      cursor: pointer;
      font-size: var(--nevoflux-font-size-sm);
    }

    .canvas-tools-error button:hover {
      background: var(--nevoflux-bg-tertiary);
    }

    .canvas-tools-count {
      font-size: var(--nevoflux-font-size-sm);
      color: var(--nevoflux-text-secondary);
      margin-bottom: var(--nevoflux-space-md);
    }

    /* ── Canvas Tool editor modal ─────────────────── */
    .canvas-tool-modal {
      position: fixed;
      inset: 0;
      z-index: 9000;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .canvas-tool-modal[hidden] { display: none; }

    .canvas-tool-modal-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(2px);
    }

    .canvas-tool-modal-panel {
      position: relative;
      width: min(720px, 92vw);
      max-height: 88vh;
      /* Use an opaque system background; --zen-branding-bg is translucent
         in many Zen themes and would let the page show through. */
      background: var(--in-content-box-background, Canvas);
      color: var(--in-content-page-color, CanvasText);
      border: 1px solid var(--zen-colors-border);
      border-radius: var(--zen-border-radius, 10px);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.25);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .canvas-tool-modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--zen-space-md, 12px) var(--zen-space-lg, 16px);
      border-bottom: 1px solid var(--zen-colors-border);
    }
    .canvas-tool-modal-header h3 { margin: 0; font-size: 15px; }

    .canvas-tool-modal-close {
      background: transparent;
      border: 0;
      font-size: 20px;
      cursor: pointer;
      padding: 4px 8px;
    }

    .canvas-tool-modal-editor {
      flex: 1 1 auto;
      min-height: 380px;
      max-height: 60vh;
      overflow: auto;
      border-bottom: 1px solid var(--zen-colors-border);
      font-family: ui-monospace, Consolas, "SF Mono", monospace;
      font-size: 13px;
    }

    .canvas-tool-modal-error {
      padding: 10px 16px;
      background: color-mix(in srgb, #e04444 12%, transparent);
      color: color-mix(in srgb, #e04444 90%, var(--zen-branding-bg-reverse));
      border-top: 1px solid color-mix(in srgb, #e04444 30%, transparent);
      font-size: 13px;
      line-height: 1.4;
      white-space: pre-wrap;
    }
    .canvas-tool-modal-error a {
      color: inherit;
      text-decoration: underline;
      cursor: pointer;
    }

    .canvas-tool-modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      padding: var(--zen-space-md, 12px) var(--zen-space-lg, 16px);
    }

    .canvas-tool-modal-button {
      padding: 6px 14px;
      border-radius: 6px;
      border: 1px solid var(--zen-colors-border);
      background: transparent;
      cursor: pointer;
      font-size: 13px;
    }
    .canvas-tool-modal-button.primary {
      background: color-mix(in srgb, var(--zen-primary-color) 30%, var(--zen-branding-bg-reverse) 70%);
      color: var(--zen-branding-bg);
      border-color: transparent;
    }
    .canvas-tool-modal-button:disabled { opacity: 0.5; cursor: wait; }

    /* New-Tool button + row-action buttons */
    .canvas-tools-new-button {
      margin-left: auto;
      padding: 4px 10px;
      border-radius: 6px;
      border: 1px solid var(--zen-colors-border);
      background: transparent;
      cursor: pointer;
      font-size: 12px;
    }
    .canvas-tool-row-action {
      padding: 2px 8px;
      margin-right: 4px;
      border-radius: 4px;
      border: 1px solid var(--zen-colors-border);
      background: transparent;
      cursor: pointer;
      font-size: 12px;
    }
    .canvas-tool-row-action:hover { background: var(--zen-colors-tertiary); }

    /* overridden badge variant */
    .canvas-tool-source.overridden {
      background: color-mix(in srgb, var(--zen-primary-color) 25%, transparent);
      color: var(--zen-branding-bg-reverse);
    }

    /* ── Knowledge Base Section (M4-1) ────────────── */
    .kb-status-row {
      display: flex;
      align-items: center;
      gap: var(--nevoflux-space-sm);
      margin: var(--nevoflux-space-md) 0;
    }

    .kb-status-label {
      font-weight: 500;
      color: var(--nevoflux-text-secondary);
      font-size: var(--nevoflux-font-size-base);
    }

    .kb-status-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4em;
      padding: 0.25em 0.7em;
      border-radius: 999px;
      background: var(--kb-badge-color, var(--nevoflux-bg-tertiary));
      color: white;
      font-size: var(--nevoflux-font-size-sm);
      font-weight: 500;
      line-height: 1.4;
    }

    .kb-status-badge[data-state="unknown"],
    .kb-status-badge[data-state="needs_install"] {
      background: var(--nevoflux-bg-tertiary);
      color: var(--nevoflux-text);
    }

    .kb-status-dot {
      width: 0.55em;
      height: 0.55em;
      border-radius: 50%;
      background: currentColor;
      opacity: 0.85;
      flex-shrink: 0;
    }

    .kb-details {
      font-family: var(--nevoflux-font-family-mono, monospace);
      font-size: var(--nevoflux-font-size-sm);
      color: var(--nevoflux-text-secondary);
      margin: var(--nevoflux-space-md) 0;
      padding: var(--nevoflux-space-sm) var(--nevoflux-space-md);
      background: var(--nevoflux-bg-secondary);
      border: 1px solid var(--nevoflux-border);
      border-radius: var(--nevoflux-radius-sm);
    }

    .kb-detail-line {
      line-height: 1.6;
      word-break: break-all;
    }

    .kb-detail-key {
      color: var(--nevoflux-text-secondary);
    }

    .kb-detail-value {
      color: var(--nevoflux-text);
    }

    .kb-actions {
      display: flex;
      gap: var(--nevoflux-space-md);
      margin-top: var(--nevoflux-space-lg);
      align-items: center;
    }

    .kb-enable-btn {
      padding: var(--nevoflux-space-sm) var(--nevoflux-space-xl);
      border-radius: var(--nevoflux-radius-sm);
      border: none;
      font-size: var(--nevoflux-font-size-base);
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s ease, opacity 0.15s ease;
      background: var(--nevoflux-accent);
      color: white;
    }

    .kb-enable-btn:hover:not(:disabled) {
      background: color-mix(in srgb, var(--nevoflux-accent) 85%, black);
    }

    .kb-enable-btn:disabled {
      opacity: 0.4;
      cursor: default;
    }

    .kb-refresh-btn {
      padding: var(--nevoflux-space-sm) var(--nevoflux-space-lg);
      border-radius: var(--nevoflux-radius-sm);
      border: 1px solid var(--nevoflux-border);
      font-size: var(--nevoflux-font-size-base);
      cursor: pointer;
      background: var(--nevoflux-bg);
      color: var(--nevoflux-text);
      transition: background 0.15s ease;
    }

    .kb-refresh-btn:hover {
      background: var(--nevoflux-bg-tertiary);
    }
  </style>
</head>
<body>
  <nav class="settings-nav" id="settings-nav">
    <h1>Settings</h1>
    <a href="#" data-section="general">General</a>
    <a href="#" data-section="llm">AI Models</a>
    <a href="#" data-section="mcp">MCP Servers</a>
    <a href="#" data-section="canvas-tools">Canvas Tools</a>
    <a href="#" data-section="my-canvas">My Canvas</a>
    <a href="#" data-section="knowledge-base">Knowledge Base</a>
    <a href="#" data-section="shortcuts">Shortcuts</a>
  </nav>
  <main class="settings-content">
    <div class="settings-content-inner" id="settings-content">
      <!-- Sections rendered by settings.js -->
    </div>
  </main>
  <div class="save-indicator" id="save-indicator">Saved</div>
  <!-- Canvas Tool editor modal -->
  <div id="canvas-tool-editor" class="canvas-tool-modal" hidden aria-modal="true" role="dialog" aria-labelledby="canvas-tool-editor-title">
    <div class="canvas-tool-modal-backdrop" data-action="cancel"></div>
    <div class="canvas-tool-modal-panel">
      <header class="canvas-tool-modal-header">
        <h3 id="canvas-tool-editor-title">New Canvas Tool</h3>
        <button type="button" class="canvas-tool-modal-close" data-action="cancel" aria-label="Close">×</button>
      </header>
      <div id="canvas-tool-editor-cm" class="canvas-tool-modal-editor"></div>
      <div id="canvas-tool-editor-error" class="canvas-tool-modal-error" role="alert" hidden></div>
      <footer class="canvas-tool-modal-footer">
        <button type="button" class="canvas-tool-modal-button" data-action="cancel">Cancel</button>
        <button type="button" class="canvas-tool-modal-button primary" data-action="save">Save</button>
      </footer>
    </div>
  </div>
  <script src="chrome://nevoflux/content/pages/common.js"></script>
  <script src="chrome://nevoflux/content/pages/settings.js"></script>
</body>
</html>
