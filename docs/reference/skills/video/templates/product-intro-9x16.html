<!DOCTYPE html>
<!--
  template: product-intro-9x16
  purpose: 9:16 竖屏产品介绍（3 场景 vertical）/ Vertical product intro (3 scenes, portrait)
  best for: 小红书、抖音 feed 广告、Instagram Stories/Reels

  AGENT INTEGRATION:
  1. duration 推荐 15-25s（竖屏忍受度较 16x9 更短）
  2. scene-canvas feature 列 1-3 个（竖屏不适合并列多项）
  3. <<BRAND_NAME>> / <<FEATURE_N_*>> 占位符同 product-intro-16x9（便于 agent 复用）
  4. 字号整体 × 1.3-1.4（竖屏宽度有限）

  VISUAL:
  - 固定 1080×1920 竖屏
  - Scene 1: logo 从中心爆炸 + 品牌名淡入
  - Scene 2: 1-3 条 feature 卡片垂直堆叠
  - Scene 3: logo 顶部下滑 + tagline + CTA 胶囊

  CONSTRAINTS:
  - 固定 1080×1920
  - feature 卡片垂直堆叠（非 grid-cols-3）
  - feature 数量 1-3（多于 3 堆叠过长）

  AGENT USAGE:
  1. <<BRAND_NAME>>      — 品牌/产品名（Scene 1 + Scene 3）
  2. <<CANVAS_EYEBROW>>  — Scene 2 小标题（如 "Why <<BRAND_NAME>>"）
  3. <<CANVAS_HEADLINE>> — Scene 2 大标题
  4. <<FEATURE_N_ICON>>  — 3 个 emoji 图标（如 "⚡"、"🔒"、"🚀"）
  5. <<FEATURE_N_TITLE>> — 3 条特性标题
  6. <<FEATURE_N_DESC>>  — 3 条特性描述（各 1 句）
  7. <<TAGLINE>>         — Scene 3 品牌语
  8. <<CTA_URL>>         — Scene 3 URL 胶囊（如 "yourproduct.com"）

  attribution: Ported from HyperFrames (Apache 2.0, v0.4.4) via 16x9 variant. See
    /ai/project/nevoflux/src/nevoflux/extensions/nevoflux-agent/lib/composition-linter/LICENSE-NOTICE.md
-->
<html lang="zh">
<head>
  <meta charset="utf-8">
  <style>
    /* Brand layer is provided by the daemon-injected <style data-nf-* > block
       at the top of <head>. DO NOT redeclare --color-* with self-referencing
       var() here — that's a cyclic reference per CSS spec and silently
       invalidates the property, blanking every consumer rule. Instead, use
       var(--color-X, #fallback) inline at every consumer site so the
       template still previews sensibly when opened standalone. */
    :root {
      --color-surface:    #1e1e1e;
      --color-border:     rgba(255, 255, 255, 0.12);

      --font-hero:        var(--typography-hero-family,  'Inter', 'PingFang SC', -apple-system, sans-serif);
      --font-body:        var(--typography-body-family,  'Inter', 'PingFang SC', -apple-system, sans-serif);
      --font-weight-hero: var(--typography-hero-weight,  800);

      --space-sm:         var(--spacing-sm,   8px);
      --space-md:         var(--spacing-md,   16px);
      --space-lg:         var(--spacing-lg,   32px);
      --space-xl:         var(--spacing-xl,   64px);
      --radius-md:        var(--rounded-md,   12px);

      --ease-entrance:    var(--motion-ease_entrance,   power4.out);
      --ease-default:     var(--motion-ease_default,    power2.out);
      --stagger:          var(--motion-stagger_default, 0.12);

      /* Portrait safe zones — honor platform UI chrome (TikTok/Reels/Shorts) */
      --safe-top:         var(--aspect-safe_top,    120px);
      --safe-bottom:      var(--aspect-safe_bottom, 160px);
      --safe-sides:       var(--aspect-safe_sides,  80px);
    }

    body { margin: 0; background: #000; overflow: hidden; font-family: var(--font-body); }

    #stage {
      position: relative;
      width: 1080px; height: 1920px;
      overflow: hidden;
      background: var(--color-background, #0a0a0f);
    }

    /* Clip utility — runtime controls visibility */
    .clip { visibility: hidden; }

    /* Scenes — full-stage panels */
    .scene {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      box-sizing: border-box;
    }

    /* ── Scene 1: Logo Intro ── */
    .scene-logo-intro { background: var(--color-background, #0a0a0f); flex-direction: column; gap: 48px; }

    .logo-intro-wrap { position: relative; width: 160px; height: 240px; }

    .logo-piece { transform-origin: center center; opacity: 0; }

    .logo-ring {
      position: absolute; top: 50%; left: 50%;
      width: 420px; height: 420px;
      margin: -210px 0 0 -210px;
      border-radius: 50%;
      border: 4px solid rgba(255, 255, 255, 0.6);
      pointer-events: none; opacity: 0;
    }

    /* 9:16 typography scale × 1.35 vs 16:9 — wider phone screens need larger glyphs */
    .intro-brand-name {
      font-family: var(--font-hero); font-weight: var(--font-weight-hero);
      font-size: 130px; letter-spacing: -0.03em;
      color: var(--color-foreground, #ffffff); margin: 0; opacity: 0; text-align: center;
    }

    /* ── Scene 2: Product Canvas ── */
    .scene-canvas {
      /* Drive from --color-background so DESIGN.md controls every scene
         uniformly. The optional --color-surface override (template-local) was
         removed because it left scene-canvas dark gray regardless of any
         caller-supplied background color, defeating the brand layer. */
      background: var(--color-background, #0a0a0f);
      flex-direction: column; justify-content: flex-start;
      padding: var(--safe-top) var(--safe-sides) var(--safe-bottom);
      gap: 0;
    }

    .canvas-dot-grid {
      position: absolute; inset: 0;
      background-image: radial-gradient(#2c2c2c 1px, transparent 1px);
      background-size: 28px 28px;
      pointer-events: none;
    }

    .canvas-header {
      position: relative;
      display: flex; flex-direction: column; align-items: center; gap: 14px;
      margin-bottom: 56px; opacity: 0; width: 100%;
    }

    .canvas-eyebrow {
      font-family: var(--font-body); font-size: 34px; font-weight: 600;
      letter-spacing: 0.14em; text-transform: uppercase; color: var(--color-primary, #a259ff);
      text-align: center;
    }

    .canvas-headline {
      font-family: var(--font-hero); font-weight: var(--font-weight-hero);
      font-size: 96px; letter-spacing: -0.03em;
      color: var(--color-foreground, #ffffff); margin: 0; text-align: center;
      line-height: 1.05;
    }

    /* Vertical stack — features fill available width, stacked top-to-bottom */
    .features-stack {
      position: relative;
      display: flex; flex-direction: column; gap: 32px;
      width: 100%;
    }

    .feature-card {
      width: 100%;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: 44px 40px;
      display: flex; flex-direction: row; align-items: flex-start; gap: 32px;
      box-sizing: border-box;
      opacity: 0;
    }

    .feature-icon-wrap {
      flex-shrink: 0;
      width: 72px; height: 72px; border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
    }

    .feature-card:nth-child(1) .feature-icon-wrap { background: color-mix(in srgb, var(--color-primary, #a259ff)   20%, transparent); }
    .feature-card:nth-child(2) .feature-icon-wrap { background: color-mix(in srgb, var(--color-secondary, #1abcfe) 20%, transparent); }
    .feature-card:nth-child(3) .feature-icon-wrap { background: color-mix(in srgb, var(--color-accent, #0acf83)    20%, transparent); }

    .feature-icon { font-size: 38px; line-height: 1; }

    .feature-text { display: flex; flex-direction: column; gap: 12px; }

    .feature-title {
      font-family: var(--font-hero); font-weight: var(--font-weight-hero);
      font-size: 48px; letter-spacing: -0.02em; color: var(--color-foreground, #ffffff); margin: 0;
    }

    .feature-desc {
      font-family: var(--font-body); font-size: 34px; line-height: 1.45;
      color: rgba(255, 255, 255, 0.6); margin: 0;
    }

    /* ── Scene 3: Logo Outro ── */
    .scene-logo-outro { background: var(--color-background, #0a0a0f); flex-direction: column; gap: 56px; }

    .outro-logo-wrap { width: 160px; height: 240px; position: relative; }

    .outro-piece { transform-origin: center center; opacity: 0; }

    .outro-glow {
      position: absolute; top: 50%; left: 50%;
      width: 420px; height: 420px; margin: -210px 0 0 -210px;
      border-radius: 50%;
      background: radial-gradient(circle, color-mix(in srgb, var(--color-primary, #a259ff) 30%, transparent) 0%, transparent 70%);
      pointer-events: none; opacity: 0;
    }

    .outro-text-group { display: flex; flex-direction: column; align-items: center; gap: 40px; }

    .outro-tagline {
      font-family: var(--font-hero); font-weight: 500;
      font-size: 66px; letter-spacing: -0.01em;
      color: var(--color-foreground, #ffffff); text-align: center; margin: 0; opacity: 0;
      line-height: 1.15;
    }

    .outro-cta-pill {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 999px; padding: 20px 56px;
      font-family: var(--font-body); font-size: 40px; font-weight: 600;
      letter-spacing: 0.03em; color: rgba(255, 255, 255, 0.7); opacity: 0;
    }

    /* ── Flash transition overlay ── */
    .flash-overlay {
      position: absolute; inset: 0;
      background: #fff; pointer-events: none; opacity: 0; z-index: 99;
    }
  </style>
</head>
<body>

<div id="stage"
     data-composition-id="product-intro-9x16"
     data-width="1080"
     data-height="1920"
     data-duration="20"
     data-fps="30"
     data-bg="#0a0a0f"
     data-start="0">

  <!-- Scene 1 (0 – 2s): Logo reveal — pieces converge from corners. -->
  <!-- AGENT: replace <<BRAND_NAME>> -->
  <div class="scene scene-logo-intro clip" id="scene-logo-intro"
       data-start="0" data-duration="2" data-track-index="1">

    <div class="logo-intro-wrap" id="logo-intro-wrap">
      <svg viewBox="0 0 160 240" width="160" height="240" aria-hidden="true">
        <path id="lp-tl" class="logo-piece"
          d="M 0 40 C 0 17.9 17.9 0 40 0 L 80 0 L 80 80 L 40 80 C 17.9 80 0 62.1 0 40 Z"
          fill="var(--color-primary, #a259ff)" />
        <path id="lp-tr" class="logo-piece"
          d="M 80 0 L 120 0 C 142.1 0 160 17.9 160 40 C 160 62.1 142.1 80 120 80 L 80 80 L 80 0 Z"
          fill="var(--color-secondary, #1abcfe)" />
        <path id="lp-ml" class="logo-piece"
          d="M 0 120 C 0 97.9 17.9 80 40 80 L 80 80 L 80 160 L 40 160 C 17.9 160 0 142.1 0 120 Z"
          fill="var(--color-accent, #0acf83)" />
        <circle id="lp-mr" class="logo-piece" cx="120" cy="120" r="40"
          fill="var(--color-secondary, #1abcfe)" />
        <path id="lp-bl" class="logo-piece"
          d="M 0 200 C 0 177.9 17.9 160 40 160 L 80 160 L 80 200 C 80 222.1 62.1 240 40 240 C 17.9 240 0 222.1 0 200 Z"
          fill="var(--color-accent, #0acf83)" />
      </svg>
      <div class="logo-ring" id="logo-ring"></div>
    </div>

    <h1 class="intro-brand-name" id="intro-brand-name"><<BRAND_NAME>></h1>
  </div>

  <!-- Flash 1→2 — peak at 2.0s (the cut moment), not 1.92s. The flash
       must mask the scene-1→scene-2 transition; if it peaks before the
       cut, viewers see scene-1 holding while the flash whites out and
       fades, then the cut happens through a nearly-transparent flash.
       Re-aligned 2026-04-26 from start=1.8/peak=1.92 to start=1.88/peak=2.0. -->
  <div class="flash-overlay clip" id="flash-1"
       data-start="1.88" data-duration="0.24" data-track-index="50"></div>

  <!-- Scene 2 (2 – 18s): Product canvas — feature callout cards stacked vertically. -->
  <!-- AGENT: replace <<CANVAS_EYEBROW>>, <<CANVAS_HEADLINE>>, and all <<FEATURE_N_*>> -->
  <div class="scene scene-canvas clip" id="scene-canvas"
       data-start="2" data-duration="16" data-track-index="1">

    <div class="canvas-dot-grid" aria-hidden="true"></div>

    <div class="canvas-header" id="canvas-header">
      <span class="canvas-eyebrow"><<CANVAS_EYEBROW>></span>
      <h2 class="canvas-headline"><<CANVAS_HEADLINE>></h2>
    </div>

    <div class="features-stack" id="features-stack">
      <!-- Feature 1 — AGENT: replace <<FEATURE_1_ICON>>, <<FEATURE_1_TITLE>>, <<FEATURE_1_DESC>> -->
      <div class="feature-card" id="feature-card-1">
        <div class="feature-icon-wrap"><span class="feature-icon"><<FEATURE_1_ICON>></span></div>
        <div class="feature-text">
          <h3 class="feature-title"><<FEATURE_1_TITLE>></h3>
          <p class="feature-desc"><<FEATURE_1_DESC>></p>
        </div>
      </div>
      <!-- Feature 2 — AGENT: replace <<FEATURE_2_ICON>>, <<FEATURE_2_TITLE>>, <<FEATURE_2_DESC>> -->
      <div class="feature-card" id="feature-card-2">
        <div class="feature-icon-wrap"><span class="feature-icon"><<FEATURE_2_ICON>></span></div>
        <div class="feature-text">
          <h3 class="feature-title"><<FEATURE_2_TITLE>></h3>
          <p class="feature-desc"><<FEATURE_2_DESC>></p>
        </div>
      </div>
      <!-- Feature 3 — AGENT: replace <<FEATURE_3_ICON>>, <<FEATURE_3_TITLE>>, <<FEATURE_3_DESC>> -->
      <div class="feature-card" id="feature-card-3">
        <div class="feature-icon-wrap"><span class="feature-icon"><<FEATURE_3_ICON>></span></div>
        <div class="feature-text">
          <h3 class="feature-title"><<FEATURE_3_TITLE>></h3>
          <p class="feature-desc"><<FEATURE_3_DESC>></p>
        </div>
      </div>
    </div>

  </div>

  <!-- Flash 2→3 — peak at 18.0s (the cut moment), see flash-1 comment. -->
  <div class="flash-overlay clip" id="flash-2"
       data-start="17.88" data-duration="0.24" data-track-index="50"></div>

  <!-- Scene 3 (18 – 20s): Logo outro — pieces slide from top + tagline + CTA. -->
  <!-- AGENT: replace <<TAGLINE>>, <<CTA_URL>> -->
  <div class="scene scene-logo-outro clip" id="scene-logo-outro"
       data-start="18" data-duration="2" data-track-index="1">

    <div class="outro-logo-wrap" id="outro-logo-wrap">
      <div class="outro-glow" id="outro-glow" aria-hidden="true"></div>
      <svg viewBox="0 0 160 240" width="160" height="240" aria-hidden="true">
        <path id="op-tl" class="outro-piece"
          d="M 0 40 C 0 17.9 17.9 0 40 0 L 80 0 L 80 80 L 40 80 C 17.9 80 0 62.1 0 40 Z"
          fill="var(--color-primary, #a259ff)" />
        <path id="op-tr" class="outro-piece"
          d="M 80 0 L 120 0 C 142.1 0 160 17.9 160 40 C 160 62.1 142.1 80 120 80 L 80 80 L 80 0 Z"
          fill="var(--color-secondary, #1abcfe)" />
        <path id="op-ml" class="outro-piece"
          d="M 0 120 C 0 97.9 17.9 80 40 80 L 80 80 L 80 160 L 40 160 C 17.9 160 0 142.1 0 120 Z"
          fill="var(--color-accent, #0acf83)" />
        <circle id="op-mr" class="outro-piece" cx="120" cy="120" r="40"
          fill="var(--color-secondary, #1abcfe)" />
        <path id="op-bl" class="outro-piece"
          d="M 0 200 C 0 177.9 17.9 160 40 160 L 80 160 L 80 200 C 80 222.1 62.1 240 40 240 C 17.9 240 0 222.1 0 200 Z"
          fill="var(--color-accent, #0acf83)" />
      </svg>
    </div>

    <div class="outro-text-group">
      <p class="outro-tagline" id="outro-tagline"><<TAGLINE>></p>
      <div class="outro-cta-pill" id="outro-cta-pill"><<CTA_URL>></div>
    </div>

  </div>

</div>

<script type="module">
  import { gsap } from 'https://esm.sh/gsap@3.13';

  window.__timelines = window.__timelines || [];

  // Single master timeline — 0-20s, all 3 scenes.
  // All position tweens use fromTo so GSAP owns the full transform state.
  // Portrait 9:16 (1080×1920): piece offsets scaled to narrower width.
  const tl = gsap.timeline({ paused: true });

  // ── Scene 1 (0 – 2s): Logo assembly ──────────────────────────────────────
  // 5 logo pieces fly from viewport corners to center (stagger 0.05s each).
  // Portrait offset: x uses ±540 (half of 1080), y uses ±960 (half of 1920).
  // Collision at ~0.7s: ring expands, logo micro-pulses, brand name fades up.
  const pieceData = [
    { id: '#lp-tl', x: -540, y: -960 },
    { id: '#lp-tr', x:  540, y: -960 },
    { id: '#lp-ml', x: -540, y:    0 },
    { id: '#lp-mr', x:  540, y:    0 },
    { id: '#lp-bl', x: -540, y:  960 },
  ];
  pieceData.forEach(({ id, x, y }, i) => {
    tl.fromTo(id,
      { x, y, opacity: 0 },
      { x: 0, y: 0, opacity: 1, duration: 0.55, ease: 'back.out(1.1)' },
      i * 0.05,
    );
  });

  // Ring pulse
  tl.fromTo('#logo-ring',
    { scale: 0.2, opacity: 0.8 },
    { scale: 3,   opacity: 0,   duration: 0.5, ease: 'power2.out' },
    0.70,
  );

  // Logo micro-pulse (spring in → return). Use fromTo for the first hop
  // and `to` for the return — back-to-back fromTo on the same target
  // double-immediateRenders at construction time, the LATER one wins for
  // the t=0 set, and when the earlier one activates GSAP snaps the
  // element to its `from` state, producing a visible flicker right when
  // the scene becomes visible. `to()` skips the immediateRender and just
  // continues from whatever value the previous tween left.
  tl.fromTo('#logo-intro-wrap',
    { scale: 1 },
    { scale: 1.06, duration: 0.12, ease: 'power2.out' },
    0.72,
  );
  tl.to('#logo-intro-wrap',
    { scale: 1, duration: 0.14, ease: 'power2.in' },
    0.84,
  );

  // Brand name fades up
  tl.fromTo('#intro-brand-name',
    { y: 24, opacity: 0 },
    { y:  0, opacity: 1, duration: 0.4, ease: 'power3.out' },
    0.90,
  );

  // Flash 1→2 — yoyo peak at t=2.0 (cut moment). yoyo+repeat:1 means
  // forward 0.12s + backward 0.12s = total 0.24s, peak at start+0.12.
  // So position=1.88 puts peak at 2.0 exactly where the scene-1→scene-2
  // clip swap happens, masking the transition properly.
  tl.fromTo('#flash-1',
    { opacity: 0 },
    { opacity: 1, duration: 0.12, yoyo: true, repeat: 1, ease: 'power2.inOut' },
    1.88,
  );

  // ── Scene 2 (2 – 18s): Product canvas ────────────────────────────────────
  // Header slides up, then 3 feature cards stagger in from below (back.out spring).
  // Cards get 3 rounds of scale-highlight cycling (each card ~2s window).

  // canvas-header: ONE fromTo for entry, ONE `to` for exit later in the
  // timeline. See the logo-intro-wrap comment above for why a second
  // fromTo on the same target is forbidden.
  tl.fromTo('#canvas-header',
    { y: 48, opacity: 0 },
    { y:  0, opacity: 1, duration: 0.6, ease: 'power3.out' },
    2.20,
  );

  ['#feature-card-1', '#feature-card-2', '#feature-card-3'].forEach((id, i) => {
    tl.fromTo(id,
      { y: 70, opacity: 0 },
      { y:  0, opacity: 1, duration: 0.55, ease: 'back.out(1.5)' },
      2.70 + i * 0.18,
    );
  });

  // Feature highlight cycle — 3 cards × 3 rounds (finite, ~2s per beat).
  // Use `to` (no immediateRender) instead of fromTo so each pulse picks
  // up the card's current scale (settled at 1 from CSS default or the
  // previous pulse's down-tween end). With fromTo on every pulse, the
  // dual-immediateRender bug would set every card to scale:1.02 at t=0
  // (the LAST forEach iteration's down-tween from-value); the first
  // pulse for each card would then snap visibly back to 1.
  [
    '#feature-card-1', '#feature-card-2', '#feature-card-3',
    '#feature-card-1', '#feature-card-2', '#feature-card-3',
    '#feature-card-1', '#feature-card-2', '#feature-card-3',
  ].forEach((id, i) => {
    const t = 3.80 + i * 2.00;
    tl.to(id,
      { scale: 1.02, duration: 0.28, ease: 'power2.out' },
      t,
    );
    tl.to(id,
      { scale: 1, duration: 0.28, ease: 'power2.in' },
      t + 0.28,
    );
  });

  // Canvas exit — slide down before flash (vertical exit for portrait).
  // Use `to` (not fromTo) so we don't conflict with the entry fromTo's
  // immediateRender at t=0; canvas-header naturally sits at y:0,op:1
  // after its entry tween, so a plain `to` to the exit state is correct.
  tl.to('#canvas-header',
    { y: 60, opacity: 0, duration: 0.35, ease: 'power2.in' },
    17.20,
  );
  tl.to('#features-stack',
    { y: 60, opacity: 0, duration: 0.35, ease: 'power2.in' },
    17.30,
  );

  // Flash 2→3 — yoyo peak at t=18.0 (cut moment). See flash-1 comment.
  tl.fromTo('#flash-2',
    { opacity: 0 },
    { opacity: 1, duration: 0.12, yoyo: true, repeat: 1, ease: 'power2.inOut' },
    17.88,
  );

  // ── Scene 3 (18 – 20s): Logo outro + CTA ─────────────────────────────────
  // Pieces slide in from top (portrait-natural direction) with 0.08s ripple stagger.
  // Glow bloom + logo pulse, then tagline and CTA pill fade up.

  ['#op-tl', '#op-tr', '#op-ml', '#op-mr', '#op-bl'].forEach((id, i) => {
    tl.fromTo(id,
      { y: -1920, opacity: 0 },
      { y:     0, opacity: 1, duration: 0.55, ease: 'power4.out' },
      18.10 + i * 0.08,
    );
  });

  // Glow bloom (same fromTo→to pattern as logo-intro-wrap to avoid the
  // dual-immediateRender flicker — the outro-glow case is the most
  // visible bug: at t=18.0 scene-3 becomes visible with glow already
  // sitting at op:1,scale:1.2 from the second fromTo's t=0 set, then
  // 18.55 snaps it to op:0,scale:0.5 before re-blooming, producing an
  // obvious "flash" right at scene start).
  tl.fromTo('#outro-glow',
    { opacity: 0, scale: 0.5 },
    { opacity: 1, scale: 1.2, duration: 0.35, ease: 'power2.out' },
    18.55,
  );
  tl.to('#outro-glow',
    { opacity: 0, scale: 2.0, duration: 0.80, ease: 'power2.out' },
    18.90,
  );

  // Logo pulse — second hop is `to`, not fromTo (see comments above).
  tl.fromTo('#outro-logo-wrap',
    { scale: 1 },
    { scale: 1.06, duration: 0.2, ease: 'back.out(1.7)' },
    18.60,
  );
  tl.to('#outro-logo-wrap',
    { scale: 1, duration: 0.2, ease: 'power2.inOut' },
    18.80,
  );

  // Tagline + CTA pill
  tl.fromTo('#outro-tagline',
    { y: 24, opacity: 0 },
