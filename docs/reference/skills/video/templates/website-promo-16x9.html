<!DOCTYPE html>
<!--
  template: website-promo-16x9
  purpose: Mode 3 (website-to-video) starter template.
  duration: 20s (adjustable within 15-30s).
  version: 1.0 (D10 + D12 integration).

  PREREQUISITES:
  1. extract_visual_identity(tab_id or URL) has been called and brand assets are available.
  2. DESIGN.md has been generated and written to the composition VirtualFS.
  3. hero_screenshot is in the VirtualFS as assets/hero.png.
  4. logo is in the VirtualFS as assets/logo.png (when the site provides one).

  STRUCTURE:
  Scene 1 (0-4s):    Brand reveal — logo + tagline entrance.
  [Transition at 4-4.3s: flash-through-white]
  Scene 2 (4.3-10s): Product showcase — 3D presentation of the website hero screenshot.
  [Transition at 10-10.3s: crossfade]
  Scene 3 (10.3-16s): Features — 3 key feature checkmarks.
  [Transition at 16-16.3s: flash-through-white]
  Scene 4 (16.3-20s): CTA — final scene with logo + URL + button.

  AGENT USAGE:
  1. Replace every <<...>> placeholder with DESIGN.md / extract_visual_identity data.
  2. No hardcoded colours — use var(--color-primary, #1a6b6b) / var(--color-accent, #ffcc33) / var(--color-background, #0b1020) etc.
  3. The hero screenshot is read from assets/hero.png (saved by extract_visual_identity).
  4. The 3 features come from extract_visual_identity.key_assets or the site's feature list.
  5. Narration (optional): call tts_synthesize_local and align with composition duration.

  CONSTRAINTS:
  - composition.duration may be 15-30s; adjust beat lengths to match.
  - If the site's primary colour is light (bg-light), switch Scene 1/4 to a light theme.
  - For CJK sites, ensure the font fallback chain includes PingFang SC / Microsoft YaHei.
-->
<html lang="en">
<head>
  <meta charset="utf-8">
  <style>
    /* Brand layer is provided by the daemon-injected <style data-nf-* > block
       at the top of <head>, which sets --color-primary / --color-secondary /
       --color-accent / --color-background / --color-foreground. Consumer
       rules below carry hex fallbacks via var(--x, #fallback) so the
       template still previews sensibly when opened standalone (no daemon
       injection). NOTE: do not redeclare :root with self-referencing
       var(--color-primary, #...) — that produces a CSS cyclic reference
       and silently invalidates the property, blanking every consumer rule. */

    body { margin: 0; background: #000; }
    #stage {
      position: relative;
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      /* Font stack copied from the DESIGN.md Typography section. */
      font-family: var(--typography-hero-family, 'Inter', 'PingFang SC', -apple-system, sans-serif);
      color: var(--color-background, #0b1020);
      background: var(--color-foreground, #f3f6f8);
    }

    /* === Scene 1: Brand reveal (0-4s) === */
    .scene-brand {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 32px; padding: 80px;
      box-sizing: border-box;
      background: var(--color-foreground, #f3f6f8);
    }
    .brand-logo {
      width: 240px; height: 240px;
      object-fit: contain;
      /* If the site has no logo, delete the <img> and fall back to text. */
    }
    .brand-name {
      font-size: 140px; font-weight: 800; letter-spacing: -0.03em;
      color: var(--color-primary, #1a6b6b); margin: 0; line-height: 1;
    }
    .brand-tagline {
      font-size: 44px; font-weight: 400; margin: 0;
      color: var(--color-background, #0b1020); opacity: 0.8;
      letter-spacing: 0.02em; text-align: center;
    }

    /* === Scene 2: Product showcase (4.3-10s) === */
    .scene-showcase {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: var(--color-background, #0b1020);
      perspective: 1400px;
    }
    .showcase-screenshot {
      width: 1440px; height: 810px;
      transform: rotateY(-8deg) rotateX(4deg);
      transform-origin: center;
      border-radius: 12px;
      box-shadow:
        0 40px 120px rgba(0, 0, 0, 0.6),
        0 0 80px rgba(26, 107, 107, 0.3);
      overflow: hidden;
    }
    .showcase-screenshot img {
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: top;
    }
    .showcase-badge {
      position: absolute; top: 100px; right: 120px;
      padding: 16px 32px;
      background: var(--color-accent, #ffcc33);
      color: var(--color-background, #0b1020);
      border-radius: 999px;
      font-size: 32px; font-weight: 800;
      letter-spacing: 0.04em;
    }

    /* === Scene 3: Features (10.3-16s) === */
    .scene-features {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 56px; padding: 120px;
      box-sizing: border-box;
      background: var(--color-foreground, #f3f6f8);
    }
    .features-title {
      font-size: 88px; font-weight: 800;
      color: var(--color-background, #0b1020);
      letter-spacing: -0.02em; margin: 0;
    }
    .features-list {
      display: flex; flex-direction: column;
      gap: 32px;
    }
    .feature-item {
      display: flex; align-items: center; gap: 32px;
      font-size: 48px; font-weight: 500;
    }
    .feature-check {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: var(--color-primary, #1a6b6b);
      color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 40px; font-weight: 900;
      flex-shrink: 0;
    }

    /* === Scene 4 (final): CTA (16.3-20s) === */
    .scene-cta {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 48px; padding: 80px;
      box-sizing: border-box;
      background: var(--color-primary, #1a6b6b);
    }
    .cta-logo {
      width: 160px; height: 160px;
      object-fit: contain;
      filter: brightness(0) invert(1);  /* invert the logo to white. */
    }
    .cta-url {
      font-size: 96px; font-weight: 800;
      color: #fff; letter-spacing: -0.02em;
      font-family: 'SF Mono', 'JetBrains Mono', monospace;
      margin: 0;
    }
    .cta-button {
      padding: 28px 72px;
      background: var(--color-accent, #ffcc33);
      color: var(--color-background, #0b1020);
      border-radius: 999px;
      font-size: 40px; font-weight: 700;
      letter-spacing: 0.02em;
    }

    /* === Transition overlays === */
    .flash-layer {
      position: absolute; inset: 0;
      background: #fff; pointer-events: none; opacity: 0;
    }
    .crossfade-layer {
      /* Dip through the BACKGROUND color (a dark cross-fade), not the light
         foreground — a full-screen light fill ramped to opacity 1 reads as a
         harsh flash (linter: nf/harsh-flash-transition). */
      position: absolute; inset: 0;
      background: var(--color-background, #0a0a0a); pointer-events: none; opacity: 0;
    }

    /*
     * ── Ambient decoratives (snippets/ambient-decoratives.md) ──
     * Per-scene radial glows derived from DESIGN.md tokens. Without
     * these, scene-features (5.7s) and scene-cta (3.7s) feel sparse
     * during the entrance stagger window. Each scene gets one glow
     * plus subtle motion that fits its window.
     */
    .ambient-layer { position: absolute; inset: 0; pointer-events: none; z-index: 0; }
    .ambient-glow-primary {
      background: radial-gradient(
        circle at 30% 50%,
        color-mix(in oklab, var(--color-primary, #1a6b6b) 35%, transparent),
        transparent 60%
      );
      mix-blend-mode: screen;
    }
    .ambient-glow-accent {
      background: radial-gradient(
        circle at 75% 50%,
        color-mix(in oklab, var(--color-accent, #ffcc33) 28%, transparent),
        transparent 60%
      );
      mix-blend-mode: screen;
    }
  </style>
</head>
<body>

<div id="stage"
     data-composition-id="website-promo-16x9"
     data-start="0"
     data-width="1920"
     data-height="1080"
     data-duration="20"
     data-fps="30"
     data-bg="#f3f6f8">

  <!-- Scene 1: Brand reveal (0-4s) -->
  <!-- AGENT: replace <<BRAND_NAME>> / <<BRAND_TAGLINE>> / assets/logo.png -->
  <div class="clip scene-brand" id="scene-brand"
       data-start="0" data-duration="4" data-track-index="1">
    <div class="ambient-layer ambient-glow-primary" id="brand-glow"></div>
    <img class="brand-logo" id="brand-logo" src="assets/logo.png" alt="logo">
    <h1 class="brand-name" id="brand-name"><<BRAND_NAME>></h1>
    <p class="brand-tagline" id="brand-tagline"><<BRAND_TAGLINE>></p>
  </div>

  <!-- Transition 1: flash 4-4.3s -->
  <div class="clip flash-layer" id="flash-1"
       data-start="4" data-duration="0.3" data-track-index="50"></div>

  <!-- Scene 2: Product showcase (4.3-10s) -->
  <!-- AGENT: assets/hero.png comes from extract_visual_identity.hero_screenshot -->
  <div class="clip scene-showcase" id="scene-showcase"
       data-start="4.3" data-duration="5.7" data-track-index="1">
    <div class="ambient-layer ambient-glow-accent" id="showcase-glow"></div>
    <div class="showcase-screenshot" id="showcase-screenshot">
      <img src="assets/hero.png" alt="product">
    </div>
    <div class="showcase-badge" id="showcase-badge">BRAND NEW</div>
  </div>

  <!-- Transition 2: crossfade 10-10.3s -->
  <div class="clip crossfade-layer" id="crossfade-1"
       data-start="10" data-duration="0.3" data-track-index="50"></div>

  <!-- Scene 3: Features (10.3-16s) -->
  <!-- AGENT: 3 features extracted from extract_visual_identity or the site's feature list -->
  <div class="clip scene-features" id="scene-features"
       data-start="10.3" data-duration="5.7" data-track-index="1">
    <div class="ambient-layer ambient-glow-primary" id="features-glow"></div>
    <h2 class="features-title" id="features-title"><<FEATURES_TITLE>></h2>
    <div class="features-list">
      <div class="feature-item" id="feature-1">
        <div class="feature-check">✓</div>
        <span><<FEATURE_1>></span>
      </div>
      <div class="feature-item" id="feature-2">
        <div class="feature-check">✓</div>
        <span><<FEATURE_2>></span>
      </div>
      <div class="feature-item" id="feature-3">
        <div class="feature-check">✓</div>
        <span><<FEATURE_3>></span>
      </div>
    </div>
  </div>

  <!-- Transition 3: flash 16-16.3s -->
  <div class="clip flash-layer" id="flash-2"
       data-start="16" data-duration="0.3" data-track-index="50"></div>

  <!-- Scene 4 (final): CTA (16.3-20s) -->
  <!-- AGENT: <<BRAND_URL>> is the user's primary domain -->
  <div class="clip scene-cta" id="scene-cta"
       data-start="16.3" data-duration="3.7" data-track-index="1">
    <div class="ambient-layer ambient-glow-accent" id="cta-glow"></div>
    <img class="cta-logo" src="assets/logo.png" alt="logo">
    <h2 class="cta-url" id="cta-url"><<BRAND_URL>></h2>
    <div class="cta-button" id="cta-button"><<CTA_LABEL>></div>
  </div>

</div>

<script type="module">
  import { gsap } from 'https://esm.sh/gsap@3.13';

  window.__timelines = window.__timelines || [];
  const tl = gsap.timeline({ paused: true });

  // === Scene 1: Brand reveal entrances ===
  tl.from('#brand-logo',
    { scale: 0.6, opacity: 0, duration: 0.8, ease: 'back.out(1.6)' }, 0.2);
  tl.from('#brand-name',
    { y: 40, opacity: 0, duration: 0.7, ease: 'power3.out' }, 0.8);
  tl.from('#brand-tagline',
    { y: 20, opacity: 0, duration: 0.5, ease: 'expo.out' }, 1.3);

  // === Transition 1 === (peak capped at 0.4 — a flat white full-screen layer
  // ramped to opacity 1 white-outs the cut; see nf/harsh-flash-transition)
  tl.to('#flash-1', { opacity: 0.4, duration: 0.15, ease: 'power2.in' }, 4);
  tl.to('#flash-1', { opacity: 0, duration: 0.15, ease: 'power2.out' }, 4.15);

  // === Scene 2: Product showcase entrances ===
  tl.from('#showcase-screenshot',
    { scale: 0.7, opacity: 0, rotateY: 15, duration: 1.0, ease: 'expo.out' }, 4.4);
  tl.from('#showcase-badge',
    { scale: 0, rotation: -15, duration: 0.5, ease: 'back.out(2)' }, 5.2);
  // Slow breathing pulse on the hero screen (bounded repeat — never -1).
  // Scene duration 5.7s with a 4s breathing cycle ≈ 1.75 cycles, so repeat: 1.
  tl.to('#showcase-screenshot',
    { scale: 1.02, duration: 2, yoyo: true, repeat: 1, ease: 'sine.inOut' }, 5.5);

  // === Transition 2: crossfade ===
  tl.to('#crossfade-1', { opacity: 1, duration: 0.15, ease: 'sine.in' }, 10);
  tl.to('#crossfade-1', { opacity: 0, duration: 0.15, ease: 'sine.out' }, 10.15);

  // === Scene 3: Features entrances ===
  tl.from('#features-title',
    { y: 30, opacity: 0, duration: 0.5, ease: 'power3.out' }, 10.4);
  tl.from('#feature-1',
    { x: -40, opacity: 0, duration: 0.5, ease: 'back.out(1.6)' }, 10.9);
  tl.from('#feature-2',
    { x: -40, opacity: 0, duration: 0.5, ease: 'back.out(1.6)' }, 11.2);
  tl.from('#feature-3',
    { x: -40, opacity: 0, duration: 0.5, ease: 'back.out(1.6)' }, 11.5);

  // === Transition 3 === (peak capped at 0.4 — see nf/harsh-flash-transition)
  tl.to('#flash-2', { opacity: 0.4, duration: 0.15, ease: 'power2.in' }, 16);
  tl.to('#flash-2', { opacity: 0, duration: 0.15, ease: 'power2.out' }, 16.15);

  // === Scene 4 (final): CTA entrances + button pulse ===
  tl.from('#cta-url',
    { y: 40, opacity: 0, duration: 0.6, ease: 'expo.out' }, 16.5);
  tl.from('#cta-button',
    { scale: 0.7, opacity: 0, duration: 0.5, ease: 'back.out(1.8)' }, 16.9);
  // CTA button pulse — bounded repeat.
  tl.to('#cta-button',
    { scale: 1.06, duration: 0.4, yoyo: true, repeat: 3, ease: 'sine.inOut' }, 17.5);

  // Final scene may fade out (optional; default keeps the CTA pinned).
  // tl.to('#scene-cta', { opacity: 0, duration: 0.5, ease: 'power2.in' }, 19.5);

  // ── Ambient decoratives ─────────────────────────────────────────────────
  // Per-scene radial glows breathe across each scene's window. Bounded
  // yoyo cycles fit the scene length cleanly (no infinite loops).
  // See snippets/ambient-decoratives.md.
  tl.fromTo('#brand-glow',
    { scale: 1.0, opacity: 0.5 },
    { scale: 1.06, opacity: 1.0, duration: 4.0, ease: 'sine.inOut' },
    0,
  );
  tl.fromTo('#showcase-glow',
    { scale: 1.0, opacity: 0.4 },
    { scale: 1.05, opacity: 0.95, duration: 5.7, ease: 'sine.inOut' },
    4.3,
  );
  tl.fromTo('#features-glow',
    { scale: 1.0, opacity: 0.5 },
    { scale: 1.06, opacity: 1.0, duration: 5.7, ease: 'sine.inOut' },
    10.3,
  );
  tl.fromTo('#cta-glow',
    { scale: 1.0, opacity: 0.5 },
    { scale: 1.05, opacity: 1.0, duration: 3.7, ease: 'sine.inOut' },
    16.3,
  );

  window.__timelines.push(tl);

  // Auto-play in preview mode (no render driver present)
  if (typeof window.__nfRenderTime === 'undefined') tl.play();
</script>

</body>
</html>
