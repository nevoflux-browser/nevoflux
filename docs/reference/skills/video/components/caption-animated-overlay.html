<!--
  component: caption-animated-overlay
  purpose: 多行叙事字幕，渐进层叠 / Multi-line narrative caption, staggered reveal
  best for: 片段叙述 / 数据点逐个亮出

  AGENT INTEGRATION:
  1. 2-4 行（少于 2 用 caption-subtitle；多于 4 信息密度太高）
  2. 每行 data-line-start 递增，典型 stagger 0.4-0.8s
  3. 每行 ≤ 20 中文字符 / 40 英文

  VISUAL: lines slide in from left, gradient background band at bottom, text stays on-screen through clip duration.

  CONSTRAINTS:
  - 2-4 lines hardcoded range
  - 底部 safe_zone 对齐

  attribution: Ported from HyperFrames (Apache 2.0, v0.4.4). See
    /ai/project/nevoflux/src/nevoflux/extensions/nevoflux-agent/lib/composition-linter/LICENSE-NOTICE.md
-->

<style>
  .caption-animated-overlay {
    position: absolute;
    bottom: var(--aspect-safe_bottom, 160px);
    left: 0;
    width: 100%;
    pointer-events: none;
    overflow: visible;
  }
  .caption-animated-overlay-inner {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    padding: var(--spacing-lg, 24px) var(--spacing-md, 16px);
    padding-bottom: var(--spacing-lg, 24px);
    box-sizing: border-box;
    background: linear-gradient(
      to top,
      color-mix(in srgb, var(--color-background, #0b1020) 88%, transparent),
      transparent
    );
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .caption-animated-overlay-line {
    font-family: var(--typography-body-family, 'Noto Sans SC', sans-serif);
    font-size: 52px;
    font-weight: 600;
    line-height: 1.3;
    color: var(--color-foreground, #f5f5f7);
    text-shadow:
      0 2px 12px rgba(0, 0, 0, 0.7),
      0 1px 3px rgba(0, 0, 0, 0.9);
    margin: 0;
    max-width: 1600px;
    overflow: hidden;
    text-overflow: ellipsis;
    opacity: 0;
    transform: translateX(-48px);
    will-change: transform, opacity;
  }
</style>

<!-- AGENT: set data-start / data-duration to match TTS clip;
     replace text in each <p>; add/remove lines (2-4 only);
     adjust data-line-start per line (stagger 0.4-0.8s recommended) -->
<div class="clip caption-animated-overlay"
     data-start="1.0"
     data-duration="6.0"
     data-track-index="20">
  <div class="caption-animated-overlay-inner">
    <p class="caption-animated-overlay-line" data-line-start="0">第一行文本</p>
    <p class="caption-animated-overlay-line" data-line-start="0.5">第二行文本</p>
    <p class="caption-animated-overlay-line" data-line-start="1.0">第三行文本</p>
  </div>
</div>

<script type="module">
  import { gsap } from 'https://esm.sh/gsap@3.13';

  const container   = document.querySelector('.caption-animated-overlay');
  const lines       = Array.from(container.querySelectorAll('.caption-animated-overlay-line'));
  const clipDur     = parseFloat(container.dataset.duration ?? '6');

  const SLIDE_DUR   = 0.55;
  const FADE_OUT    = 0.3;
  const ease        = 'back.out(1.4)';

  const tl = gsap.timeline({ paused: true });

  // Each line slides in from the left at its own data-line-start offset.
  for (const line of lines) {
    const lineStart = parseFloat(line.dataset.lineStart ?? '0');
    tl.fromTo(
      line,
      { x: -48, opacity: 0 },
      { x: 0, opacity: 1, duration: SLIDE_DUR, ease },
      lineStart,
    );
  }

  // Fade the entire inner block out near the end of the clip.
  const holdEnd = Math.max(clipDur - FADE_OUT, 0);
  const inner   = container.querySelector('.caption-animated-overlay-inner');
  tl.to(inner, { opacity: 0, duration: FADE_OUT, ease: 'power2.in' }, holdEnd);

  window.__timelines = window.__timelines || [];
  window.__timelines.push(tl);
</script>
